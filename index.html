/* ── Reset & base ─────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{overscroll-behavior-y:contain}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#F7F9F7;color:#1A2E26;
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
  transition:background 0.2s ease,color 0.2s ease}
html[data-theme="dark"] body{background:#0F1714;color:#E8EDEA}
html[data-theme="dark"] input,
html[data-theme="dark"] textarea,
html[data-theme="dark"] select{color-scheme:dark}
input,select,textarea,button{font-family:inherit;font-size:16px}
input:focus,select:focus,textarea:focus{outline:2px solid #5C8A7A;outline-offset:1px}
button{min-height:36px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#F0F5F2}
::-webkit-scrollbar-thumb{background:#C0D4CC;border-radius:3px}

/* ── Desktop sidebar & layout ─────────────────────────────── */
.jt-sidebar{position:fixed;top:0;left:0;bottom:0;width:220px;
  background:#FFFFFF;border-right:1px solid #D9E3DE;
  display:flex;flex-direction:column;z-index:200;
  transition:width 0.18s ease,transform 0.22s ease,background 0.2s ease,border-color 0.2s ease;
  overflow:hidden}
.jt-sidebar.collapsed{width:64px}
.jt-sidebar-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 0}
.jt-main{margin-left:220px;transition:margin-left 0.18s ease}
.jt-main.sidebar-collapsed{margin-left:64px}
.jt-container{max-width:960px;margin:0 auto;padding:28px 24px 80px}
.jt-topbar{display:none}
.jt-sidebar-overlay{display:none}
.jt-sb-item:hover{background:#F0F5F2}
.jt-sb-item.active{background:#D4E5DB;color:#5C8A7A}
html[data-theme="dark"] .jt-sidebar{background:#1A2420;border-right-color:#2E3B36}
html[data-theme="dark"] .jt-topbar{background:#1A2420!important;border-bottom-color:#2E3B36!important}
html[data-theme="dark"] .jt-sb-item:hover{background:#222D29}
html[data-theme="dark"] .jt-sb-item.active{background:#1F3530;color:#7AAD9C}

@media (hover:hover) and (pointer:fine){
  .jt-query-pill:hover .jt-query-tooltip{display:block!important}
}

/* ── Bottom nav (hidden on desktop) ──────────────────────── */
.jt-bottom-nav{display:none}

/* ══════════════════════════════════════════════════════════
   MOBILE  ≤ 767px
   ══════════════════════════════════════════════════════════ */
@media (max-width:767px){

  /* Hide desktop chrome */
  .jt-sidebar{display:none!important}
  .jt-topbar{display:none!important}
  .jt-sidebar-overlay{display:none!important}

  .jt-container{padding:12px 12px 80px}

  /* ── Typography scale-up ── */
  body{font-size:16px}

  /* Cards */
  .jt-card{padding:16px!important;border-radius:16px!important}

  /* Grid resets */
  .jt-grid-2{grid-template-columns:1fr!important}
  .jt-grid-recipient{grid-template-columns:1fr!important}
  .jt-section-title{flex-wrap:wrap;gap:8px}

  /* Inputs — prevent iOS zoom */
  input,textarea,select{font-size:16px!important}

  /* ── Tap target baseline ── */
  button{min-height:44px}

  /* ── Mobile action buttons (full-width, tall) ── */

    font-weight:700!important;

  .jt-job-meta{

  .jt-filter-toggle{

  .jt-cover-select{font-size:16px!important;min-height:48px!important;padding:12px!important}

  /* ── Reports mobile ── */
  .jt-report-select{font-size:16px!important;min-height:48px!important;padding:12px!important}

  .jt-profile-fetch-btn{min-height:48px!important;font-size:15px!important}

  /* ── Bottom nav ── */
  .jt-bottom-nav{
    display:flex;
    position:fixed;bottom:0;left:0;right:0;
    height:calc(60px + env(safe-area-inset-bottom,0px));
    background:#FFFFFF;
    border-top:1px solid #D9E3DE;
    z-index:500;
    padding-bottom:env(safe-area-inset-bottom,0px);
    box-shadow:0 -2px 12px rgba(0,0,0,0.08);
    align-items:flex-start;
  }
  html[data-theme="dark"] .jt-bottom-nav{background:#1A2420;border-top-color:#2E3B36}

  .jt-bottom-nav-item{
    flex:1;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:4px;
    border:none;background:transparent;cursor:pointer;
    padding:6px 4px 4px;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    color:#8FA89F;
    -webkit-tap-highlight-color:transparent;
    min-height:44px;

  .jt-bottom-nav-item.active{color:#5C8A7A}
  html[data-theme="dark"] .jt-bottom-nav-item{color:#7A8B85}
  html[data-theme="dark"] .jt-bottom-nav-item.active{color:#7AAD9C}

  .jt-bottom-nav-icon{
    width:26px;height:26px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;

  .jt-bottom-nav-label{
    font-size:11px;font-weight:500;
    letter-spacing:0.1px;line-height:1;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    max-width:100%;

  .jt-more-sheet-overlay{

@media (max-width:390px){
  .jt-card{padding:12px!important}
  .jt-bottom-nav-label{font-size:10px}

</style>

// Active palette — mutated in place by applyTheme()
const C = Object.assign({},LIGHT);
const STATUS = Object.assign({},STATUS_LIGHT);
const SOURCES = Object.assign({},SOURCES_LIGHT);

function applyTheme(theme){
  var pal = theme==="dark" ? DARK : LIGHT;
  var statusPal = theme==="dark" ? STATUS_DARK : STATUS_LIGHT;
  var srcPal = theme==="dark" ? SOURCES_DARK : SOURCES_LIGHT;
  Object.keys(pal).forEach(function(k){ C[k]=pal[k]; });
  Object.keys(statusPal).forEach(function(k){ STATUS[k]=statusPal[k]; });
  Object.keys(srcPal).forEach(function(k){ SOURCES[k]=srcPal[k]; });
  if(document&&document.documentElement){
    document.documentElement.setAttribute("data-theme",theme);
  }
}

const THEME_KEY = "jobTracker.theme";
function getSavedTheme(){
  try{
    var t=localStorage.getItem(THEME_KEY);

  }catch(e){}
  if(window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches) return "dark";
  return "light";
}

const STORAGE_KEY = "jobTracker.v1";

function loadState(){

// ─── Cloud sync (Firestore) ───────────────────────────────────────────────────
function fbReady(){ return !!(window.firebaseSdk&&window.__firebaseReady); }

var _cloudSaveTimer=null;
var _cloudSavePending=null;
function cloudSave(uid,data,opts){
  if(!fbReady()||!uid) return;
  _cloudSavePending=data;
  if(_cloudSaveTimer) clearTimeout(_cloudSaveTimer);
  var delay=(opts&&opts.immediate)?0:600;
  _cloudSaveTimer=setTimeout(function(){
    var sdk=window.firebaseSdk;
    var ref=sdk.doc(sdk.db,"users",uid);
    var payload={data:_cloudSavePending,updatedAt:Date.now(),schemaVersion:STORAGE_VERSION};
    var dataToWrite=_cloudSavePending;
    _cloudSaveTimer=null;
    _cloudSavePending=null;
    function attempt(retriesLeft){
      sdk.setDoc(ref,payload).then(function(){
        console.log("[CloudSync] Write confirmed. cv.tools:", dataToWrite.cv&&dataToWrite.cv.tools&&dataToWrite.cv.tools.length);
      }).catch(function(err){
        console.warn("Cloud save failed (retries left: "+retriesLeft+"):",err.message||err.code);
        if(retriesLeft>0){
          setTimeout(function(){ attempt(retriesLeft-1); }, 1500);
        }
      });
    }
    attempt(3);
  },delay);
}

function cloudSubscribe(uid,onData,onError){
  if(!fbReady()||!uid) return function(){};
  var sdk=window.firebaseSdk;
  var ref=sdk.doc(sdk.db,"users",uid);
  return sdk.onSnapshot(ref,function(snap){
    if(snap.exists()){
      var v=snap.data();
      onData(v.data||null);
    }else{
      onData(null);
    }
  },function(err){
    console.warn("Cloud subscribe error:",err);
    if(onError) onError(err);
  });
}

function cloudDelete(uid){
  if(!fbReady()||!uid) return Promise.resolve();
  var sdk=window.firebaseSdk;
  var ref=sdk.doc(sdk.db,"users",uid);
  return sdk.deleteDoc(ref).catch(function(err){
    console.warn("Cloud delete failed:",err);
  });
}

function pick(saved,key,fallback){
  if(saved&&Object.prototype.hasOwnProperty.call(saved,key)) return saved[key];
  return fallback;
}

const PROXY_FALLBACK = "https://corsproxy.io/?";

async function smartFetch(url,options){
  try{
    var res=await fetch(url,options);
    return{response:res,viaProxy:false};
  }catch(directErr){
    try{
      var res2=await fetch(PROXY_FALLBACK+encodeURIComponent(url),options);

function matchesSearch(job,query){
  var q=(query||"").trim().toLowerCase();
  if(!q) return true;
  var haystack=[
    job.title,job.company,job.location,job.source,
    job.description,job.employmentType,job.salary,job.notes,
    (job.tags||[]).join(" ")
  ].filter(Boolean).join(" ").toLowerCase();
  var tokens=q.split(/\s+/);
  for(var i=0;i<tokens.length;i++){
    if(haystack.indexOf(tokens[i])===-1) return false;
  }
  return true;
}

// ─── Location filtering ───────────────────────────────────────────────────────
function resolveLocation(locStr){
  if(!locStr) return null;
  var parts=locStr.split(",").map(function(s){return s.trim();});
  for(var i=0;i<parts.length;i++){
    var c=LOCATION_ALIAS_MAP[parts[i].toLowerCase()];
    if(c) return c;
  }
  return null;
}

function filterByLocation(jobs,profileLocations){
  if(!profileLocations||!profileLocations.length) return jobs;
  var wantsRemote=profileLocations.includes("Remote");
  var cityFilters=profileLocations.filter(function(l){return l!=="Remote";});
  return jobs.filter(function(j){
    if(wantsRemote&&j.remote===true) return true;
    if(!cityFilters.length) return false;
    return !!cityFilters.find(function(loc){return resolveLocation(j.location)===loc;});
  });
}

// ─── Job sort ─────────────────────────────────────────────────────────────────
function sortJobs(jobs,sort){
  var arr=jobs.slice();
  var today=new Date().toISOString().slice(0,10);
  arr.sort(function(a,b){
    if(sort==="added_desc") return (b.date||"").localeCompare(a.date||"");
    if(sort==="added_asc") return (a.date||"").localeCompare(b.date||"");
    if(sort==="score_desc"){
      var au=a.scored===false?1:0, bu=b.scored===false?1:0;
      if(au!==bu) return au-bu;
      return (b.score||0)-(a.score||0);
    }
    if(sort==="deadline_asc"){
      var ad=a.deadline||"", bd=b.deadline||"";
      if(!ad&&!bd) return 0;
      if(!ad) return 1;
      if(!bd) return -1;
      var ap=ad<today?1:0, bp=bd<today?1:0;
      if(ap!==bp) return ap-bp;
      return ad.localeCompare(bd);
    }
    if(sort==="company_asc") return (a.company||"").localeCompare(b.company||"");
    return 0;
  });
  return arr;
}

// ─── PDF text extraction ──────────────────────────────────────────────────────
async function extractPdfText(file){
  if(!window.pdfjsLib) throw new Error("PDF library not loaded. Check your internet connection and reload.");
  var buffer=await file.arrayBuffer();
  var loadingTask=window.pdfjsLib.getDocument({data:new Uint8Array(buffer)});
  var pdf=await loadingTask.promise;
  var pages=[];
  for(var i=1;i<=pdf.numPages;i++){
    var page=await pdf.getPage(i);
    var content=await page.getTextContent();
    var lastY=null;
    var line=[];
    var lines=[];
    for(var k=0;k<content.items.length;k++){
      var it=content.items[k];
      if(!it.str) continue;
      var y=it.transform?it.transform[5]:null;
      if(lastY!==null&&y!==null&&Math.abs(y-lastY)>1){
        lines.push(line.join(" "));
        line=[];
      }
      line.push(it.str);
      lastY=y;
    }
    if(line.length) lines.push(line.join(" "));
    pages.push(lines.join("\n"));
  }
  var text=pages.join("\n\n").trim();
  if(!text) throw new Error("No text found in this PDF. It may be a scanned/image-based PDF that needs OCR. Try pasting the CV text directly instead.");
  return text;
}

// ─── CV helpers ───────────────────────────────────────────────────────────────
function cvSummaryText(cv){
  if(!cv) return "";
  var parts=[];
  if(cv.text) parts.push("CV:\n"+cv.text.slice(0,4000));
  if(cv.roles) parts.push("Target roles: "+cv.roles);
  if(cv.industries) parts.push("Preferred industries: "+cv.industries);
  if(cv.locations) parts.push("Preferred locations: "+cv.locations);
  if(cv.workType&&cv.workType!=="Any") parts.push("Work type preference: "+cv.workType);
  if(cv.salary) parts.push("Salary expectation: "+cv.salary);
  if(cv.tools&&cv.tools.length){
    parts.push("TOOLS & SOFTWARE:\n"+cv.tools.map(function(t){
      var base="- "+t.name+" ("+t.years+" yr"+(t.years!==1?"s":"")+", "+t.level+")";
      return t.employers?base+" — "+t.employers:base;
    }).join("\n"));
  }
  if(cv.skills&&cv.skills.length){
    parts.push("SKILLS & COMPETENCIES:\n"+cv.skills.map(function(s){
      var base="- "+s.name+" ("+s.years+" yr"+(s.years!==1?"s":"")+", "+s.level+")";
      return s.employers?base+" — "+s.employers:base;
    }).join("\n"));
  }
  if(cv.achievements&&cv.achievements.length){
    parts.push("KEY ACHIEVEMENTS:\n"+cv.achievements.map(function(a){
      var line="- "+a.description;
      if(a.employer) line+=" @ "+a.employer;
      if(a.year) line+=" ("+a.year+")";
      return line;
    }).join("\n"));
  }
  return parts.join("\n\n");
}

function hasCv(cv){ return !!(cv&&(cv.text||cv.roles||cv.industries||cv.locations||(cv.tools&&cv.tools.length)||(cv.skills&&cv.skills.length)||(cv.achievements&&cv.achievements.length))); }

// ─── PDF export (cover letters) ───────────────────────────────────────────────
function extractApplicantName(cv){
  if(!cv||!cv.text) return null;
  var lines=cv.text.split(/\r?\n/).map(function(l){return l.trim();}).filter(Boolean);
  if(!lines.length) return null;
  var first=lines[0];
  first=first.replace(/^#+\s*/,"").trim();
  if(first.length>80) return null;
  if(/[@:/\\\d]/.test(first)) return null;
  if(/\b(CV|Resume|Curriculum|Profile|Summary|Experience|Skills|Education)\b/i.test(first)) return null;
  var words=first.split(/\s+/);
  if(words.length<2||words.length>5) return null;
  var nameShaped=words.every(function(w){return /^[A-ZÅÄÖÉÈÀÁÍÓÚÑÆØ][a-zåäöéèàáíóúñæøA-Z\-']+$/.test(w);});
  if(!nameShaped) return null;
  return first;
}

// ─── Claude API helpers ───────────────────────────────────────────────────────
async function callClaude({apiKey,prompt,maxTokens}){
  if(!apiKey){
    throw new Error("No Anthropic API key set. Add one in Search Profiles → API keys.");
  }
  var res;
  try{
    res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "content-type":"application/json",
        "x-api-key":apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true",
      },
      body:JSON.stringify({
        model:CLAUDE_MODEL,
        max_tokens:maxTokens||1000,
        messages:[{role:"user",content:prompt}],
      }),
    });
  }catch(networkErr){
    throw new Error("Network error calling Claude API: "+networkErr.message+". Check your internet connection.");
  }
  if(!res.ok){
    var body="";
    try{ body=await res.text(); }catch(e){}
    if(res.status===401) throw new Error("401 Unauthorized — your Anthropic API key is missing or invalid.");
    if(res.status===403) throw new Error("403 Forbidden — your API key does not have access to this model, or billing is not set up.");
    if(res.status===429) throw new Error("429 Rate limited — too many requests, try again in a moment.");
    if(res.status===400) throw new Error("400 Bad Request — "+(body?body.slice(0,200):"request was rejected by the API."));
    throw new Error("Claude API error "+res.status+(body?": "+body.slice(0,200):""));
  }
  var data=await res.json();
  var text=(data.content&&data.content[0]&&data.content[0].text)||"";
  if(!text) throw new Error("Empty response from Claude API.");
  return text;
}

// ─── AI scoring helpers ───────────────────────────────────────────────────────
async function scoreJobBatch(jobs,cv,anthropicKey){
  var jobList=jobs.map(function(j,i){
    var line=(i+1)+'. id="'+String(j.id)+'" | '+j.title+" at "+j.company+" | "+j.location;
    if(j.employmentType) line+=" | "+j.employmentType;
    if(j.salary) line+=" | "+j.salary;
    if(j.tags&&j.tags.length) line+=" | tags: "+j.tags.join(", ");
    if(j.description){
      var desc=j.description.slice(0,1500).replace(/\s+/g," ").trim();
      line+="\n   Description: "+desc;
    }
    return line;
  }).join("\n");

  var prompt="You are an expert career coach scoring how well each job matches this candidate.\n\n"+
    "CANDIDATE:\n"+cvSummaryText(cv)+"\n\n"+
    "JOBS TO SCORE:\n"+jobList+"\n\n"+
    "For each job, produce a match score from 0 to 100 (integer) and a single-sentence rationale "+
    "(max ~12 words) explaining the main reason for the score. Consider: role fit, skills overlap, "+
    "location fit, industry, seniority, and work-type preference.\n\n"+
    'Return ONLY a JSON array, no markdown fences, no preamble. Each id MUST be a STRING, copied verbatim from the id="..." value given. Format:\n'+
    '[{"id": "<exact id string>", "score": <0-100>, "rationale": "<short reason>"}, ...]\n'+
    "One object per job, in the same order.";

  var text=await callClaude({apiKey:anthropicKey,prompt:prompt,maxTokens:1500});
  text=text.replace(/^```(?:json)?\s*/i,"").replace(/\s*```\s*$/,"").trim();
  var parsed=JSON.parse(text);
  if(!Array.isArray(parsed)) throw new Error("Expected JSON array from Claude");
  return parsed;
}

async function scoreJobs(jobs,cv,anthropicKey){
  if(!jobs.length) return new Map();
  if(!hasCv(cv)) return new Map();
  var result=new Map();
  for(var i=0;i<jobs.length;i+=BATCH_SIZE){
    var batch=jobs.slice(i,i+BATCH_SIZE);
    try{
      var scored=await scoreJobBatch(batch,cv,anthropicKey);
      scored.forEach(function(s){
        if(s&&s.id!==undefined&&s.id!==null){
          var score=Math.max(0,Math.min(100,Math.round(Number(s.score)||0)));
          result.set(String(s.id),{score:score,rationale:(s.rationale||"").toString().slice(0,120)});
        }
      });
    }catch(e){
      console.warn("Batch scoring failed:",e);
      throw e;
    }
  }
  return result;
}

// ─── Report/activity helpers ──────────────────────────────────────────────────
function fmtDate(d){ return d?d.slice(0,10):"—"; }

function isoWeek(dateStr){
  var d=new Date(dateStr);
  var jan4=new Date(d.getFullYear(),0,4);
  var startOfWeek1=new Date(jan4);
  startOfWeek1.setDate(jan4.getDate()-(jan4.getDay()||7)+1);
  var diff=d-startOfWeek1;
  return Math.floor(diff/(7*24*60*60*1000))+1;
}

function weekStart(dateStr){
  var d=new Date(dateStr);
  var day=d.getDay()||7;
  d.setDate(d.getDate()-day+1);
  return d.toISOString().slice(0,10);
}

function weekEnd(dateStr){
  var d=new Date(weekStart(dateStr));
  d.setDate(d.getDate()+6);
  return d.toISOString().slice(0,10);
}

// ─── Error boundary ───────────────────────────────────────────────────────────
class TabErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state={hasError:false,error:null}; }
  static getDerivedStateFromError(error){ return {hasError:true,error:error}; }
  componentDidCatch(error,info){ console.error("Tab crashed:",error,info); }
  componentDidUpdate(prevProps){
    if(prevProps.tabKey!==this.props.tabKey&&this.state.hasError){
      this.setState({hasError:false,error:null});
    }
  }
  render(){
    if(this.state.hasError){
      return React.createElement("div",{style:{padding:"24px",textAlign:"center"}},
        React.createElement("div",{style:{fontSize:32,marginBottom:12}},"⚠️"),
        React.createElement("div",{style:{fontSize:16,fontWeight:700,color:"#C0392B",marginBottom:8}},"Something went wrong in this tab"),
        React.createElement("div",{style:{fontSize:13,color:"#5A7168",marginBottom:14,maxWidth:480,margin:"0 auto 14px"}},"Try switching to another tab and back, or reload the page. Your saved data is safe."),
        this.state.error&&React.createElement("div",{style:{fontSize:12,color:"#8FA89F",fontFamily:"monospace",background:"#F0F5F2",padding:"8px 12px",borderRadius:8,display:"inline-block",maxWidth:"90%",overflow:"auto"}},String(this.state.error.message||this.state.error))
      );
    }
    return this.props.children;
  }
}

// ─── InfoTip ──────────────────────────────────────────────────────────────────
function InfoTip({children,label}){
  var [open,setOpen]=useState(false);
  var [pos,setPos]=useState({top:0,left:0});
  var btnRef=useRef(null);
  var isMobile=typeof window!=="undefined"&&window.innerWidth<=767;

  function toggle(){
    if(!open&&btnRef.current){
      var r=btnRef.current.getBoundingClientRect();
      setPos({
        top:r.bottom+6,
        left:Math.max(8,Math.min(r.left,window.innerWidth-288)),
      });
    }
    setOpen(function(v){return !v;});
  }

  useEffect(function(){
    if(!open) return;
    function handle(e){
      if(btnRef.current&&!btnRef.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener("mousedown",handle);
    document.addEventListener("touchstart",handle);
    return function(){
      document.removeEventListener("mousedown",handle);
      document.removeEventListener("touchstart",handle);
    };
  },[open]);

  var mobile=typeof window!=="undefined"&&window.innerWidth<=767;

  var panelStyle=mobile
    ?{position:"fixed",left:0,right:0,bottom:0,zIndex:600,
       background:C.surface,borderTop:"1px solid "+C.border,
       borderRadius:"16px 16px 0 0",padding:"20px 20px 32px",
       boxShadow:"0 -8px 32px rgba(0,0,0,0.15)",
       fontSize:14,color:C.textSecondary,lineHeight:1.7,
       maxHeight:"60vh",overflowY:"auto"}
    :{position:"fixed",top:pos.top,left:pos.left,zIndex:600,
       width:280,background:C.surface,
       border:"1px solid "+C.border,
       borderRadius:12,padding:"14px 16px",
       boxShadow:C.shadowMd,
       fontSize:13,color:C.textSecondary,lineHeight:1.65};

  return <span style={{display:"inline-block",verticalAlign:"middle",position:"relative"}}>
    <button ref={btnRef} onClick={toggle}
      title={open?"Hide info":"Show info"}
      style={{background:"none",border:"none",cursor:"pointer",
        color:open?C.info:C.textHint,
        fontSize:15,padding:"0 4px",lineHeight:1,
        verticalAlign:"middle",fontWeight:open?700:400,
        minWidth:24,minHeight:24,
        display:"inline-flex",alignItems:"center",gap:3}}>
      {label&&<span style={{fontSize:11,verticalAlign:"middle"}}>{label}</span>}
      <span style={{fontSize:16}}>ⓘ</span>
    </button>
    {open&&<React.Fragment>
      {mobile&&<div onClick={function(){setOpen(false);}}
        style={{position:"fixed",inset:0,zIndex:599,background:"rgba(0,0,0,0.3)"}} />}
      <div style={panelStyle}>
        {mobile&&<div style={{width:36,height:4,background:C.border,borderRadius:2,margin:"0 auto 16px"}} />}
        {children}
        {mobile&&<button onClick={function(){setOpen(false);}}
          style={{marginTop:16,width:"100%",padding:"12px",borderRadius:10,
            border:"none",background:C.primaryLight,color:C.primary,
            fontFamily:"inherit",fontSize:14,fontWeight:700,cursor:"pointer"}}>
          Done
        </button>}
      </div>
    </React.Fragment>}
  </span>;
}

function EmailDialog({recipients,subject,body,onClose,onCopy}){
  var defaultRec=(recipients||[]).find(function(r){return r.isDefault;});
  var [selectedId,setSelectedId]=useState(defaultRec?defaultRec.id:"custom");
  var [customEmail,setCustomEmail]=useState("");
  var [editSubject,setEditSubject]=useState(subject||"");
  var to=selectedId==="custom"?customEmail.trim():(recipients.find(function(r){return r.id===selectedId;})||{}).email||"";
  var emailValid=isValidEmail(to);
  var bodyTooLong=(body||"").length>MAILTO_SAFE_LEN;
  function send(){
    if(!emailValid) return;
    var url=buildMailto(to,editSubject,body);
    window.location.href=url;
  }
  return <div style={{background:C.surfaceAlt,borderRadius:12,padding:"16px",marginTop:14,border:"1.5px solid "+C.border}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>

      <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,color:C.textHint,cursor:"pointer",padding:0,lineHeight:1}}>×</button>
    </div>
    <div style={{fontSize:12,color:C.textHint,marginBottom:12}}>This will open your email app with the content pre-filled. You can edit before sending.</div>
    {recipients&&recipients.length>0&&<div style={{marginBottom:10}}>
      <Label>Send to</Label>
      <Sel value={selectedId} onChange={function(e){setSelectedId(e.target.value);}}>
        {recipients.map(function(r){return <option key={r.id} value={r.id}>{r.name} — {r.email}{r.isDefault?" (default)":""}</option>;})}
        <option value="custom">Other email address...</option>
      </Sel>
    </div>}
    {(selectedId==="custom"||!recipients||!recipients.length)&&<div style={{marginBottom:10}}>
      <Label hint="Type the recipient's email address.">Recipient email</Label>
      <Inp value={customEmail} onChange={function(e){setCustomEmail(e.target.value);}} placeholder="name@example.com" type="email" />
    </div>}
    <div style={{marginBottom:12}}>
      <Label>Subject</Label>
      <Inp value={editSubject} onChange={function(e){setEditSubject(e.target.value);}} />
    </div>
    {bodyTooLong&&<Alert type="warning">This message is long ({(body||"").length.toLocaleString()} chars). Some email clients truncate mailto: links. If the body is cut off, use "Copy message" instead and paste it in manually.</Alert>}
    {!emailValid&&to.length>0&&<Alert type="error">That doesn't look like a valid email address.</Alert>}
    <div style={{display:"flex",gap:10,marginTop:14,flexWrap:"wrap"}}>
      <Btn variant="primary" onClick={send} disabled={!emailValid}>Open in email app →</Btn>
      <Btn onClick={function(){navigator.clipboard.writeText(body||"");if(onCopy) onCopy();}}>Copy message</Btn>
      <Btn onClick={onClose}>Cancel</Btn>
    </div>
  </div>;
}

    {moreOpen&&<div className="jt-more-sheet-overlay" onClick={function(){setMoreOpen(false);}} />}
    {moreOpen&&<div className="jt-more-sheet">
      <div style={{padding:"8px 20px 16px",borderBottom:"1px solid "+C.border,marginBottom:4}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4}}>
          {secondaryTabs.map(function(t){
            var active=activeTab===t.id;
            return <button key={t.id} onClick={function(){go(t.id);}}
              style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,
                padding:"16px 8px",borderRadius:14,border:"none",
                background:active?C.primaryLight:"transparent",
                color:active?C.primary:C.textSecondary,
                cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:active?700:500}}>
              <span style={{width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {NAV_ICONS[t.id]||null}
              </span>

      {user&&<div style={{padding:"10px 20px 16px",display:"flex",alignItems:"center",gap:12}}>
        {user.photoURL
          ?<img src={user.photoURL} alt="" referrerPolicy="no-referrer" style={{width:36,height:36,borderRadius:"50%",flexShrink:0}} />
          :<div style={{width:36,height:36,borderRadius:"50%",background:C.primary,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,flexShrink:0}}>{(user.displayName||user.email||"?").slice(0,1).toUpperCase()}</div>}
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:600,color:C.textPrimary,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.displayName||"Signed in"}</div>
          <div style={{fontSize:11,color:C.textHint,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.email}</div>
        </div>
        <button onClick={function(){setTheme&&setTheme(theme==="dark"?"light":"dark");}}

            padding:"0",cursor:"pointer",color:C.textHint,
            width:44,height:44,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>
          {theme==="dark"?"☀️":"🌙"}
        </button>
        <button onClick={function(){setMoreOpen(false);if(onSignOut)onSignOut();}}
          style={{background:"none",border:"1px solid "+C.border,borderRadius:10,
            padding:"0 12px",cursor:"pointer",fontSize:12,color:C.textHint,
            fontFamily:"inherit",height:44,whiteSpace:"nowrap"}}>
          Sign out
        </button>
      </div>}
    </div>}
    <nav className="jt-bottom-nav">
      {primaryTabs.map(function(t){
        var active=activeTab===t.id&&!moreOpen;

          <span className="jt-bottom-nav-icon">{NAV_ICONS[t.id]||null}</span>
          <span className="jt-bottom-nav-label">{NAV_LABELS[t.id]||t.label}</span>
        </button>;
      })}
      <button className={"jt-bottom-nav-item"+(moreOpen||inMore?" active":"")}
        onClick={function(){setMoreOpen(function(v){return !v;});}}>
        <span className="jt-bottom-nav-icon">{NAV_ICONS.more}</span>
        <span className="jt-bottom-nav-label">More</span>
      </button>
