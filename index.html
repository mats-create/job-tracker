// ─── Cover Letters ────────────────────────────────────────────────────────────
function CoverLetters({jobs,cv,anthropicKey,setActiveTab,pendingCoverLetterJob,setPendingCoverLetterJob}){
  // Default to only showing Reviewing (non-archived) jobs — that's the "I'm
  // about to apply, draft me a letter" window. Archived and already-applied
  // jobs aren't useful targets. User can flip the toggle for edge cases like
  // drafting a speculative letter for a New job.
  var [showAllStatuses,setShowAllStatuses]=useState(false);
  var eligibleJobs=jobs.filter(function(j){
    if(j.archived) return false;
    return showAllStatuses?true:j.status==="Reviewing";
  });
  // Auto-select the first eligible job; re-select when the pool changes (e.g.
  // toggle flipped, or the user moved a job to Reviewing in another tab).
  var [selectedJob,setSelectedJob]=useState(eligibleJobs[0]?eligibleJobs[0].id:null);
  useEffect(function(){
    // If current selection isn't in the eligible pool anymore, pick the first
    // one that is. Preserves selection when possible.
    var stillEligible=eligibleJobs.some(function(j){return j.id===selectedJob;});
    if(!stillEligible){
      setSelectedJob(eligibleJobs[0]?eligibleJobs[0].id:null);
    }
  // eslint-disable-next-line
  },[eligibleJobs.length,showAllStatuses]);
  // When the user lands here via "✉ Cover letter" on a job row, pre-select
  // that job. If the job isn't in the current pool (e.g. status promotion to
  // Reviewing hasn't propagated yet, or it's outside the filter), turn on
  // "Show all statuses" so it becomes selectable. Then clear the pending state
  // so subsequent navigation to this tab doesn't re-trigger the selection.
  useEffect(function(){
    if(!pendingCoverLetterJob) return;
    var target=jobs.find(function(j){return j.id===pendingCoverLetterJob;});
    if(target){
      var inPool=eligibleJobs.some(function(j){return j.id===target.id;});
      if(!inPool) setShowAllStatuses(true);
      setSelectedJob(target.id);
    }
    if(setPendingCoverLetterJob) setPendingCoverLetterJob(null);
  // eslint-disable-next-line
  },[pendingCoverLetterJob]);
  var [tone,setTone]=useState("Professional");
  var [letter,setLetter]=useState("");
  var [error,setError]=useState("");
  var [loading,setLoading]=useState(false);
  var [showEmail,setShowEmail]=useState(false);
  async function generate(){
    var job=eligibleJobs.find(function(j){return j.id===selectedJob;});
    if(!job) return;
    if(!cv.text||cv.text.trim().length<100){
      setError("Please add a substantive CV in the My CV tab first. The letter can only be grounded in what you've actually written.");
      return;
    }
    setLoading(true);setLetter("");setError("");setShowEmail(false);
    try{
      // Build a tight job brief — includes description when available so the
      // model can map requirements to CV evidence without inventing needs.
      var jobBrief="Title: "+job.title+"\nCompany: "+job.company+"\nLocation: "+(job.location||"Not specified");
      if(job.employmentType) jobBrief+="\nEmployment type: "+job.employmentType;
      if(job.tags&&job.tags.length) jobBrief+="\nTags: "+job.tags.join(", ");
      if(job.description){
        var desc=job.description.slice(0,3000).replace(/\s+/g," ").trim();
        jobBrief+="\n\nJob description:\n"+desc;
      }

      // GROUNDING RULES: the prompt explicitly forbids fabrication. The model
      // is told to treat the CV as the ONLY source of truth for claims about
      // the candidate, and to omit rather than invent. This is the single
      // biggest quality lever for cover letters.
      var prompt=
        "You are writing a cover letter for a job applicant. Write it in "+job.lang+" with a "+tone.toLowerCase()+" tone.\n\n"+
        "═══ STRICT GROUNDING RULES — FOLLOW EXACTLY ═══\n"+
        "1. The CV below is the ONLY source of truth about the applicant. Do NOT invent, infer, or extrapolate skills, experience, qualifications, achievements, tools, languages, certifications, employers, education, or soft skills that are not explicitly stated in the CV.\n"+
        "2. If the job description lists a requirement that is NOT evidenced in the CV, do NOT claim the applicant has it. Do NOT hint at it, imply it, or use filler phrases suggesting it. Either omit it entirely or frame it honestly as something the applicant is eager to learn.\n"+
        "3. Do NOT use generic stock phrases like \"proven track record\", \"passionate about\", \"results-driven\", \"strong communication skills\", \"team player\", \"proactive self-starter\", \"wealth of experience\", unless those exact qualities are demonstrated by specific content in the CV.\n"+
        "4. When you reference a skill or achievement, it must be traceable to a concrete line or section of the CV. Prefer specific wording from the CV itself.\n"+
        "5. Do NOT fabricate numbers, percentages, metrics, project names, client names, or dates. Only cite numbers that appear in the CV.\n"+
        "6. Keep the letter CONCISE — aim for 200-300 words. A shorter, honest letter is better than a padded, speculative one.\n"+
        "7. If the CV is sparse on something the job needs, it is better to write a shorter letter that highlights what IS a fit, than to pad with generic claims.\n"+
        "8. Start directly with the salutation. No preamble, no meta-commentary, no \"Here is your cover letter\".\n\n"+
        "═══ JOB ═══\n"+jobBrief+"\n\n"+
        "═══ CV & PROFILE (ONLY source of truth about the applicant) ═══\n"+cvSummaryText(cv)+"\n\n"+
        "Write the cover letter now, following every rule above.";
      var text=await callClaude({apiKey:anthropicKey,prompt:prompt,maxTokens:1500});
      setLetter(text);
    }catch(e){setError(e.message||"Error connecting to Claude. Please try again.");}
    setLoading(false);
  }
  var currentJob=eligibleJobs.find(function(j){return j.id===selectedJob;});
  var emailSubject=currentJob?"Application — "+currentJob.title+" at "+currentJob.company:"Cover letter";
  // Count Reviewing jobs in the whole non-archived pool to show a helpful
  // empty-state when none exist.
  var reviewingCount=jobs.filter(function(j){return !j.archived&&j.status==="Reviewing";}).length;
  var noJobsAtAll=jobs.filter(function(j){return !j.archived;}).length===0;
  return <div style={{display:"flex",flexDirection:"column",gap:16}}>
    <Card>
      <SectionTitle>Generate a cover letter</SectionTitle>
      <div style={{fontSize:13,color:C.textHint,marginBottom:16}}>Claude will write a personalised cover letter based on the job and your CV. You can edit it before sending.</div>
      {/* Empty-state branches: no jobs at all vs. no Reviewing jobs.
          The latter nudges the user to go mark a job Reviewing, which is the
          intended workflow. Toggle overrides for the rare speculative case. */}
      {noJobsAtAll
        ?<Alert type="warning">Add some jobs first — go to My Jobs or Search Profiles to get started.</Alert>
        :eligibleJobs.length===0
          ?<div style={{padding:"20px",background:C.surfaceAlt,borderRadius:12,textAlign:"center"}}>
            <div style={{fontSize:32,marginBottom:10}}>📝</div>
            <div style={{fontSize:15,fontWeight:600,color:C.textPrimary,marginBottom:6}}>No jobs ready for a cover letter</div>
            <div style={{fontSize:13,color:C.textSecondary,marginBottom:14,lineHeight:1.5}}>Cover letters are drafted for jobs you're actively considering.<br/>Move a job to the <b>Reviewing</b> status first, then come back here.</div>
            <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
              <Btn variant="primary" onClick={function(){if(setActiveTab) setActiveTab("jobs");}} style={{fontSize:13}}>Go to My Jobs</Btn>
              <Btn onClick={function(){setShowAllStatuses(true);}} style={{fontSize:13}}>Show all statuses anyway</Btn>
            </div>
          </div>
          :<div>
            <div className="jt-grid-2" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:14,marginBottom:10}}>
              <div><Label hint={showAllStatuses?"Showing all non-archived jobs.":"Showing jobs you're actively reviewing."}>Select a job</Label><Sel value={selectedJob||""} onChange={function(e){var v=e.target.value;var num=Number(v);setSelectedJob(isNaN(num)||String(num)!==v?v:num);}}>{eligibleJobs.map(function(j){return <option key={j.id} value={j.id}>{j.title} – {j.company}{showAllStatuses?" ["+j.status+"]":""}</option>;})}</Sel></div>
              <div><Label hint="This affects the writing style of the letter.">Tone of voice</Label><Sel value={tone} onChange={function(e){setTone(e.target.value);}}>{["Professional","Conversational","Enthusiastic","Formal","Creative"].map(function(t){return <option key={t}>{t}</option>;})}</Sel></div>
            </div>
            <label style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:C.textSecondary,cursor:"pointer",userSelect:"none",marginBottom:14}}>
              <input type="checkbox" checked={showAllStatuses} onChange={function(){setShowAllStatuses(function(v){return !v;});}} style={{width:14,height:14,cursor:"pointer",accentColor:C.primary}} />
              <span>Show all statuses (by default only jobs in <b>Reviewing</b> status are listed)</span>
              {!showAllStatuses&&reviewingCount>0&&<span style={{color:C.textHint}}>· {reviewingCount} job{reviewingCount!==1?"s":""} reviewing</span>}
            </label>
            <Btn variant="primary" onClick={generate} disabled={loading||!selectedJob||!anthropicKey} style={{padding:"12px 28px"}}>{loading?"Writing your letter...":"Generate cover letter ↗"}</Btn>
            <div style={{fontSize:11,color:C.textHint,marginTop:10,fontStyle:"italic",lineHeight:1.5}}>The letter will only reference skills and experience that appear in your CV. If the job asks for something your CV doesn't cover, it won't be claimed. A sparse CV produces a shorter letter — that's intentional.</div>
          </div>
      }
      {!anthropicKey&&<Alert type="warning">Add your Anthropic API key in Search Profiles → API keys to use this feature.</Alert>}
      {error&&<Alert type="error">{error}</Alert>}
    </Card>
    {letter&&<Card>
      <SectionTitle>Your cover letter</SectionTitle>
      <div style={{fontSize:13,color:C.textHint,marginBottom:12}}>You can edit the letter directly below before copying, exporting, or emailing it.</div>
      <Txta value={letter} onChange={function(e){setLetter(e.target.value);}} rows={16} />
      <div style={{display:"flex",gap:10,marginTop:14,flexWrap:"wrap"}}>
        <Btn variant="primary" onClick={function(){setShowEmail(true);}}>✉ Send via email</Btn>
        <Btn onClick={function(){exportLetterPdf({letter:letter,cv:cv,job:currentJob});}}>📄 Export as PDF</Btn>
        <Btn onClick={function(){navigator.clipboard.writeText(letter);}}>Copy to clipboard</Btn>
        <Btn onClick={function(){var b=new Blob([letter],{type:"text/plain"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="cover-letter.txt";a.click();}}>Export as text file</Btn>
      </div>
      {showEmail&&<EmailDialog recipients={cv.recipients||[]} subject={emailSubject} body={letter} onClose={function(){setShowEmail(false);}} />}
    </Card>}
  </div>;
}

// ─── Reports ──────────────────────────────────────────────────────────────────
function Reports({jobs,cv,anthropicKey}){
  var [type,setType]=useState("Weekly digest");
  var [report,setReport]=useState("");
  var [error,setError]=useState("");
  var [loading,setLoading]=useState(false);
  var [showEmail,setShowEmail]=useState(false);
  async function generate(){
    setLoading(true);setReport("");setError("");setShowEmail(false);
    // Pre-compute funnel stats so Claude doesn't have to reason about counts
    // from the job list alone — grounds the report in accurate numbers and
    // highlights response rate, which is the key insight closed statuses enable.
    var active=jobs.filter(function(j){return !j.archived;});
    var byStatus={};
    STATUSES.forEach(function(s){byStatus[s]=0;});
    active.forEach(function(j){if(byStatus[j.status]!==undefined) byStatus[j.status]++;});
    var appliedTotal=APPLIED_STATUSES.reduce(function(a,s){return a+(byStatus[s]||0);},0);
    var rejected=byStatus.Rejected||0;
    var noResponse=byStatus["No response"]||0;
    var interviewed=byStatus.Interview||0;
    var offered=byStatus.Offer||0;
    var stillApplied=byStatus.Applied||0;
    var closed=rejected+noResponse;
    var responded=appliedTotal-noResponse; // anyone who replied, positively or negatively
    var responseRate=appliedTotal>0?Math.round((responded/appliedTotal)*100):0;
    var interviewRate=appliedTotal>0?Math.round((interviewed+offered+rejected*0)/appliedTotal*100):0; // count anyone who progressed to interview
    // Funnel summary for the model
    var funnel=
      "FUNNEL STATS (computed from current data, use these verbatim if you cite numbers):\n"+
      "• Total active in pipeline: "+active.length+"\n"+
      "• Applications sent (all-time, including closed): "+appliedTotal+"\n"+
      "• Still awaiting response (Applied status): "+stillApplied+"\n"+
      "• Progressed to Interview stage: "+(interviewed+offered+rejected)+" (currently Interview: "+interviewed+", Offer: "+offered+", Rejected after applying: "+rejected+")\n"+
      "• Closed - No response (ghosted): "+noResponse+"\n"+
      "• Response rate (any reply, positive or negative): "+responseRate+"%\n"+
      "• Breakdown by status: "+STATUSES.map(function(s){return s+"="+(byStatus[s]||0);}).join(", ");
    var summary=active.map(function(j){return j.title+" at "+j.company+" ("+j.status+", match: "+j.score+"%, source: "+j.source+")";}).join("\n");
    try{
      var cvContext=cv&&hasCv(cv)?"CANDIDATE PROFILE:\n"+cvSummaryText(cv)+"\n\n":"";
      var prompt="Generate a \""+type+"\" report for a job seeker.\n\n"+
        cvContext+
        funnel+"\n\n"+
        "JOBS LIST:\n"+summary+"\n\n"+
        "Write a clear, friendly report with key insights and practical recommendations. "+
        "Where relevant to the report type, use the funnel stats above — especially response rate and the breakdown between closed outcomes (Rejected vs No response). "+
        "Where the candidate profile is provided, use it to comment on skill/tool alignment patterns across the pipeline and whether the types of jobs being tracked match the candidate's background. "+
        "For status reports, explicitly comment on how many applications are closed vs still active, and whether the user should follow up on silent applications. "+
        "Use plain text, no markdown.";
      var text=await callClaude({apiKey:anthropicKey,prompt:prompt,maxTokens:1500});
      setReport(text);
    }catch(e){setError(e.message||"Error connecting to Claude. Please try again.");}
    setLoading(false);
  }
  var emailSubject=type+" — "+new Date().toISOString().slice(0,10);
  return <div style={{display:"flex",flexDirection:"column",gap:16}}>
    <Card>
      <SectionTitle>Generate a report</SectionTitle>
      <div style={{fontSize:13,color:C.textHint,marginBottom:16}}>Claude will analyse your job pipeline and write a summary with insights and recommendations.</div>
      <div style={{marginBottom:14}}><Label hint="Choose what kind of report you'd like.">Report type</Label><Sel value={type} onChange={function(e){setType(e.target.value);}}>{["Weekly digest","Top 10 matches","Application status report","Monthly summary"].map(function(t){return <option key={t}>{t}</option>;})}</Sel></div>
      <Btn variant="primary" onClick={generate} disabled={loading||jobs.length===0||!anthropicKey} style={{padding:"12px 28px"}}>{loading?"Writing your report...":"Generate report ↗"}</Btn>
      {!anthropicKey&&<Alert type="warning">Add your Anthropic API key in Search Profiles → API keys to use this feature.</Alert>}
      {jobs.length===0&&<Alert type="warning">No jobs in your pipeline yet. Add some jobs first.</Alert>}
      {error&&<Alert type="error">{error}</Alert>}
    </Card>
    {report&&<Card>
      <SectionTitle>Your report</SectionTitle>
      <div style={{fontSize:14,lineHeight:1.8,whiteSpace:"pre-wrap",color:C.textPrimary,background:C.surfaceAlt,borderRadius:12,padding:"20px",marginBottom:14}}>{report}</div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        <Btn variant="primary" onClick={function(){setShowEmail(true);}}>✉ Send via email</Btn>
        <Btn onClick={function(){navigator.clipboard.writeText(report);}}>Copy to clipboard</Btn>
        <Btn onClick={function(){var b=new Blob([report],{type:"text/plain"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="report.txt";a.click();}}>Export as text file</Btn>
      </div>
      {showEmail&&<EmailDialog recipients={(cv&&cv.recipients)||[]} subject={emailSubject} body={report} onClose={function(){setShowEmail(false);}} />}
    </Card>}
  </div>;
}

// ─── Profile Assistant ────────────────────────────────────────────────────────
// Chat UI. Holds a message history (role: user|assistant, content: string).
// Renders assistant replies as text + any saveable profile cards the model emitted.
function ProfileAssistant({cv,profiles,setProfiles,anthropicKey,conversation,setConversation,setActiveTab,setPendingProfileRun,jobs}){
  var [input,setInput]=useState("");
  var [loading,setLoading]=useState(false);
  var [error,setError]=useState("");
  var [justSavedId,setJustSavedId]=useState(null);
  var scrollRef=useRef(null);

  // Auto-scroll to bottom when messages change
  useEffect(function(){
    if(scrollRef.current){ scrollRef.current.scrollTop=scrollRef.current.scrollHeight; }
  },[conversation,loading]);

  var starters=getStarterPrompts(cv,jobs);

  async function send(userText){
    var text=(userText||input).trim();
    if(!text||loading) return;
    if(!anthropicKey){ setError("Add your Anthropic API key in Search Profiles → API keys first."); return; }
    setError("");
    setInput("");
    var newMsgs=conversation.concat([{role:"user",content:text}]);
    setConversation(newMsgs);
    setLoading(true);
    try{
      var reply=await callClaudeChat({
        apiKey:anthropicKey,
        system:buildAssistantSystem(cv,profiles,jobs),
        messages:newMsgs,
        maxTokens:1200,
      });
      setConversation(newMsgs.concat([{role:"assistant",content:reply}]));
    }catch(e){
      setError(e.message||"Failed to reach Claude.");
      // Roll back the user message so they can retry without duplicating it
      setConversation(conversation);
      setInput(text);
    }
    setLoading(false);
  }

  function clearConversation(){
    if(!confirm("Clear this conversation? This cannot be undone.")) return;
    setConversation([]);
    setError("");
    setInput("");
  }

  function saveProfile(prof){
    var newProfile={id:Date.now(),name:prof.name,query:prof.query,limit:prof.limit,sources:prof.sources,active:true};
    setProfiles(function(prev){return prev.concat([newProfile]);});
    setJustSavedId(newProfile.id);
  }
  function runNow(profileId){
    // Switch to Search Profiles tab and mark this profile ID to auto-fetch
    setPendingProfileRun(profileId);
    setActiveTab("profiles");
  }

  // Render one assistant reply as a mix of text paragraphs and profile cards
  // Lightweight markdown renderer for assistant replies. Handles the subset
  // Claude actually uses: **bold**, *italic*, `code`, bullet lists (- item),
  // and paragraph breaks. Full library would be overkill for this scope.
  function renderMarkdown(text){
    if(!text) return null;
    // Split into paragraphs on double newlines; single newlines preserved within
    var paragraphs=text.split(/\n{2,}/);
    return paragraphs.map(function(para,pi){
      var lines=para.split("\n");
      // Detect bullet list block: lines starting with "- " or "• "
      var isList=lines.every(function(l){return !l.trim()||/^[-•*]\s/.test(l.trim());});
      if(isList){
        var items=lines.filter(function(l){return l.trim();}).map(function(l){
          return l.trim().replace(/^[-•*]\s+/,"");
        });
        return <ul key={pi} style={{margin:"4px 0 4px 18px",padding:0,listStyleType:"disc"}}>
          {items.map(function(item,ii){
            return <li key={ii} style={{fontSize:14,lineHeight:1.6,color:C.textPrimary,marginBottom:2}}>{inlineFormat(item)}</li>;
          })}
        </ul>;
      }
      // Regular paragraph
      return <p key={pi} style={{margin:"0 0 6px 0",fontSize:14,lineHeight:1.6,color:C.textPrimary}}>{inlineFormat(para)}</p>;
    });
  }

  // Parse inline formatting: **bold**, *italic*, `code` within a string.
  // Returns an array of React nodes (strings and spans).
  function inlineFormat(str){
    var result=[];
    // Pattern matches **bold**, *italic*, `code` in order
    var re=/\*\*(.+?)\*\*|\*(.+?)\*|`([^`]+)`/g;
    var last=0;
    var m;
    while((m=re.exec(str))!==null){
      if(m.index>last) result.push(str.slice(last,m.index));
      if(m[1]!==undefined) result.push(<strong key={m.index} style={{fontWeight:700}}>{m[1]}</strong>);
      else if(m[2]!==undefined) result.push(<em key={m.index} style={{fontStyle:"italic"}}>{m[2]}</em>);
      else if(m[3]!==undefined) result.push(<code key={m.index} style={{fontFamily:"monospace",fontSize:13,background:C.surfaceAlt,padding:"1px 5px",borderRadius:4,color:C.textPrimary}}>{m[3]}</code>);
      last=m.index+m[0].length;
    }
    if(last<str.length) result.push(str.slice(last));
    return result;
  }

  function renderAssistantMessage(reply,msgIdx){
    var parsed=extractProfiles(reply);
    var blocks=[];
    // Interleave: textParts and profiles in order of appearance
    var re=/<<<PROFILE>>>[\s\S]*?<<<\/PROFILE>>>/g;
    var order=[]; // [{type:'text',value}|{type:'profile',value}]
    var lastIndex=0;
    var m;
    var pIdx=0;
    while((m=re.exec(reply))!==null){
      var before=reply.slice(lastIndex,m.index).trim();
      if(before) order.push({type:"text",value:before});
      if(parsed.profiles[pIdx]) order.push({type:"profile",value:parsed.profiles[pIdx]});
      pIdx++;
      lastIndex=re.lastIndex;
    }
    var tail=reply.slice(lastIndex).trim();
    if(tail) order.push({type:"text",value:tail});
    if(!order.length) order.push({type:"text",value:reply.trim()});

    return order.map(function(item,i){
      if(item.type==="text"){
        return <div key={i} style={{lineHeight:1.55,fontSize:14,color:C.textPrimary}}>{renderMarkdown(item.value)}</div>;
      }
      var p=item.value;
      // Check if already saved (match by name+query for simplicity)
      var alreadySaved=profiles.some(function(sp){return sp.name===p.name&&sp.query===p.query;});
      return <ProfileCard key={i} profile={p} alreadySaved={alreadySaved} justSaved={justSavedId&&profiles.find(function(sp){return sp.id===justSavedId;})&&profiles.find(function(sp){return sp.id===justSavedId;}).name===p.name} onSave={function(){saveProfile(p);}} onRun={function(){if(justSavedId) runNow(justSavedId);}} />;
    });
  }

  return <div style={{display:"flex",flexDirection:"column",gap:16}}>
    <Card>
      <SectionTitle action={conversation.length>0?<Btn onClick={clearConversation} style={{fontSize:12,padding:"6px 12px"}}>Clear conversation</Btn>:null}>Profile Assistant</SectionTitle>
      <div style={{fontSize:13,color:C.textHint,marginBottom:14}}>A focused chatbot that helps you design high-quality search profiles from your CV. It only discusses this app and search-profile design — not general topics.</div>
      {!anthropicKey&&<Alert type="warning">Add your Anthropic API key in Search Profiles → API keys to use the assistant.</Alert>}
      {!hasCv(cv)&&anthropicKey&&<Alert type="info">Tip: Upload or paste your CV in the My CV tab first, so the assistant can tailor suggestions to your background.</Alert>}
    </Card>

    <Card>
      <div ref={scrollRef} style={{maxHeight:"60vh",overflowY:"auto",display:"flex",flexDirection:"column",gap:14,paddingRight:4}}>
        {conversation.length===0&&<div>
          <div style={{fontSize:14,color:C.textSecondary,marginBottom:12,lineHeight:1.55}}>
            Hi! I can help you turn your CV into focused search profiles, explain what the connected APIs can do, and walk you through any feature in the app.
            {starters[0]&&starters[0].indexOf("highest-scoring")>=0&&<span> <span style={{color:C.primary,fontWeight:600}}>You now have enough scored jobs for smart suggestions — try the first starter below.</span></span>}
          </div>
          <div style={{fontSize:12,color:C.textHint,fontWeight:600,letterSpacing:"0.5px",marginBottom:8}}>TRY ONE OF THESE:</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {starters.map(function(s,i){
              var isSmart=s.indexOf("highest-scoring")>=0;
              return <button key={i} onClick={function(){send(s);}} disabled={loading||!anthropicKey} style={{textAlign:"left",padding:"12px 14px",borderRadius:10,border:"1.5px solid "+(isSmart?C.primary:C.border),background:isSmart?C.primaryLight:C.surfaceAlt,color:C.textPrimary,fontSize:13,cursor:loading||!anthropicKey?"not-allowed":"pointer",opacity:loading||!anthropicKey?0.5:1,fontWeight:isSmart?600:400}}>{isSmart?"✨":"💬"} {s}</button>;
            })}
          </div>
        </div>}
        {conversation.map(function(msg,i){
          if(msg.role==="user"){
            return <div key={i} style={{alignSelf:"flex-end",maxWidth:"85%",background:C.primary,color:"#fff",padding:"10px 14px",borderRadius:"14px 14px 2px 14px",fontSize:14,lineHeight:1.5,whiteSpace:"pre-wrap"}}>{msg.content}</div>;
          }
          return <div key={i} style={{alignSelf:"flex-start",maxWidth:"95%",width:"95%"}}>
            <div style={{fontSize:11,color:C.textHint,fontWeight:600,letterSpacing:"0.5px",marginBottom:4}}>ASSISTANT</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>{renderAssistantMessage(msg.content,i)}</div>
          </div>;
        })}
        {loading&&<div style={{alignSelf:"flex-start",fontSize:13,color:C.textHint,fontStyle:"italic"}}>Thinking…</div>}
      </div>
      {error&&<Alert type="error">{error}</Alert>}
      <div style={{display:"flex",gap:8,marginTop:14}}>
        <Inp value={input} onChange={function(e){setInput(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey&&input.trim()&&!loading&&anthropicKey){e.preventDefault();send();}}} enterKeyHint="send" placeholder="Ask about profiles, APIs, or features…" style={{flex:1}} />
        <Btn variant="primary" onClick={function(){send();}} disabled={loading||!input.trim()||!anthropicKey} style={{padding:"10px 20px"}}>Send</Btn>
      </div>
    </Card>
  </div>;
}

// Saveable profile card rendered inline in assistant replies.
function ProfileCard({profile,alreadySaved,justSaved,onSave,onRun}){
  var p=profile;
  var srcLabels=p.sources.map(function(s){return s==="af"?"Arbetsförmedlingen":"JSearch";}).join(" + ");
  return <div style={{border:"2px solid "+C.primary,borderRadius:12,padding:"14px 16px",background:C.primaryLight}}>
    <div style={{fontSize:11,fontWeight:700,color:C.primary,letterSpacing:"0.5px",marginBottom:6}}>SUGGESTED PROFILE</div>
    <div style={{fontSize:15,fontWeight:700,color:C.textPrimary,marginBottom:4}}>{p.name}</div>
    <div style={{fontSize:13,color:C.textSecondary,marginBottom:8}}>Query: <span style={{fontFamily:"monospace",background:"#fff",padding:"1px 6px",borderRadius:4}}>{p.query}</span></div>
    <div style={{fontSize:12,color:C.textSecondary,marginBottom:p.reasoning?8:12}}>{srcLabels} · max {p.limit} results</div>
    {p.reasoning&&<div style={{fontSize:12,color:C.textHint,fontStyle:"italic",marginBottom:12}}>💡 {p.reasoning}</div>}
    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
      {!alreadySaved&&!justSaved&&<Btn variant="primary" onClick={onSave} style={{fontSize:13,padding:"7px 14px"}}>+ Save this profile</Btn>}
      {(alreadySaved||justSaved)&&<div style={{fontSize:13,color:C.success,fontWeight:600,padding:"7px 0"}}>✓ Saved</div>}
      {justSaved&&<Btn onClick={onRun} style={{fontSize:13,padding:"7px 14px"}}>▶ Run now</Btn>}
    </div>
  </div>;
}

// ─── Sign-in screen ───────────────────────────────────────────────────────────
// Full-screen gate shown when no user is authenticated. Signing in with Google
// is the only path forward — we don't support anonymous mode because the whole
// point of moving to the cloud is to tie data to an identity.
function SignInScreen({onSignIn,error,loading}){
  return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"}}>
    <div style={{maxWidth:420,width:"100%",background:C.surface,borderRadius:20,boxShadow:C.shadowMd,padding:"40px 32px",textAlign:"center"}}>
      <div style={{width:64,height:64,borderRadius:18,background:C.primary,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:32,marginBottom:18}}>🌿</div>
      <div style={{fontSize:22,fontWeight:800,color:C.textPrimary,marginBottom:6}}>Job Tracker</div>
      <div style={{fontSize:14,color:C.textSecondary,marginBottom:28,lineHeight:1.55}}>Sign in to access your jobs, profiles and CV from any device.</div>
      <button onClick={onSignIn} disabled={loading} style={{display:"inline-flex",alignItems:"center",justifyContent:"center",gap:12,padding:"12px 22px",borderRadius:12,border:"1.5px solid "+C.border,background:"#fff",color:C.textPrimary,fontSize:14,fontWeight:600,cursor:loading?"wait":"pointer",width:"100%",opacity:loading?0.6:1}}>
        {/* Google "G" logo as inline SVG. Better than an emoji because it's recognisable. */}
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.167 6.656 3.58 9 3.58z"/></svg>
        {loading?"Signing in...":"Sign in with Google"}
      </button>
      {error&&<div style={{marginTop:16,padding:"10px 14px",background:"#FDECEA",color:"#C0392B",borderRadius:10,fontSize:13,textAlign:"left"}}>{error}</div>}
      <div style={{marginTop:28,paddingTop:20,borderTop:"1px solid "+C.border,fontSize:11,color:C.textHint,lineHeight:1.55,textAlign:"left"}}>
        Your data syncs across devices via Firebase. Only you can access your jobs and profiles. We don't share or analyse your data.
      </div>
    </div>
  </div>;
}

// Full-page splash shown while we wait for Firebase SDK to load and resolve
// the initial auth state. Brief — usually <500ms — but the user shouldn't see
// a flicker between the empty state and the sign-in screen.
function AuthSplash(){
  return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"}}>
    <div style={{textAlign:"center"}}>
      <div style={{width:48,height:48,borderRadius:14,background:C.primary,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:24,marginBottom:14}}>🌿</div>
      <div style={{fontSize:13,color:C.textHint}}>Loading…</div>
    </div>
  </div>;
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App(){
  // Auth state: tracks who's signed in (or null) and whether we know yet.
  // "loading" is true until Firebase resolves the initial auth state — happens
  // on every page load, usually <500ms. "authError" surfaces sign-in failures.
  // "fbReadyTick" forces a re-render once the SDK module finishes loading.
  var [user,setUser]=useState(null);
  var [authLoading,setAuthLoading]=useState(true);
  var [authError,setAuthError]=useState("");
  var [fbReadyTick,setFbReadyTick]=useState(fbReady());

  // Wait for the Firebase SDK module to finish loading. The module sets
  // window.__firebaseReady=true and dispatches a "firebase-ready" event.
  useEffect(function(){
    if(fbReady()){ setFbReadyTick(true); return; }
    function onReady(){ setFbReadyTick(true); }
    window.addEventListener("firebase-ready",onReady);
    // Polling fallback in case the event fired before this effect attached
    var interval=setInterval(function(){
      if(fbReady()){ setFbReadyTick(true); clearInterval(interval); }
    },100);
    return function(){
      window.removeEventListener("firebase-ready",onReady);
      clearInterval(interval);
    };
  },[]);

  // Subscribe to auth state changes. Fires once with the initial state, then
  // again on every sign-in / sign-out. Cleanly unsubscribes on unmount.
  useEffect(function(){
    if(!fbReadyTick) return;
    var sdk=window.firebaseSdk;
    var unsub=sdk.onAuthStateChanged(sdk.auth,function(u){
      setUser(u);
      setAuthLoading(false);
    });
    return unsub;
  },[fbReadyTick]);

  // signingIn tracks the window between clicking "Sign in" and onAuthStateChanged
  // resolving. During this window user is still null but we don't want to show
  // the button as clickable — that's exactly what caused the double-click bug.
  var [signingIn,setSigningIn]=useState(false);

  function handleSignIn(){
    if(!fbReady()||signingIn) return;
    setAuthError("");
    setSigningIn(true);
    var sdk=window.firebaseSdk;
    var provider=new sdk.GoogleAuthProvider();
    sdk.signInWithPopup(sdk.auth,provider).catch(function(err){
      // Surface a helpful message. The user-cancelled case is silent.
      if(err.code==="auth/popup-closed-by-user"||err.code==="auth/cancelled-popup-request"){
        setSigningIn(false); return;
      }
      if(err.code==="auth/popup-blocked") setAuthError("Your browser blocked the sign-in popup. Allow popups for this site and try again.");
      else if(err.code==="auth/unauthorized-domain") setAuthError("This domain isn't authorised in Firebase. Add it to Authentication → Settings → Authorised domains.");
      else setAuthError(err.message||"Sign-in failed. Try again.");
      setSigningIn(false);
    });
    // Note: on success we don't need to setSigningIn(false) — onAuthStateChanged
    // fires, sets user to non-null, and the component switches to AppShell.
    // The SignInScreen unmounts so state cleanup is irrelevant.
  }

  function handleSignOut(){
    if(!fbReady()) return;
    if(!confirm("Sign out? Your synced data stays in the cloud, but local data on this device will be cleared.")) return;
    var sdk=window.firebaseSdk;
    // Flush any pending cloud writes before signing out
    if(_cloudSavePending&&user) cloudSave(user.uid,_cloudSavePending,{immediate:true});
    sdk.signOut(sdk.auth).then(function(){
      // Clear local cache so the next user on this device starts fresh
      clearState();
      // Force a full page reload to reset all React state cleanly
      setTimeout(function(){ window.location.reload(); },100);
    });
  }

  // Gate the app behind sign-in.
  if(!fbReadyTick||authLoading) return <AuthSplash />;
  if(!user) return <SignInScreen onSignIn={handleSignIn} error={authError} loading={signingIn} />;

  // Past this point, `user` is non-null. Everything below assumes signed-in state.
  return <AppShell user={user} onSignOut={handleSignOut} />;
}

// AppShell holds all the actual app logic. Split out so the auth gate (above)
// stays simple and AppShell can assume user is non-null. user.uid is used to
// scope all cloud reads/writes.
function AppShell({user,onSignOut}){
  // Load persisted state once on first render — this is the local cache,
  // updated either by user actions or by Firestore snapshots.
  var saved=loadState();
  var [activeTab,setActiveTab]=useState(function(){return pick(saved,"activeTab","dashboard");});
  var [sidebarCollapsed,setSidebarCollapsed]=useState(function(){return pick(saved,"sidebarCollapsed",false);});
  // Theme is device-local (not synced) — initialised from localStorage at
  // module load. The state here just lets us trigger re-renders when the user
  // toggles, since `applyTheme` mutates the C/STATUS/SOURCES module-level
  // objects directly.
  var [theme,setThemeState]=useState(function(){return getSavedTheme();});
  function setTheme(next){
    applyTheme(next);
    try{ localStorage.setItem(THEME_KEY,next); }catch(e){}
    setThemeState(next);
  }
  var [mobileMenuOpen,setMobileMenuOpen]=useState(false); // ephemeral
  var [jobs,setJobs]=useState(function(){return pick(saved,"jobs",SAMPLE_JOBS);});
  var [profiles,setProfiles]=useState(function(){return pick(saved,"profiles",SAMPLE_PROFILES);});
  var [cv,setCv]=useState(function(){
    var saved_cv=pick(saved,"cv",null);
    var defaults={text:"",fileName:"",uploaded:false,roles:"",industries:"",locations:"",salary:"",workType:"Any",recipients:[],tools:[],skills:[],achievements:[]};
    // Merge saved CV over defaults so new fields (tools/skills/achievements)
    // are always present even if the saved snapshot predates them.
    return saved_cv?Object.assign({},defaults,saved_cv):defaults;
  });
  var [afKey,setAfKey]=useState(function(){return pick(saved,"afKey","");});
  var [jsKey,setJsKey]=useState(function(){return pick(saved,"jsKey","");});
  var [anthropicKey,setAnthropicKey]=useState(function(){return pick(saved,"anthropicKey","");});
  var [schedule,setSchedule]=useState(function(){return pick(saved,"schedule",DEFAULT_SCHEDULE);});
  var [log,setLog]=useState(function(){return pick(saved,"log",[]);});
  var [sort,setSort]=useState(function(){return pick(saved,"sort","added_desc");});
  var [assistantConv,setAssistantConv]=useState(function(){return pick(saved,"assistantConv",[]);});
  // Tombstone list: jobs the user has dismissed or deleted. Stored as an array
  // of STRING ids (serialisable to JSON). Ingestion checks against this set so
  // previously-rejected jobs aren't re-added on subsequent fetches from the
  // same source. Survives reloads and is included in backups.
  var [dismissedIds,setDismissedIds]=useState(function(){return pick(saved,"dismissedIds",[]);});
  var [pendingProfileRun,setPendingProfileRun]=useState(null); // ephemeral — not persisted
  var [pendingCoverLetterJob,setPendingCoverLetterJob]=useState(null); // ephemeral — Job ID handed off from Jobs to CoverLetters when "✉ Cover letter" clicked
  // Deep-link payload from Dashboard → Jobs. Shape: {filter: {...}, expandId: <jobId>}.
  // Jobs reads this on mount, applies the filter / expansion, then clears it.
  // Examples:
  //   navigateToJobs({status: "Applied"})           → My Jobs filtered to Applied
  //   navigateToJobs({statusGroup: "applied"})      → filtered to APPLIED_STATUSES (any post-application state)
  //   navigateToJobs({status: "Rejected"})          → just rejected jobs
  //   navigateToJobs({expandId: 1234567})           → no filter change, just expand that job
  //   navigateToJobs({})                            → unfiltered Jobs view
  var [pendingJobsView,setPendingJobsView]=useState(null);
  function navigateToJobs(payload){
    setPendingJobsView(payload||{});
    setActiveTab("jobs");
  }
  var [scoringStatus,setScoringStatus]=useState({active:false,done:0,total:0});
  var [scoringError,setScoringError]=useState("");
  // Toast state for quick-dismiss with undo. Holds the jobs removed within the
  // current 8-second undo window, so rapid dismissals collapse into one
  // "N dismissed" toast rather than stacking.
  var [dismissed,setDismissed]=useState([]); // [{job, removedAt}]
  var dismissTimerRef=useRef(null);
  var tickRef=useRef(null);
  var scoringRef=useRef(false); // guard against concurrent scoring runs

  // Track whether we've received the initial cloud snapshot. We don't push
  // local writes to the cloud until we've heard back from it once — otherwise
  // the local default state would overwrite cloud state on first load.
  var [cloudReady,setCloudReady]=useState(false);
  var cloudReadyRef=useRef(false);
  // After the initial cloud snapshot is applied, we suppress Firestore writes
  // for 2 seconds. This gives React time to settle ALL the setCv/setJobs/etc
  // state updates from hydration before the persistence effect can fire and
  // write stale pre-hydration state (e.g. tools:[]) back to Firestore.
  // setTimeout(0) was not enough — React batches updates across ticks.
  var suppressWriteUntilRef=useRef(0);
  var lastCloudWriteRef=useRef(0);

  // Persist state on any change. Writes to localStorage immediately (sync,
  // never fails) and to Firestore via debounced cloudSave (async, may fail
  // offline but Firestore queues retries). Uses cloudReadyRef (not cloudReady
  // state) so flipping cloudReady to true never itself triggers a write — the
  // cloud subscription sets both the ref and the state, and by the time any
  // data-change effect fires, the ref is already true. This prevents the race
  // where cloudReady flips before setCv(cloudData) settles, causing a write
  // of empty defaults that clobbers Firestore.
  useEffect(function(){
    var data={activeTab:activeTab,jobs:jobs,profiles:profiles,cv:cv,afKey:afKey,jsKey:jsKey,anthropicKey:anthropicKey,schedule:schedule,log:log,sort:sort,assistantConv:assistantConv,dismissedIds:dismissedIds,sidebarCollapsed:sidebarCollapsed};
    saveState(data);
    if(cloudReadyRef.current&&user&&user.uid&&Date.now()>suppressWriteUntilRef.current){
      console.log("[CloudSync] Writing to Firestore. cv.tools:", cv.tools&&cv.tools.length, "cv.skills:", cv.skills&&cv.skills.length, "cv.achievements:", cv.achievements&&cv.achievements.length);
      lastCloudWriteRef.current=Date.now();
      cloudSave(user.uid,data);
    }
  },[activeTab,jobs,profiles,cv,afKey,jsKey,anthropicKey,schedule,log,sort,assistantConv,dismissedIds,sidebarCollapsed,user]);

  // Subscribe to the user's cloud document. On the first snapshot we either
  // hydrate local state from the cloud (existing user) or push our local state
  // up (new user, first sign-in). After that, snapshots reflect changes from
  // OTHER devices; we apply them to local state so this device stays in sync.
  useEffect(function(){
    if(!user||!user.uid) return;
    var firstSnap=true;
    var unsub=cloudSubscribe(user.uid,function(cloudData){
      if(firstSnap){
        firstSnap=false;
        if(cloudData){
          // DIAGNOSTIC: log what Firestore returned so we can verify tools/skills/achievements
          console.log("[CloudSync] First snapshot received. cv.tools:", cloudData.cv&&cloudData.cv.tools&&cloudData.cv.tools.length,"cv.skills:", cloudData.cv&&cloudData.cv.skills&&cloudData.cv.skills.length,"cv.achievements:", cloudData.cv&&cloudData.cv.achievements&&cloudData.cv.achievements.length);
          // Cloud has data — adopt it. Each piece updates only if it differs
          // from current local state, to avoid pointless re-renders.
          if(Array.isArray(cloudData.jobs)) setJobs(cloudData.jobs);
          if(Array.isArray(cloudData.profiles)) setProfiles(cloudData.profiles);
          // Merge cloud cv over local defaults so new fields (tools/skills/
          // achievements) are always present regardless of snapshot age.
          if(cloudData.cv) setCv(function(local){ return Object.assign({},local,cloudData.cv); });
          if(typeof cloudData.afKey==="string") setAfKey(cloudData.afKey);
          if(typeof cloudData.jsKey==="string") setJsKey(cloudData.jsKey);
          if(typeof cloudData.anthropicKey==="string") setAnthropicKey(cloudData.anthropicKey);
          if(cloudData.schedule) setSchedule(cloudData.schedule);
          if(Array.isArray(cloudData.log)) setLog(cloudData.log);
          if(typeof cloudData.sort==="string") setSort(cloudData.sort);
          if(Array.isArray(cloudData.assistantConv)) setAssistantConv(cloudData.assistantConv);
          if(Array.isArray(cloudData.dismissedIds)) setDismissedIds(cloudData.dismissedIds);
        }
        // Suppress Firestore writes for 2 seconds after hydration so React has
        // time to settle all state updates before the persistence effect fires.
        // This prevents writing stale pre-hydration state (e.g. tools:[]) back
        // to Firestore and clobbering the data we just read from it.
        suppressWriteUntilRef.current=Date.now()+2000;
        cloudReadyRef.current=true;
        setCloudReady(true);
      }else if(cloudData){
        // Subsequent snapshots = changes from another device. Ignore if it
        // looks like our own echo (within 2s of our last write).
        if(Date.now()-lastCloudWriteRef.current<2000) return;
        if(Array.isArray(cloudData.jobs)) setJobs(cloudData.jobs);
        if(Array.isArray(cloudData.profiles)) setProfiles(cloudData.profiles);
        if(cloudData.cv) setCv(function(local){ return Object.assign({},local,cloudData.cv); });
        if(typeof cloudData.afKey==="string") setAfKey(cloudData.afKey);
        if(typeof cloudData.jsKey==="string") setJsKey(cloudData.jsKey);
        if(typeof cloudData.anthropicKey==="string") setAnthropicKey(cloudData.anthropicKey);
        if(cloudData.schedule) setSchedule(cloudData.schedule);
        if(Array.isArray(cloudData.log)) setLog(cloudData.log);
        if(typeof cloudData.sort==="string") setSort(cloudData.sort);
        if(Array.isArray(cloudData.assistantConv)) setAssistantConv(cloudData.assistantConv);
        if(Array.isArray(cloudData.dismissedIds)) setDismissedIds(cloudData.dismissedIds);
      }
    });
    return unsub;
  // eslint-disable-next-line
  },[user]);

  // Keyboard shortcut: `[` toggles sidebar collapse. Follows Linear/Notion
  // convention. Ignored when typing in inputs or textareas so it doesn't
  // hijack square-bracket characters in forms.
  useEffect(function(){
    function onKey(e){
      if(e.key!=="[") return;
      var t=e.target;
      var tag=t&&t.tagName;
      if(tag==="INPUT"||tag==="TEXTAREA"||t.isContentEditable) return;
      if(e.metaKey||e.ctrlKey||e.altKey) return;
      setSidebarCollapsed(function(v){return !v;});
    }
    window.addEventListener("keydown",onKey);
    return function(){ window.removeEventListener("keydown",onKey); };
  },[]);

  // Remove a single job immediately and show an undo toast. Each call resets
  // the 8-second timer so rapid-fire dismissals all stay undoable. The job's
  // id is added to the tombstone list so that if the source (e.g. AF/JSearch)
  // re-returns it on a later fetch, ingestion will skip it.
  function dismissJob(jobId){
    var job=jobs.find(function(j){return j.id===jobId;});
    if(!job) return;
    var sid=String(jobId);
    setJobs(function(prev){return prev.filter(function(j){return j.id!==jobId;});});
    setDismissedIds(function(prev){return prev.indexOf(sid)>=0?prev:prev.concat([sid]);});
    setDismissed(function(prev){return prev.concat([{job:job,removedAt:Date.now()}]);});
    if(dismissTimerRef.current) clearTimeout(dismissTimerRef.current);
    dismissTimerRef.current=setTimeout(function(){
      // Window expired — make removal permanent by clearing the toast buffer
      setDismissed([]);
      dismissTimerRef.current=null;
    },8000);
  }
  function undoDismiss(){
    if(dismissTimerRef.current){ clearTimeout(dismissTimerRef.current); dismissTimerRef.current=null; }
    // Restore every job in the buffer to state AND remove their ids from the
    // tombstone list (so if the source re-offers them later, they come back).
    var restoreIds=dismissed.map(function(d){return String(d.job.id);});
    setJobs(function(prev){
      var restored=dismissed.map(function(d){return d.job;});
      return prev.concat(restored);
    });
    setDismissedIds(function(prev){return prev.filter(function(id){return restoreIds.indexOf(id)<0;});});
    setDismissed([]);
  }
  // Add many ids to the tombstone list at once (used by bulk Delete).
  // Deduplicates implicitly via the Set round-trip.
  function tombstoneIds(ids){
    if(!ids||!ids.length) return;
    setDismissedIds(function(prev){
      var s=new Set(prev);
      ids.forEach(function(id){s.add(String(id));});
      return Array.from(s);
    });
  }

  // Apply scoring results to jobs in state. Keys are compared as strings to
  // handle both numeric (manual) and string (AF/JSearch) job IDs.
  function applyScores(scoreMap){
    setJobs(function(prev){
      return prev.map(function(j){
        var r=scoreMap.get(String(j.id));
        if(!r) return j;
        return Object.assign({},j,{score:r.score,rationale:r.rationale,scored:true});
      });
    });
  }

  // Score a specific set of jobs. Used by both auto-scoring and Rescore all.
  async function runScoring(targetJobs){
    if(scoringRef.current) return;
    if(!hasCv(cv)){ addLog("Scoring skipped — no CV set","error"); setScoringError("No CV set. Go to the My CV tab and upload or paste your CV."); return; }
    if(!anthropicKey){ addLog("Scoring skipped — no Anthropic API key","error"); setScoringError("No Anthropic API key. Go to Search Profiles → API keys and paste your key."); return; }
    if(!targetJobs.length) return;
    scoringRef.current=true;
    setScoringError("");
    setScoringStatus({active:true,done:0,total:targetJobs.length});
    var failed=0;
    var firstError="";
    try{
      // Chunk into BATCH_SIZE API calls so the UI can update between each batch
      for(var i=0;i<targetJobs.length;i+=BATCH_SIZE){
        var batch=targetJobs.slice(i,i+BATCH_SIZE);
        try{
          var scored=await scoreJobBatch(batch,cv,anthropicKey);
          var resultMap=new Map();
          scored.forEach(function(s){
            if(s&&s.id!==undefined&&s.id!==null){
              var score=Math.max(0,Math.min(100,Math.round(Number(s.score)||0)));
              resultMap.set(String(s.id),{score:score,rationale:(s.rationale||"").toString().slice(0,120)});
            }
          });
          if(resultMap.size>0) applyScores(resultMap);
        }catch(err){
          console.warn("Batch scoring failed:",err);
          if(!firstError) firstError=err.message||String(err);
          failed+=batch.length;
        }
        setScoringStatus({active:true,done:Math.min(i+batch.length,targetJobs.length),total:targetJobs.length});
      }
      var ok=targetJobs.length-failed;
      if(failed===0){ addLog("Scored "+ok+" job"+(ok!==1?"s":""),"manual"); }
      else if(ok>0){ addLog("Scored "+ok+" job"+(ok!==1?"s":"")+", "+failed+" failed: "+firstError,"manual"); setScoringError(firstError); }
      else{ addLog("Scoring failed for all "+failed+" jobs: "+firstError,"error"); setScoringError(firstError); }
    }finally{
      scoringRef.current=false;
      setScoringStatus({active:false,done:0,total:0});
    }
  }

  // Auto-score any jobs that haven't been scored yet, whenever jobs or CV change.
  // Debounced via a short delay so rapid fetches (e.g. Run All) batch together.
  // Archived jobs are skipped — no point spending API tokens on jobs the user
  // has decluttered from their active pipeline.
  useEffect(function(){
    if(!hasCv(cv)) return;
    var unscored=jobs.filter(function(j){return j.scored===false&&!j.archived;});
    if(!unscored.length) return;
    var t=setTimeout(function(){
      // Re-read latest unscored to avoid double-scoring after state update
      runScoring(unscored);
    },800);
    return function(){ clearTimeout(t); };
  // eslint-disable-next-line
  },[jobs,cv]);

  function rescoreAll(){
    if(!hasCv(cv)){ alert("Add your CV first — go to the My CV tab."); return; }
    if(!jobs.length) return;
    // Mark all NON-ARCHIVED jobs unscored, which triggers the auto-score effect.
    // Archived jobs keep their existing scores — if you unarchive one later its
    // score stays intact until you manually rescore.
    setJobs(function(prev){ return prev.map(function(j){ return j.archived?j:Object.assign({},j,{scored:false}); }); });
  }

  function resetAllData(){
    if(!confirm("Reset all data? This will delete your jobs, profiles, CV, API keys, schedule and run log — both locally AND in the cloud. This cannot be undone.")) return;
    clearState();
    // Also wipe the cloud document so the reset survives across devices.
    if(user&&user.uid) cloudDelete(user.uid);
    setJobs(SAMPLE_JOBS);
    setProfiles(SAMPLE_PROFILES);
    setCv({text:"",fileName:"",uploaded:false,roles:"",industries:"",locations:"",salary:"",workType:"Any",recipients:[],tools:[],skills:[],achievements:[]});
    setAfKey("");
    setJsKey("");
    setAnthropicKey("");
    setSchedule(DEFAULT_SCHEDULE);
    setLog([]);
    setSort("added_desc");
    setAssistantConv([]);
    setDismissedIds([]);
    setScoringError("");
    setActiveTab("dashboard");
  }

  // Backup current state to a downloadable JSON file. schemaVersion lets
  // future app releases migrate older backups if the shape changes.
  // When excludeKeys is true, API keys are blanked out so the file is safe
  // to share (e.g. attaching to a support issue or syncing via email).
  function exportData(excludeKeys){
    var payload={
      schemaVersion:1,
      exportedAt:new Date().toISOString(),
      appName:"job-tracker",
      data:{
        jobs:jobs,
        profiles:profiles,
        cv:cv,
        afKey:excludeKeys?"":afKey,
        jsKey:excludeKeys?"":jsKey,
        anthropicKey:excludeKeys?"":anthropicKey,
        schedule:schedule,
        log:log,
        sort:sort,
        assistantConv:assistantConv,
        dismissedIds:dismissedIds,
      },
    };
    var json=JSON.stringify(payload,null,2);
    var blob=new Blob([json],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url;
    // ISO date in filename keeps files sortable chronologically in the OS
    a.download="job-tracker-backup-"+new Date().toISOString().slice(0,10)+(excludeKeys?"-no-keys":"")+".json";
    a.click();
    // Let the browser free the blob after a tick
    setTimeout(function(){ URL.revokeObjectURL(url); },100);
  }

  // Validate an imported payload. Returns null if valid, else an error string.
  // Doesn't restore anything; that's the caller's job after confirmation.
  function validateImport(obj){
    if(!obj||typeof obj!=="object") return "File is not a valid backup.";
    if(obj.appName!=="job-tracker") return "This file isn't a job-tracker backup.";
    if(typeof obj.schemaVersion!=="number") return "Backup is missing a schema version.";
    if(obj.schemaVersion>1) return "This backup is from a newer version of the app. Update first.";
    if(!obj.data||typeof obj.data!=="object") return "Backup has no data section.";
    if(!Array.isArray(obj.data.jobs)) return "Backup's jobs section is invalid.";
    if(!Array.isArray(obj.data.profiles)) return "Backup's profiles section is invalid.";
    return null;
  }

  // Replace all state with the payload. Caller has already validated + confirmed.
  function importData(obj){
    var d=obj.data;
    setJobs(d.jobs||[]);
    setProfiles(d.profiles||[]);
    setCv(d.cv||{text:"",fileName:"",uploaded:false,roles:"",industries:"",locations:"",salary:"",workType:"Any",recipients:[]});
    // Keys from a backup replace current keys — but only overwrite if the
    // backup provides a non-empty value, so "no-keys" backups don't wipe
    // the user's current keys on the restoring device.
    if(d.afKey) setAfKey(d.afKey);
    if(d.jsKey) setJsKey(d.jsKey);
    if(d.anthropicKey) setAnthropicKey(d.anthropicKey);
    setSchedule(d.schedule||DEFAULT_SCHEDULE);
    setLog(d.log||[]);
    setSort(d.sort||"added_desc");
    setAssistantConv(d.assistantConv||[]);
    // Tombstone list — restore as array of strings. Missing from older backups:
    // treat that as empty rather than failing.
    setDismissedIds(Array.isArray(d.dismissedIds)?d.dismissedIds.map(String):[]);
    setScoringError("");
  }

  function addLog(msg,type){
    var now=new Date();
    var time=now.toLocaleDateString()+" "+String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
    // Store numeric ts alongside formatted time so retention can prune by age
    setLog(function(l){return l.slice(-99).concat([{time:time,ts:now.getTime(),msg:msg,type:type||"scheduled"}]);});
  }

  // Prune log entries older than 30 days. Runs once on app startup. Entries
  // without a ts field (from older builds) are kept to avoid wiping legitimate
  // recent activity from users upgrading.
  useEffect(function(){
    var cutoff=Date.now()-30*24*60*60*1000;
    setLog(function(l){
      var pruned=l.filter(function(e){return !e.ts||e.ts>=cutoff;});
      return pruned.length===l.length?l:pruned;
    });
  // eslint-disable-next-line
  },[]);

  var runAllProfiles=useCallback(async function(triggered){
    var active=profiles.filter(function(p){return p.active;});
    if(!active.length) return;
    var totalNew=0;
    var errors=[];
    for(var i=0;i<active.length;i++){
      var p=active[i];
      var srcs=p.sources||["af"];
      for(var j=0;j<srcs.length;j++){
        var src=srcs[j];
        try{
          if(src==="af"){
            var h={"accept":"application/json"};
            if(afKey) h["api-key"]=afKey;
            var url="https://jobsearch.api.jobtechdev.se/search?q="+encodeURIComponent(p.query)+"&limit="+p.limit+"&resdet=full";
            var out=await smartFetch(url,{headers:h});
            var r=out.response;
            if(r.ok){var d=await r.json();var ads=d.hits||[];setJobs(function(prev){var ex=new Set(prev.map(function(x){return x.id?x.id.toString():""; }));var nj=ads.filter(function(a){return !ex.has(a.id?a.id.toString():"");}).map(function(a){return mapAfJob(a,p.name);});totalNew+=nj.length;return nj.concat(prev);});}
            else{errors.push(p.name+" (AF): "+r.status);}
          }
          if(src==="jsearch"&&jsKey){
            var url2="https://jsearch.p.rapidapi.com/search?query="+encodeURIComponent(p.query)+"&num_pages=1&page=1";
            var out2=await smartFetch(url2,{headers:{"x-rapidapi-key":jsKey,"x-rapidapi-host":"jsearch.p.rapidapi.com"}});
            var r2=out2.response;
            if(r2.ok){var d2=await r2.json();var ads2=(d2.data||[]).slice(0,p.limit);setJobs(function(prev){var ex=new Set(prev.map(function(x){return x.id?x.id.toString():""; }));var nj=ads2.filter(function(a){return !ex.has(a.job_id);}).map(function(a){return mapJsJob(a,p.name);});totalNew+=nj.length;return nj.concat(prev);});}
            else{errors.push(p.name+" (JSearch): "+r2.status);}
          }
        }catch(e){errors.push(p.name+": "+e.message);}
      }
    }
    var msg=(triggered==="manual"?"Manual":"Scheduled")+" run — "+active.length+" profile"+(active.length!==1?"s":"")+", "+totalNew+" new job"+(totalNew!==1?"s":"");
    if(errors.length) msg+=" · errors: "+errors.join("; ");
    addLog(msg,errors.length?"error":(triggered||"scheduled"));
  },[profiles,afKey,jsKey]);

  useEffect(function(){
    if(tickRef.current) clearInterval(tickRef.current);
    if(!schedule.enabled||!schedule.days.length) return;
    tickRef.current=setInterval(function(){
      var now=new Date();
      var dayName=DAYS[(now.getDay()+6)%7];
      if(!schedule.days.includes(dayName)) return;
      var nowMin=now.getHours()*60+now.getMinutes();
      var sh=parseInt(schedule.startTime.split(":")[0]);
      var sm=parseInt(schedule.startTime.split(":")[1]);
      var eh=parseInt(schedule.stopTime.split(":")[0]);
      var em=parseInt(schedule.stopTime.split(":")[1]);
      if(nowMin<sh*60+sm||nowMin>=eh*60+em) return;
      if((nowMin-sh*60-sm)%schedule.intervalMinutes===0) runAllProfiles("scheduled");
    },60000);
    return function(){clearInterval(tickRef.current);};
  },[schedule,runAllProfiles]);

  // Click handler for the per-row "✉ Cover letter" button. Smart: auto-bumps
  // a "New" job to "Reviewing" since starting to draft a letter clearly means
  // you're considering the role. Then hands off to the Cover Letters tab via
  // pendingCoverLetterJob state.
  function startCoverLetter(jobId){
    var j=jobs.find(function(x){return x.id===jobId;});
    if(!j) return;
    if(j.status==="New"){
      var nowIso=new Date().toISOString();
      setJobs(function(prev){return prev.map(function(x){
        if(x.id!==jobId) return x;
        // If the user later changes back to New and re-clicks, we don't want
        // to overwrite an earlier appliedAt — but a job in "New" shouldn't
        // have appliedAt anyway, so this is just defensive.
        var patch={status:"Reviewing"};
        return Object.assign({},x,patch);
      });});
    }
    setPendingCoverLetterJob(jobId);
    setActiveTab("covers");
  }

  var content={
    dashboard:<Dashboard jobs={jobs} schedule={schedule} setActiveTab={setActiveTab} navigateToJobs={navigateToJobs} />,
    jobs:<Jobs jobs={jobs} setJobs={setJobs} rescoreAll={rescoreAll} scoringStatus={scoringStatus} scoringError={scoringError} cv={cv} sort={sort} setSort={setSort} dismissJob={dismissJob} tombstoneIds={tombstoneIds} startCoverLetter={startCoverLetter} pendingJobsView={pendingJobsView} setPendingJobsView={setPendingJobsView} />,
    profiles:<SearchProfiles profiles={profiles} setProfiles={setProfiles} setJobs={setJobs} afKey={afKey} setAfKey={setAfKey} jsKey={jsKey} setJsKey={setJsKey} anthropicKey={anthropicKey} setAnthropicKey={setAnthropicKey} pendingProfileRun={pendingProfileRun} setPendingProfileRun={setPendingProfileRun} dismissedIds={dismissedIds} />,
    assistant:<ProfileAssistant cv={cv} profiles={profiles} setProfiles={setProfiles} anthropicKey={anthropicKey} conversation={assistantConv} setConversation={setAssistantConv} setActiveTab={setActiveTab} setPendingProfileRun={setPendingProfileRun} jobs={jobs} />,
    scheduler:<Scheduler schedule={schedule} setSchedule={setSchedule} profiles={profiles} log={log} resetAllData={resetAllData} exportData={exportData} importData={importData} validateImport={validateImport} dismissedIds={dismissedIds} clearDismissedIds={function(){setDismissedIds([]);}} />,
    cv:<CVProfile cv={cv} setCv={setCv} />,
    covers:<CoverLetters jobs={jobs} cv={cv} anthropicKey={anthropicKey} setActiveTab={setActiveTab} pendingCoverLetterJob={pendingCoverLetterJob} setPendingCoverLetterJob={setPendingCoverLetterJob} />,
    reports:<Reports jobs={jobs} cv={cv} anthropicKey={anthropicKey} />,
  };

  return <div className="jt-app" style={{background:C.bg,fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif",color:C.textPrimary}}>
    {/* Mobile-only top bar with hamburger. Hidden on desktop via CSS. */}
    <div className="jt-topbar">
      <button onClick={function(){setMobileMenuOpen(true);}} aria-label="Open navigation" style={{background:"transparent",border:"none",fontSize:22,cursor:"pointer",padding:"8px 10px",color:C.textPrimary,lineHeight:1}}>☰</button>
      <div style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:0}}>
        <div style={{width:28,height:28,borderRadius:8,background:C.primary,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>🌿</div>
        <div style={{fontSize:14,fontWeight:800,color:C.textPrimary,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{TABS.find(function(t){return t.id===activeTab;}).label}</div>
      </div>
    </div>
    <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} collapsed={sidebarCollapsed} setCollapsed={setSidebarCollapsed} mobileOpen={mobileMenuOpen} setMobileOpen={setMobileMenuOpen} user={user} onSignOut={onSignOut} theme={theme} setTheme={setTheme} />
    <div className={"jt-main"+(sidebarCollapsed?" sidebar-collapsed":"")}>
      <div className="jt-container">
        <TabErrorBoundary tabKey={activeTab}>
          {content[activeTab]}
        </TabErrorBoundary>
      </div>
    </div>
    {dismissed.length>0&&<DismissToast count={dismissed.length} last={dismissed[dismissed.length-1].job} onUndo={undoDismiss} />}
  </div>;
}

// Toast shown at the bottom of the viewport after dismissing job(s).
// Stays visible until the 8-second window expires (managed by App) or the
// user clicks Undo. Auto-adjusts wording for single vs multiple dismissals.
function DismissToast({count,last,onUndo}){
  var label=count===1
    ?"Dismissed \""+(last.title||"job")+"\" at "+(last.company||"")
    :"Dismissed "+count+" jobs";
  return <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"#2C3E50",color:"#fff",padding:"12px 18px",borderRadius:12,display:"flex",alignItems:"center",gap:16,boxShadow:"0 8px 24px rgba(0,0,0,0.2)",zIndex:1000,maxWidth:"calc(100% - 32px)",fontSize:14}}>
    <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{label}</span>
    <button onClick={onUndo} style={{background:"none",border:"none",color:"#85C1A6",fontSize:14,fontWeight:700,cursor:"pointer",padding:"4px 10px",borderRadius:8,flexShrink:0}}>Undo</button>
  </div>;
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
