    </div>
    <Card style={{display:"flex",alignItems:"center",gap:14,padding:"16px 20px"}}>
      <div style={{width:12,height:12,borderRadius:"50%",background:schedule.enabled?"#4CAF50":C.border,flexShrink:0,boxShadow:schedule.enabled?"0 0 0 3px rgba(76,175,80,0.2)":"none"}} />
      <div style={{flex:1}}>
        <div style={{fontSize:14,fontWeight:600,color:C.textPrimary}}>{schedule.enabled?"Auto-fetch is running":"Auto-fetch is off"}</div>
        <div style={{fontSize:12,color:C.textHint,marginTop:2}}>{schedule.enabled?"Fetching on "+schedule.days.join(", ")+" · "+schedule.startTime+"–"+schedule.stopTime+" · every "+schedule.intervalMinutes+" min":"Turn on the Scheduler to automatically fetch new jobs throughout the day."}</div>
      </div>
      <Btn onClick={function(){setActiveTab("scheduler");}} style={{fontSize:13,padding:"8px 16px",whiteSpace:"nowrap"}}>{schedule.enabled?"View schedule":"Set up schedule"}</Btn>
    </Card>
    <Card>
      <SectionTitle>Application pipeline</SectionTitle>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        {ACTIVE_STATUSES.map(function(s){
          var count=active.filter(function(j){return j.status===s;}).length;
          var clickable=count>0&&navigateToJobs;
          var inner=<React.Fragment>
            <div style={{fontSize:22,fontWeight:700,color:STATUS[s].color}}>{count}</div>
            <div style={{fontSize:11,fontWeight:600,color:STATUS[s].color,marginTop:4,opacity:0.8}}>{s}</div>
          </React.Fragment>;
          if(!clickable){
            return <div key={s} style={{flex:"1 1 100px",minWidth:90,background:STATUS[s].bg,borderRadius:12,padding:"14px 10px",textAlign:"center"}}>{inner}</div>;
          }
          return <button key={s} onClick={function(){navigateToJobs({status:s});}} style={{flex:"1 1 100px",minWidth:90,background:STATUS[s].bg,borderRadius:12,padding:"14px 10px",textAlign:"center",border:"none",cursor:"pointer",fontFamily:"inherit",transition:"transform 0.1s ease, box-shadow 0.15s ease"}} onMouseEnter={function(e){e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,0.08)";}} onMouseLeave={function(e){e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="";}}>{inner}</button>;
        })}
      </div>
      {closedTotal>0&&<div style={{marginTop:14,paddingTop:14,borderTop:"1px solid "+C.border,display:"flex",alignItems:"center",gap:16,flexWrap:"wrap",fontSize:12,color:C.textSecondary}}>
        <span style={{fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",color:C.textHint,fontSize:11}}>Closed</span>
        {rejectedCount>0&&(navigateToJobs
          ?<button onClick={function(){navigateToJobs({status:"Rejected"});}} style={{background:"none",border:"none",cursor:"pointer",color:C.textSecondary,fontFamily:"inherit",fontSize:12,padding:0,textDecoration:"underline",textDecorationColor:"transparent",textUnderlineOffset:3,transition:"text-decoration-color 0.15s"}} onMouseEnter={function(e){e.currentTarget.style.textDecorationColor=STATUS.Rejected.color;}} onMouseLeave={function(e){e.currentTarget.style.textDecorationColor="transparent";}}><b style={{color:STATUS.Rejected.color}}>{rejectedCount}</b> rejected</button>
          :<span><b style={{color:STATUS.Rejected.color}}>{rejectedCount}</b> rejected</span>)}
        {noResponseCount>0&&(navigateToJobs
          ?<button onClick={function(){navigateToJobs({status:"No response"});}} style={{background:"none",border:"none",cursor:"pointer",color:C.textSecondary,fontFamily:"inherit",fontSize:12,padding:0,textDecoration:"underline",textDecorationColor:"transparent",textUnderlineOffset:3,transition:"text-decoration-color 0.15s"}} onMouseEnter={function(e){e.currentTarget.style.textDecorationColor=STATUS["No response"].color;}} onMouseLeave={function(e){e.currentTarget.style.textDecorationColor="transparent";}}><b style={{color:STATUS["No response"].color}}>{noResponseCount}</b> no response</button>
          :<span><b style={{color:STATUS["No response"].color}}>{noResponseCount}</b> no response</span>)}
        <span style={{color:C.textHint,marginLeft:"auto"}}>Total closed: {closedTotal}</span>
      </div>}
      {(function(){
        // Gentle nudge: Applied jobs that have sat untouched for 30+ days are
        // candidates for "No response". We surface them here as a soft prompt
        // rather than auto-transitioning silently.
        var now=Date.now();
        var thirtyDaysMs=30*24*60*60*1000;
        var stale=active.filter(function(j){
          if(j.status!=="Applied") return false;
          // Prefer `appliedAt` (when the user actually moved the job to Applied).
          // Fall back to `date` (ingestion date) for legacy jobs that predate the
          // appliedAt tracking. Imperfect for those, but reasonable proxy.
          var ref=j.appliedAt||j.date;
          if(!ref) return false;
          return (now-new Date(ref).getTime())>thirtyDaysMs;
        });
        if(!stale.length) return null;
        return <Alert type="info">
          <span>{stale.length} applied job{stale.length!==1?"s have":" has"} been silent for 30+ days. <span style={{fontWeight:600,textDecoration:"underline",cursor:"pointer"}} onClick={function(){setActiveTab("jobs");}}>Review in My Jobs</span> and mark as <i>No response</i> if appropriate to close the loop.</span>
        </Alert>;
      })()}
    </Card>
    <Card>
      <SectionTitle action={<Btn onClick={function(){setActiveTab("jobs");}} style={{fontSize:12,padding:"6px 14px"}}>View all</Btn>}>Recently added jobs</SectionTitle>
      {active.length===0
        ?<EmptyState icon="🔍" title="No jobs yet" body="Go to Search Profiles to fetch jobs automatically." />
        :<div style={{display:"flex",flexDirection:"column",gap:10}}>
          {active.slice(0,5).map(function(j){
            var inner=<React.Fragment>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:700,color:C.textPrimary,marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{j.title}</div>
                <div style={{fontSize:12,color:C.textSecondary}}>{j.company} · {j.location}</div>
              </div>
              <ScorePill score={j.score} rationale={j.rationale} scored={j.scored!==false} />
              <Chip label={j.status} bg={STATUS[j.status].bg} color={STATUS[j.status].color} />
            </React.Fragment>;
            if(!navigateToJobs){
              return <div key={j.id} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",background:C.surfaceAlt,borderRadius:12}}>{inner}</div>;
            }
            return <button key={j.id} onClick={function(){navigateToJobs({expandId:j.id});}} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",background:C.surfaceAlt,borderRadius:12,border:"none",cursor:"pointer",fontFamily:"inherit",textAlign:"left",width:"100%",transition:"background 0.15s ease"}} onMouseEnter={function(e){e.currentTarget.style.background=C.primaryLight;}} onMouseLeave={function(e){e.currentTarget.style.background=C.surfaceAlt;}}>{inner}</button>;
          })}
        </div>}
    </Card>
  </div>;
}

// ─── Job Row (with expandable details) ───────────────────────────────────────
function JobRow({job:j,expanded,selected,onSelectToggle,onToggle,onStatusChange,onNotesChange,onArchiveToggle,onDismiss,onWriteCoverLetter}){
  var src=SOURCES[j.sourceType]||SOURCES.manual;
  // Notes are always editable, so the row is always expandable — description,
  // deadline, links, etc. are now just extra content inside the expansion.
  var hasRichDetails=!!(j.description||j.employerUrl||j.applyUrl);
  var hasNotes=!!(j.notes&&j.notes.trim());
  var todayStr=new Date().toISOString().slice(0,10);
  var deadlineSoon=j.deadline&&j.deadline>=todayStr&&(new Date(j.deadline)-new Date())<7*24*60*60*1000;
  var deadlinePast=j.deadline&&j.deadline<todayStr;
  var isArchived=!!j.archived;
  // Local draft for notes — commits on blur so we don't re-render / re-persist on every keystroke
  var [noteDraft,setNoteDraft]=useState(j.notes||"");
  // If the job's notes change upstream (e.g. external update) while not focused, sync local draft
  useEffect(function(){ setNoteDraft(j.notes||""); },[j.id,j.notes]);
  function commitNotes(){
    if((j.notes||"")!==noteDraft) onNotesChange(noteDraft);
  }
  // Archived rows render muted with reduced opacity so they don't compete for
  // attention with active pipeline jobs. Selection still wins visually.
  var rowBg=selected?C.primaryLight:isArchived?"#F0F0EE":C.surfaceAlt;
  var rowBorder=selected?"1.5px solid "+C.primary:isArchived?"1.5px dashed "+C.border:"1.5px solid transparent";
  return <div style={{background:rowBg,borderRadius:14,padding:"16px",transition:"background 0.15s",border:rowBorder,opacity:isArchived&&!selected?0.72:1}}>
    <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
      {/* Selection checkbox — top-left so it's visible on every row without
          disturbing the existing layout. Stops click propagation so clicking
          the checkbox doesn't also trigger row-level interactions. */}
      {onSelectToggle&&<input
        type="checkbox"
        checked={!!selected}
        onChange={onSelectToggle}
        onClick={function(e){e.stopPropagation();}}
        style={{width:18,height:18,marginTop:3,flexShrink:0,cursor:"pointer",accentColor:C.primary}}
        aria-label="Select this job"
      />}
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6,flexWrap:"wrap"}}>
          <span style={{fontSize:15,fontWeight:700,color:C.textPrimary}}>{j.title}</span>
          {isArchived&&<span title="Archived" style={{fontSize:12,padding:"2px 8px",borderRadius:10,background:C.border,color:C.textSecondary,fontWeight:600}}>📦 Archived</span>}
          <ScorePill score={j.score} rationale={j.rationale} scored={j.scored!==false} />
          {hasNotes&&<span title="Has notes" onClick={onToggle} style={{fontSize:13,cursor:"pointer",userSelect:"none"}}>📝</span>}
        </div>
        <div style={{fontSize:13,color:C.textSecondary,marginBottom:8}}>
          {j.company} · {j.location} · Added {j.date}
          {j.employmentType&&<span> · {j.employmentType}</span>}
          {j.remote===true&&<span> · 🌐 Remote</span>}
          {j.salary&&<span> · 💰 {j.salary}</span>}
        </div>
        {j.rationale&&j.scored!==false&&<div style={{fontSize:12,color:C.textHint,fontStyle:"italic",marginBottom:8}}>💡 {j.rationale}</div>}
        {j.deadline&&<div style={{fontSize:12,fontWeight:600,marginBottom:8,color:deadlinePast?C.error:deadlineSoon?C.warning:C.textSecondary}}>
          {deadlinePast?"⚠ Deadline passed: ":deadlineSoon?"⏰ Apply by ":"📅 Apply by "}{j.deadline}
        </div>}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          <Chip label={src.label} bg={src.bg} color={src.color} />
          {j.tags.map(function(t,i){return <Chip key={t+i} label={t} />;})}
          {(j.applyUrl||j.url)&&<a href={j.applyUrl||j.url} target="_blank" rel="noopener noreferrer" style={{fontSize:12,color:C.primary,fontWeight:600,textDecoration:"none"}}>View posting →</a>}
          <button onClick={onToggle} style={{fontSize:12,color:C.primary,fontWeight:600,background:"none",border:"none",cursor:"pointer",padding:0,marginLeft:"auto"}}>
            {expanded?"▲ Hide details":hasNotes?"▼ Details & notes":"▼ Show details & add notes"}
          </button>
        </div>
      </div>
      <div style={{flexShrink:0,display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
        <div><Label>Status</Label>
        <Sel value={j.status} onChange={onStatusChange} style={{width:"auto",fontSize:13,padding:"7px 10px",background:STATUS[j.status].bg,color:STATUS[j.status].color,fontWeight:700,border:"none"}}>
          {STATUSES.map(function(s){return <option key={s}>{s}</option>;})}
        </Sel></div>
        {onWriteCoverLetter&&!isArchived&&["New","Reviewing","Applied"].includes(j.status)&&<button onClick={function(){onWriteCoverLetter(j.id);}} title="Generate a cover letter for this job" style={{fontSize:11,color:C.primary,background:"none",border:"none",cursor:"pointer",padding:"2px 6px",fontWeight:700}}>✉ Cover letter</button>}
        {onArchiveToggle&&<button onClick={onArchiveToggle} style={{fontSize:11,color:C.textHint,background:"none",border:"none",cursor:"pointer",padding:"2px 6px",fontWeight:600}}>{isArchived?"↩ Unarchive":"📦 Archive"}</button>}
        {onDismiss&&!isArchived&&<button onClick={onDismiss} title="Dismiss — not interested" style={{fontSize:11,color:C.textHint,background:"none",border:"none",cursor:"pointer",padding:"2px 6px",fontWeight:600}}>🗑 Dismiss</button>}
      </div>
    </div>
    {expanded&&<div style={{marginTop:14,paddingTop:14,borderTop:"1.5px solid "+C.border}}>
      <div style={{marginBottom:hasRichDetails?16:0}}>
        <div style={{fontSize:12,fontWeight:600,color:C.textHint,letterSpacing:"0.5px",marginBottom:6}}>MY NOTES</div>
        <div style={{fontSize:11,color:C.textHint,marginBottom:6}}>Track your progress, interview prep, contacts, next steps... Saves automatically when you click away.</div>
        <Txta value={noteDraft} onChange={function(e){setNoteDraft(e.target.value);}} onBlur={commitNotes} placeholder="e.g. Applied via referral on 2026-04-20. Phone screen with Sarah scheduled for 4/25 at 14:00." rows={4} />
      </div>
      {j.description&&<div style={{marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:600,color:C.textHint,letterSpacing:"0.5px",marginBottom:6}}>ROLE DESCRIPTION</div>
        <div style={{fontSize:13,lineHeight:1.6,color:C.textPrimary,maxHeight:320,overflowY:"auto",whiteSpace:"pre-wrap",background:C.surface,padding:"12px 14px",borderRadius:10,border:"1px solid "+C.border}}>{j.description}</div>
      </div>}
      <div className="jt-grid-2" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:10,fontSize:13}}>
        {j.employerUrl&&<div>
          <div style={{fontSize:11,fontWeight:600,color:C.textHint,letterSpacing:"0.5px",marginBottom:3}}>EMPLOYER</div>
          <a href={j.employerUrl} target="_blank" rel="noopener noreferrer" style={{color:C.primary,fontWeight:600,textDecoration:"none",wordBreak:"break-all"}}>{j.company} ↗</a>
        </div>}
        {j.applyUrl&&<div>
          <div style={{fontSize:11,fontWeight:600,color:C.textHint,letterSpacing:"0.5px",marginBottom:3}}>APPLY LINK</div>
          <a href={j.applyUrl} target="_blank" rel="noopener noreferrer" style={{color:C.primary,fontWeight:600,textDecoration:"none",wordBreak:"break-all"}}>Open application ↗</a>
        </div>}
      </div>
    </div>}
  </div>;
}

// ─── Jobs ─────────────────────────────────────────────────────────────────────
function Jobs({jobs,setJobs,rescoreAll,scoringStatus,scoringError,cv,sort,setSort,dismissJob,tombstoneIds,startCoverLetter,pendingJobsView,setPendingJobsView}){
  var [filter,setFilter]=useState("All");
  // Optional multi-status filter (overlays on top of `filter`). Used by Dashboard
  // deep-links like "Applications sent" → applied/interview/offer/rejected/no-response.
  // When set, the filter chip shows a removable badge so the user knows why their
  // view is constrained and can clear it.
  var [statusGroupFilter,setStatusGroupFilter]=useState(null); // null | "applied" | (extensible)
  var [sourceFilter,setSourceFilter]=useState("all");
  var [scoreFilter,setScoreFilter]=useState(0);
  var [search,setSearch]=useState("");
  var [showAdd,setShowAdd]=useState(false);
  var [showArchived,setShowArchived]=useState(false);
  var [expandedId,setExpandedId]=useState(null);
  // Selection state for bulk actions. Set of String(id) for consistency with
  // how we handle ID types elsewhere (numeric manual jobs vs string API jobs).
  var [selectedIds,setSelectedIds]=useState(new Set());
  var [form,setForm]=useState({title:"",company:"",location:"",tags:"",applyUrl:"",salary:"",employmentType:"",description:""});

  // Apply Dashboard deep-link payload on mount (or when it changes). After
  // applying, clear the pending state so navigating away & back doesn't re-apply.
  useEffect(function(){
    if(!pendingJobsView) return;
    var p=pendingJobsView;
    if(p.status&&typeof p.status==="string"){ setFilter(p.status); setStatusGroupFilter(null); }
    else if(p.statusGroup){ setStatusGroupFilter(p.statusGroup); setFilter("All"); }
    else if(Object.keys(p).length===0||p.expandId){ /* clear filters for unfiltered view */ setFilter("All"); setStatusGroupFilter(null); }
    if(typeof p.archived==="boolean") setShowArchived(p.archived);
    // Clear other filters that might confuse the deep-link target
    setSourceFilter("all"); setScoreFilter(0); setSearch("");
    if(p.expandId){
      // Coerce to whatever ID type the job uses; jobs may have numeric or string IDs
      var match=jobs.find(function(j){return String(j.id)===String(p.expandId);});
      if(match) setExpandedId(match.id);
    }
    if(setPendingJobsView) setPendingJobsView(null);
    // Smooth-scroll to top so the user lands at the filter card, not mid-list
    setTimeout(function(){ window.scrollTo({top:0,behavior:"smooth"}); },0);
  // eslint-disable-next-line
  },[pendingJobsView]);

  // Archive filter: by default, archived jobs are hidden everywhere. User can
  // flip the toggle to see them (greyed + 📦 in the row). Applied first so
  // status / source / score / search counts reflect only visible jobs.
  var filtered=jobs
    .filter(function(j){return showArchived?true:!j.archived;})
    .filter(function(j){return filter==="All"||j.status===filter;})
    .filter(function(j){
      if(!statusGroupFilter) return true;
      if(statusGroupFilter==="applied") return APPLIED_STATUSES.includes(j.status);
      return true;
    })
    .filter(function(j){return sourceFilter==="all"||j.sourceType===sourceFilter;})
    .filter(function(j){
      if(scoreFilter===0) return true;
      // Hide unscored jobs when a threshold is active — their score is a placeholder
      if(j.scored===false) return false;
      return(j.score||0)>=scoreFilter;
    })
    .filter(function(j){return matchesSearch(j,search);});
  filtered=sortJobs(filtered,sort);

  // Count passed-deadline non-archived jobs for the "Archive passed" helper button
  var todayStr=new Date().toISOString().slice(0,10);
  var passedCount=jobs.filter(function(j){return !j.archived&&j.deadline&&j.deadline<todayStr;}).length;
  var archivedCount=jobs.filter(function(j){return j.archived;}).length;

  // Selection helpers. Count only visible selected so user isn't confused when
  // filters hide some of their ticked jobs.
  var filteredIdSet=new Set(filtered.map(function(j){return String(j.id);}));
  var visibleSelectedCount=0;
  selectedIds.forEach(function(id){ if(filteredIdSet.has(id)) visibleSelectedCount++; });
  var allVisibleSelected=filtered.length>0&&visibleSelectedCount===filtered.length;

  function toggleSelect(jobId){
    var key=String(jobId);
    setSelectedIds(function(prev){
      var next=new Set(prev);
      if(next.has(key)) next.delete(key); else next.add(key);
      return next;
    });
  }
  function toggleSelectAllVisible(){
    setSelectedIds(function(prev){
      var next=new Set(prev);
      if(allVisibleSelected){
        // Deselect only visible ones, keep off-screen selections alone
        filtered.forEach(function(j){ next.delete(String(j.id)); });
      }else{
        filtered.forEach(function(j){ next.add(String(j.id)); });
      }
      return next;
    });
  }
  function clearSelection(){ setSelectedIds(new Set()); }
  function bulkSetStatus(newStatus){
    var nowIso=new Date().toISOString();
    setJobs(function(prev){
      return prev.map(function(j){
        if(!selectedIds.has(String(j.id))) return j;
        // Same appliedAt logic as the per-row handler: only stamp on first
        // transition to Applied, preserving any earlier appliedAt.
        var patch={status:newStatus};
        if(newStatus==="Applied"&&!j.appliedAt) patch.appliedAt=nowIso;
        return Object.assign({},j,patch);
      });
    });
    clearSelection();
  }
  function bulkDelete(){
    var n=selectedIds.size;
    if(!confirm("Delete "+n+" job"+(n!==1?"s":"")+"? This cannot be undone."))return;
    // Tombstone the IDs so these jobs won't be re-ingested on a later fetch.
    if(tombstoneIds) tombstoneIds(Array.from(selectedIds));
    setJobs(function(prev){return prev.filter(function(j){return !selectedIds.has(String(j.id));});});
    clearSelection();
  }
  function bulkArchive(){
    setJobs(function(prev){
      return prev.map(function(j){
        return selectedIds.has(String(j.id))?Object.assign({},j,{archived:true}):j;
      });
    });
    clearSelection();
  }
  function bulkUnarchive(){
    setJobs(function(prev){
      return prev.map(function(j){
        return selectedIds.has(String(j.id))?Object.assign({},j,{archived:false}):j;
      });
    });
    clearSelection();
  }
  // Flip archive state for a single job (used by the row's status dropdown).
  function toggleArchive(jobId){
    setJobs(function(prev){return prev.map(function(j){return j.id===jobId?Object.assign({},j,{archived:!j.archived}):j;});});
  }
  // One-click helper: archive every non-archived job with a passed deadline.
  // Shown in the filter card when passedCount > 0.
  function archivePassed(){
    if(!passedCount) return;
    if(!confirm("Archive "+passedCount+" job"+(passedCount!==1?"s":"")+" with passed deadlines? You can still view them with \"Show archived\"."))return;
    var today=todayStr;
    setJobs(function(prev){return prev.map(function(j){
      if(!j.archived&&j.deadline&&j.deadline<today) return Object.assign({},j,{archived:true});
      return j;
    });});
  }

  function addJob(){
    if(!form.title||!form.company) return;
    setJobs(function(prev){return [{
      id:Date.now(),title:form.title,company:form.company,location:form.location,
      status:"New",score:NEUTRAL_SCORE,scored:false,rationale:"",
      source:"Manual",sourceType:"manual",
      date:new Date().toISOString().slice(0,10),lang:"English",
      tags:form.tags.split(",").map(function(t){return t.trim();}).filter(Boolean),
      url:form.applyUrl||null,
      description:form.description||"",applyUrl:form.applyUrl||null,
      deadline:null,employmentType:form.employmentType||null,
      salary:form.salary||null,remote:null,employerUrl:null,
    }].concat(prev);});
    setForm({title:"",company:"",location:"",tags:"",applyUrl:"",salary:"",employmentType:"",description:""});
    setShowAdd(false);
  }
  return <div style={{display:"flex",flexDirection:"column",gap:16}}>
    <Card style={{padding:"16px 20px"}}>
      <div style={{fontSize:12,color:C.textHint,marginBottom:8,fontWeight:600,letterSpacing:"0.5px"}}>SEARCH</div>
      <div style={{position:"relative",marginBottom:14}}>
        <Inp value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Search by title, company, location, description..." style={{paddingLeft:36,paddingRight:search?36:12}} />
        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:14,color:C.textHint,pointerEvents:"none"}}>🔍</span>
        {search&&<button onClick={function(){setSearch("");}} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",fontSize:18,color:C.textHint,cursor:"pointer",padding:"4px 8px",lineHeight:1}}>×</button>}
      </div>
      <div style={{display:"flex",gap:14,alignItems:"center",marginBottom:14,flexWrap:"wrap"}}>
        <div style={{fontSize:12,color:C.textHint,fontWeight:600,letterSpacing:"0.5px",flexShrink:0}}>SORT BY</div>
        <Sel value={sort} onChange={function(e){setSort(e.target.value);}} style={{width:"auto",minWidth:200,flexShrink:0}}>
          {SORT_OPTIONS.map(function(o){return <option key={o.key} value={o.key}>{o.label}</option>;})}
        </Sel>
      </div>
      <div style={{fontSize:12,color:C.textHint,marginBottom:8,fontWeight:600,letterSpacing:"0.5px"}}>FILTER BY STATUS</div>
      {statusGroupFilter==="applied"&&<div style={{display:"inline-flex",alignItems:"center",gap:8,padding:"6px 12px",borderRadius:20,background:C.primaryLight,border:"1.5px dashed "+C.primary,color:C.primary,fontSize:12,fontWeight:600,marginBottom:10}}>
        Showing all applied jobs (Applied, Interview, Offer, Rejected, No response)
        <button onClick={function(){setStatusGroupFilter(null);}} style={{background:"none",border:"none",cursor:"pointer",color:C.primary,fontSize:14,fontWeight:700,padding:0,lineHeight:1}}>×</button>
      </div>}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
        {["All"].concat(STATUSES).map(function(s){
          var on=filter===s&&!statusGroupFilter;
          // Count only jobs visible under current archive setting — otherwise
          // the chip promises results the filter chain will then hide.
          var cnt=s!=="All"?"("+jobs.filter(function(j){return j.status===s&&(showArchived||!j.archived);}).length+")":"";
          return <button key={s} onClick={function(){setFilter(s);setStatusGroupFilter(null);}} style={{fontSize:13,fontWeight:on?700:500,padding:"7px 16px",borderRadius:20,border:"1.5px solid "+(on?STATUS[s]?STATUS[s].color:C.primary:C.border),background:on?(STATUS[s]?STATUS[s].bg:C.primaryLight):"transparent",color:on?(STATUS[s]?STATUS[s].color:C.primary):C.textSecondary,cursor:"pointer"}}>{s} {cnt}</button>;
        })}
      </div>
      <div style={{fontSize:12,color:C.textHint,marginBottom:8,fontWeight:600,letterSpacing:"0.5px"}}>FILTER BY SOURCE</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
        {[["All sources","all"],["Arbetsförmedlingen","af"],["JSearch","jsearch"],["Manual","manual"]].map(function(item){
          var on=sourceFilter===item[1];
          return <button key={item[1]} onClick={function(){setSourceFilter(item[1]);}} style={{fontSize:12,fontWeight:on?700:500,padding:"5px 14px",borderRadius:20,border:"1.5px solid "+(on?C.primary:C.border),background:on?C.primaryLight:"transparent",color:on?C.primary:C.textSecondary,cursor:"pointer"}}>{item[0]}</button>;
        })}
      </div>
      <div style={{fontSize:12,color:C.textHint,marginBottom:8,fontWeight:600,letterSpacing:"0.5px"}}>FILTER BY MATCH SCORE</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {[
          [0,"Any score",C.border,C.textSecondary,C.surfaceAlt],
          [50,"≥ 50%",C.error,C.error,C.errorBg],
          [70,"≥ 70%",C.warning,C.warning,C.warningBg],
          [85,"≥ 85%",C.success,C.success,C.successBg],
        ].map(function(item){
          var on=scoreFilter===item[0];
          return <button key={item[0]} onClick={function(){setScoreFilter(item[0]);}} style={{fontSize:12,fontWeight:on?700:500,padding:"5px 14px",borderRadius:20,border:"1.5px solid "+(on?item[2]:C.border),background:on?item[4]:"transparent",color:on?item[3]:C.textSecondary,cursor:"pointer"}}>{item[1]}</button>;
        })}
      </div>
      {scoreFilter>0&&<div style={{fontSize:11,color:C.textHint,marginTop:8,fontStyle:"italic"}}>Jobs that haven't been scored yet are hidden while a threshold is active.</div>}
      {/* Archive controls — shown only when there's something relevant:
          either archived jobs to reveal, or passed deadlines to archive. */}
      {(archivedCount>0||passedCount>0)&&<div style={{marginTop:16,paddingTop:16,borderTop:"1px solid "+C.border,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        {archivedCount>0&&<label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",userSelect:"none",fontSize:13,color:C.textSecondary}}>
          <input type="checkbox" checked={showArchived} onChange={function(){setShowArchived(function(v){return !v;});}} style={{width:16,height:16,cursor:"pointer",accentColor:C.primary}} />
          <span>Show archived ({archivedCount})</span>
        </label>}
        {passedCount>0&&<Btn onClick={archivePassed} style={{fontSize:12,padding:"6px 12px",marginLeft:"auto"}}>📦 Archive passed deadlines ({passedCount})</Btn>}
      </div>}
    </Card>
    <Card>
      <SectionTitle action={<div style={{display:"flex",gap:8}}>
        <Btn onClick={rescoreAll} disabled={scoringStatus.active||jobs.length===0||!hasCv(cv)} style={{fontSize:13,padding:"8px 16px"}}>{scoringStatus.active?"Scoring "+scoringStatus.done+"/"+scoringStatus.total+"...":"⟳ Rescore all"}</Btn>
        <Btn variant="primary" onClick={function(){setShowAdd(function(v){return !v;});}} style={{fontSize:13,padding:"8px 16px"}}>+ Add job manually</Btn>
      </div>}>Jobs ({filtered.length}{(function(){
        // Show " of N" only when filters are hiding something. "N" reflects the
        // pool the user is navigating — active jobs by default, or all jobs
        // when "Show archived" is on.
        var pool=showArchived?jobs.length:jobs.length-archivedCount;
        return filtered.length!==pool?" of "+pool:"";
      })()})</SectionTitle>
      {!hasCv(cv)&&jobs.length>0&&<Alert type="info">Add your CV in the My CV tab to enable AI match scoring. Until then, scores show as "—".</Alert>}
      {scoringStatus.active&&<Alert type="info">AI is scoring your jobs against your CV... ({scoringStatus.done} of {scoringStatus.total} done)</Alert>}
      {scoringError&&!scoringStatus.active&&<Alert type="error">Scoring failed: {scoringError}</Alert>}
      {showAdd&&<div style={{background:C.surfaceAlt,borderRadius:12,padding:"16px",marginBottom:16,border:"1.5px solid "+C.border}}>
        <div style={{fontSize:14,fontWeight:700,color:C.textPrimary,marginBottom:14}}>Add a job manually</div>
        <div className="jt-grid-2" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:12,marginBottom:12}}>
          <div><Label hint="e.g. Senior UX Designer">Job title *</Label><Inp value={form.title} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{title:v});});}} placeholder="Job title" /></div>
          <div><Label hint="e.g. Spotify">Company *</Label><Inp value={form.company} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{company:v});});}} placeholder="Company name" /></div>
          <div><Label hint="e.g. Stockholm or Remote">Location</Label><Inp value={form.location} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{location:v});});}} placeholder="Location" /></div>
          <div><Label hint="Direct link to the job posting">Apply URL</Label><Inp value={form.applyUrl} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{applyUrl:v});});}} placeholder="https://..." /></div>
          <div><Label hint="e.g. Full-time, Contract">Employment type</Label><Inp value={form.employmentType} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{employmentType:v});});}} placeholder="e.g. Full-time" /></div>
          <div><Label hint="e.g. 60 000–80 000 SEK/month">Salary range</Label><Inp value={form.salary} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{salary:v});});}} placeholder="e.g. 70 000 SEK/month" /></div>
          <div style={{gridColumn:"1 / -1"}}><Label hint="Separate with commas">Tags</Label><Inp value={form.tags} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{tags:v});});}} placeholder="e.g. Design, Remote" /></div>
          <div style={{gridColumn:"1 / -1"}}><Label hint="Paste the full role description for better AI match scoring">Role description</Label><Txta value={form.description} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{description:v});});}} placeholder="Paste the job description here..." rows={6} /></div>
        </div>
        <div style={{display:"flex",gap:10}}><Btn variant="primary" onClick={addJob}>Save job</Btn><Btn onClick={function(){setShowAdd(false);}}>Cancel</Btn></div>
      </div>}
      {filtered.length===0
        ?(jobs.length>0
          ?<div style={{textAlign:"center",padding:"30px 20px"}}>
            <div style={{fontSize:32,marginBottom:10}}>🔍</div>
            <div style={{fontSize:15,fontWeight:600,color:C.textSecondary,marginBottom:6}}>No jobs match your filters</div>
            <div style={{fontSize:13,color:C.textHint,marginBottom:14}}>Try clearing the search or changing the filters.</div>
            <Btn onClick={function(){setSearch("");setFilter("All");setSourceFilter("all");setScoreFilter(0);}}>Clear all filters</Btn>
          </div>
          :<EmptyState icon="📋" title="No jobs here yet" body="Add a job manually or fetch from your search profiles." />)
        :<div style={{display:"flex",flexDirection:"column",gap:10}}>
          {/* Bulk action header. Shown only when there are jobs visible. Pairs
              a "Select all visible" checkbox with a status changer + delete
              button that appear once something is selected. Becomes sticky
              when there's an active selection so the actions stay reachable
              during long scrolls. */}
          <div style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:visibleSelectedCount>0?C.primaryLight:C.surfaceAlt,borderRadius:10,flexWrap:"wrap",transition:"background 0.15s",position:visibleSelectedCount>0?"sticky":"static",top:visibleSelectedCount>0?4:"auto",zIndex:5,boxShadow:visibleSelectedCount>0?"0 2px 8px rgba(0,0,0,0.06)":"none"}}>
            <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",userSelect:"none",flex:"0 0 auto"}}>
              <input type="checkbox" checked={allVisibleSelected} onChange={toggleSelectAllVisible} style={{width:18,height:18,cursor:"pointer",accentColor:C.primary}} />
              <span style={{fontSize:13,fontWeight:600,color:visibleSelectedCount>0?C.primary:C.textSecondary}}>
                {visibleSelectedCount>0?visibleSelectedCount+" selected":"Select all visible"}
              </span>
            </label>
            {visibleSelectedCount>0&&<div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginLeft:"auto"}}>
              <Sel value="" onChange={function(e){if(e.target.value) bulkSetStatus(e.target.value);}} style={{width:"auto",fontSize:13,padding:"6px 10px",minWidth:160}}>
                <option value="">Change status to…</option>
                {STATUSES.map(function(s){return <option key={s} value={s}>{s}</option>;})}
              </Sel>
              {/* Show Archive if any selected job is NOT archived; show Unarchive
                  only when every selected job IS archived (keeps intent clear). */}
              {(function(){
                var sel=jobs.filter(function(j){return selectedIds.has(String(j.id));});
                var allArch=sel.length>0&&sel.every(function(j){return j.archived;});
                return allArch
                  ?<Btn onClick={bulkUnarchive} style={{fontSize:12,padding:"6px 12px"}}>↩ Unarchive</Btn>
                  :<Btn onClick={bulkArchive} style={{fontSize:12,padding:"6px 12px"}}>📦 Archive</Btn>;
              })()}
              <Btn variant="danger" onClick={bulkDelete} style={{fontSize:12,padding:"6px 12px"}}>Delete selected</Btn>
              <Btn onClick={clearSelection} style={{fontSize:12,padding:"6px 12px"}}>Cancel</Btn>
            </div>}
          </div>
          {filtered.map(function(j){
            var jid=String(j.id);
            return <JobRow
              key={j.id}
              job={j}
              expanded={expandedId===j.id}
              selected={selectedIds.has(jid)}
              onSelectToggle={function(){toggleSelect(j.id);}}
              onToggle={function(){setExpandedId(function(cur){return cur===j.id?null:j.id;});}}
              onStatusChange={function(e){var val=e.target.value;setJobs(function(prev){return prev.map(function(x){
                if(x.id!==j.id) return x;
                // Record when a job first enters "Applied" so the 30-day nudge
                // can measure from the right moment. Never overwrites an
                // existing appliedAt — subsequent transitions back/forth
                // preserve the original application timestamp.
                var patch={status:val};
                if(val==="Applied"&&!x.appliedAt) patch.appliedAt=new Date().toISOString();
                return Object.assign({},x,patch);
              });});}}
              onNotesChange={function(val){setJobs(function(prev){return prev.map(function(x){return x.id===j.id?Object.assign({},x,{notes:val}):x;});});}}
              onArchiveToggle={function(){toggleArchive(j.id);}}
              onDismiss={dismissJob?function(){dismissJob(j.id);}:null}
              onWriteCoverLetter={startCoverLetter?function(){startCoverLetter(j.id);}:null}
            />;
          })}
        </div>}
    </Card>
  </div>;
}

// ─── Search Profiles ──────────────────────────────────────────────────────────
function SearchProfiles({profiles,setProfiles,setJobs,afKey,setAfKey,jsKey,setJsKey,anthropicKey,setAnthropicKey,pendingProfileRun,setPendingProfileRun,dismissedIds}){
  var [showAfKey,setShowAfKey]=useState(false);
  var [showJsKey,setShowJsKey]=useState(false);
  var [showAnthropicKey,setShowAnthropicKey]=useState(false);
  var [editId,setEditId]=useState(null);
  var [showForm,setShowForm]=useState(false);
  var [form,setForm]=useState({name:"",query:"",limit:10,sources:["af"]});
  var [runStatus,setRunStatus]=useState({});
  // Ref on the edit form so clicking Edit on a profile far down the list
  // can scroll the form into view. Without this, profiles 4+ "looked broken"
  // because the form appears above the list and the user couldn't see it
  // change.
  var formRef=useRef(null);

  function toggleSource(src){setForm(function(f){var srcs=f.sources.includes(src)?f.sources.filter(function(s){return s!==src;}):f.sources.concat([src]);return Object.assign({},f,{sources:srcs});});}
  function saveProfile(){
    if(!form.name||!form.query||form.sources.length===0) return;
    if(editId){setProfiles(function(prev){return prev.map(function(p){return p.id===editId?Object.assign({},p,form,{limit:Number(form.limit)}):p;});});setEditId(null);}
    else{setProfiles(function(prev){return prev.concat([Object.assign({id:Date.now()},form,{limit:Number(form.limit),active:true})]);});}
    setForm({name:"",query:"",limit:10,sources:["af"]});setShowForm(false);
  }
  function startEdit(p){
    setForm({name:p.name,query:p.query,limit:p.limit,sources:p.sources||["af"]});
    setEditId(p.id);
    setShowForm(true);
    // Scroll the form into view after React renders it. setTimeout(0) defers
    // until the next tick so the form node exists in the DOM by then.
    setTimeout(function(){
      if(formRef.current){ formRef.current.scrollIntoView({behavior:"smooth",block:"center"}); }
    },0);
  }

  async function fetchAF(p){
    try{
      var url="https://jobsearch.api.jobtechdev.se/search?q="+encodeURIComponent(p.query)+"&limit="+p.limit+"&resdet=full";
      var headers={"accept":"application/json"};
      if(afKey) headers["api-key"]=afKey;
      var out=await smartFetch(url,{headers:headers});
      var res=out.response;
      if(!res.ok){
        if(res.status===403){
          throw new Error("403 Forbidden"+(out.viaProxy?" (the CORS proxy rejected the request — try again in a moment)":" (the API rejected the request — check your API key if you added one)"));
        }
        if(res.status===429) throw new Error("429 Rate limited — slow down and try again in a minute");
        throw new Error("Error "+res.status);
      }
      var data=await res.json();
      var ads=data.hits||[];
      var added=0;
      var skippedDismissed=0;
      // Build a Set of tombstoned ids. Captured from props at fetch time — fine
      // because list changes (dismissals) are user-driven and rare.
      var tombstones=new Set((dismissedIds||[]).map(String));
      setJobs(function(prev){
        var ex=new Set(prev.map(function(j){return j.id?j.id.toString():""; }));
        var nj=ads.filter(function(a){
          var aid=a.id?a.id.toString():"";
          if(!aid) return false;
          if(ex.has(aid)) return false;       // already in current jobs
          if(tombstones.has(aid)){ skippedDismissed++; return false; } // previously dismissed
          return true;
        }).map(function(a){return mapAfJob(a,p.name);});
        added=nj.length;return nj.concat(prev);
      });
      return{added:added,skipped:skippedDismissed};
    }catch(e){return{added:0,error:e.message};}
  }

  async function fetchJS(p){
    if(!jsKey) return{added:0,error:"No JSearch API key entered. Go to Search Profiles and add your RapidAPI key."};
    try{
      var url="https://jsearch.p.rapidapi.com/search?query="+encodeURIComponent(p.query)+"&num_pages=1&page=1";
      var out=await smartFetch(url,{headers:{"x-rapidapi-key":jsKey,"x-rapidapi-host":"jsearch.p.rapidapi.com"}});
      var res=out.response;
      if(!res.ok){
        if(res.status===401||res.status===403) throw new Error(res.status+" — check your RapidAPI key and that you're subscribed to JSearch");
        if(res.status===429) throw new Error("429 Rate limited — JSearch free tier is limited, try again later");
        throw new Error("Error "+res.status);
      }
      var data=await res.json();
      var ads=(data.data||[]).slice(0,p.limit);
      var added=0;
      var skippedDismissed=0;
      var tombstones=new Set((dismissedIds||[]).map(String));
      setJobs(function(prev){
        var ex=new Set(prev.map(function(j){return j.id?j.id.toString():""; }));
        var nj=ads.filter(function(a){
          var aid=a.job_id?String(a.job_id):"";
          if(!aid) return false;
          if(ex.has(aid)) return false;
          if(tombstones.has(aid)){ skippedDismissed++; return false; }
          return true;
        }).map(function(a){return mapJsJob(a,p.name);});
        added=nj.length;return nj.concat(prev);
      });
      return{added:added,skipped:skippedDismissed};
    }catch(e){return{added:0,error:e.message};}
  }

  async function runProfile(p){
    setRunStatus(function(s){var u=Object.assign({},s);u[p.id]={type:"loading",msg:"Fetching jobs..."};return u;});
    var srcs=p.sources||["af"];
    var results=[];
    for(var i=0;i<srcs.length;i++){var r=srcs[i]==="af"?await fetchAF(p):await fetchJS(p);results.push({src:srcs[i],added:r.added,skipped:r.skipped||0,error:r.error});}
    var totalAdded=results.reduce(function(a,r){return a+(r.added||0);},0);
    var parts=results.map(function(r){
      if(r.error) return (r.src==="af"?"Arbetsförmedlingen":"JSearch")+": "+r.error;
      var msg=(r.src==="af"?"Arbetsförmedlingen":"JSearch")+": "+r.added+" new jobs added";
      if(r.skipped>0) msg+=" ("+r.skipped+" previously dismissed, skipped)";
      return msg;
    });
    var hasError=results.some(function(r){return r.error;});
    setRunStatus(function(s){var u=Object.assign({},s);u[p.id]={type:hasError&&!totalAdded?"error":"success",msg:parts.join(" · ")};return u;});
  }

  async function runAll(){var active=profiles.filter(function(p){return p.active;});for(var i=0;i<active.length;i++) await runProfile(active[i]);}

  // When Profile Assistant's "Run now" button hands us a profile ID, auto-fetch it once.
  // We consume the pending request by clearing it, so this never re-fires on re-renders.
  useEffect(function(){
    if(!pendingProfileRun) return;
    var p=profiles.find(function(x){return x.id===pendingProfileRun;});
    if(p){ runProfile(p); }
    setPendingProfileRun(null);
  // eslint-disable-next-line
  },[pendingProfileRun]);

  return <div style={{display:"flex",flexDirection:"column",gap:16}}>
    <Card>
      <SectionTitle action={<div style={{display:"flex",gap:8}}><Btn onClick={runAll} style={{fontSize:13,padding:"8px 14px"}}>▶ Run all active</Btn><Btn variant="primary" onClick={function(){setEditId(null);setForm({name:"",query:"",limit:10,sources:["af"]});setShowForm(function(v){return !v;});}} style={{fontSize:13,padding:"8px 14px"}}>+ New profile</Btn></div>}>Search profiles</SectionTitle>
      <Alert type="info">A search profile is a saved search query. When you click Fetch or run the scheduler, each active profile searches its sources and adds new matching jobs to your list automatically.</Alert>
      {showForm&&<div ref={formRef} style={{background:C.surfaceAlt,borderRadius:14,padding:"20px",margin:"16px 0",border:"1.5px solid "+C.border}}>
        <div style={{fontSize:15,fontWeight:700,color:C.textPrimary,marginBottom:16}}>{editId?"Edit profile":"New search profile"}</div>
        <div className="jt-grid-2" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:14,marginBottom:14}}>
          <div><Label hint="A name to help you identify this search">Profile name</Label><Inp value={form.name} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{name:v});});}} placeholder="e.g. UX Design Sweden" /></div>
          <div><Label hint="Maximum jobs to fetch each time this profile runs">Max results</Label><Inp type="number" value={form.limit} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{limit:v});});}} placeholder="10" style={{width:100}} /></div>
        </div>
        <div style={{marginBottom:14}}><Label hint="Write naturally — e.g. UX designer Stockholm or product manager fintech remote">Search query</Label><Txta value={form.query} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{query:v});});}} placeholder='e.g. "UX designer Stockholm"' rows={2} /></div>
        <div style={{marginBottom:16}}>
          <Label hint="Choose which job boards to search">Search in</Label>
          <div style={{display:"flex",gap:10,marginTop:4}}>
            {[["af","Arbetsförmedlingen (Swedish jobs)","#EAF2EF","#3D6B5C"],["jsearch","JSearch — Indeed, LinkedIn, Glassdoor","#E3EFF8","#1A5A8A"]].map(function(item){
              var on=form.sources.includes(item[0]);
              return <button key={item[0]} onClick={function(){toggleSource(item[0]);}} style={{flex:1,padding:"12px 16px",borderRadius:12,border:"2px solid "+(on?item[3]:C.border),background:on?item[2]:"transparent",color:on?item[3]:C.textSecondary,cursor:"pointer",fontSize:13,fontWeight:on?700:500,textAlign:"left"}}>{on?"✓ ":""}{item[1]}</button>;
            })}
          </div>
        </div>
        <div style={{display:"flex",gap:10}}><Btn variant="primary" onClick={saveProfile}>{editId?"Update profile":"Save profile"}</Btn><Btn onClick={function(){setShowForm(false);setEditId(null);}}>Cancel</Btn></div>
      </div>}
      {profiles.length===0
        ?<EmptyState icon="🔎" title="No search profiles yet" body="Create a profile with a search query to start fetching jobs." />
        :<div style={{display:"flex",flexDirection:"column",gap:12,marginTop:16}}>
          {profiles.map(function(p){
            var st=runStatus[p.id];
            return <div key={p.id} style={{background:C.surfaceAlt,borderRadius:14,padding:"16px 18px",opacity:p.active?1:0.65}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                <div style={{paddingTop:2}}><Toggle value={p.active} onChange={function(){var pid=p.id;setProfiles(function(prev){return prev.map(function(x){return x.id===pid?Object.assign({},x,{active:!x.active}):x;});});}} /></div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                    <span style={{fontSize:15,fontWeight:700,color:C.textPrimary}}>{p.name}</span>
                    <Chip label={p.active?"Active":"Inactive"} bg={p.active?C.primaryLight:C.surfaceAlt} color={p.active?C.primary:C.textHint} />
                    <Chip label={"max "+p.limit+" results"} />
                  </div>
                  <div style={{fontSize:13,color:C.textSecondary,marginBottom:8,fontFamily:"monospace",background:C.surface,padding:"6px 10px",borderRadius:8,display:"inline-block"}}>"{p.query}"</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{(p.sources||["af"]).map(function(src){var s=SOURCES[src];return <Chip key={src} label={s.label} bg={s.bg} color={s.color} />;})}</div>
                  {st&&<Alert type={st.type==="loading"?"info":st.type}>{st.msg}</Alert>}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  <Btn onClick={function(){startEdit(p);}} style={{fontSize:12,padding:"6px 12px"}}>Edit</Btn>
                  <Btn onClick={function(){if(p.active) runProfile(p);}} disabled={!p.active} style={{fontSize:12,padding:"6px 12px",background:p.active?C.primaryLight:"transparent",color:p.active?C.primary:C.textHint}}>Fetch now</Btn>
                  <Btn variant="danger" onClick={function(){var pid=p.id;setProfiles(function(prev){return prev.filter(function(x){return x.id!==pid;});});}} style={{fontSize:12,padding:"6px 12px"}}>Delete</Btn>
                </div>
              </div>
            </div>;
          })}
        </div>}
    </Card>
    <Card>
      <SectionTitle>API keys</SectionTitle>
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        <div>
          <Label hint="The Arbetsförmedlingen API is free and open — no key needed. Leave blank to use it without authentication.">Arbetsförmedlingen API key (optional)</Label>
          <div style={{display:"flex",gap:8}}><Inp type={showAfKey?"text":"password"} value={afKey} onChange={function(e){var v=e.target.value;setAfKey(v);}} placeholder="Leave blank — no key needed" style={{fontFamily:"monospace"}} /><Btn onClick={function(){setShowAfKey(function(v){return !v;});}} style={{whiteSpace:"nowrap",padding:"10px 16px"}}>{showAfKey?"Hide":"Show"}</Btn></div>
        </div>
        <div>
          <Label hint="Sign up free at rapidapi.com, search for JSearch by OpenWeb Ninja, subscribe to the free plan, and paste your key here.">JSearch API key (for Indeed, LinkedIn, Glassdoor)</Label>
          <div style={{display:"flex",gap:8}}><Inp type={showJsKey?"text":"password"} value={jsKey} onChange={function(e){var v=e.target.value;setJsKey(v);}} placeholder="Paste your RapidAPI key here" style={{fontFamily:"monospace"}} /><Btn onClick={function(){setShowJsKey(function(v){return !v;});}} style={{whiteSpace:"nowrap",padding:"10px 16px"}}>{showJsKey?"Hide":"Show"}</Btn></div>
        </div>
        <div>
          <Label hint="Required for AI match scoring, cover letters, and reports. Get a key at console.anthropic.com and paste it here. Starts with 'sk-ant-'.">Anthropic API key (for AI features)</Label>
          <div style={{display:"flex",gap:8}}><Inp type={showAnthropicKey?"text":"password"} value={anthropicKey} onChange={function(e){var v=e.target.value;setAnthropicKey(v);}} placeholder="sk-ant-..." style={{fontFamily:"monospace"}} /><Btn onClick={function(){setShowAnthropicKey(function(v){return !v;});}} style={{whiteSpace:"nowrap",padding:"10px 16px"}}>{showAnthropicKey?"Hide":"Show"}</Btn></div>
        </div>
        <Alert type="info">🔒 Keys are stored in your browser's memory only and are never saved to a server or shared with anyone.</Alert>
      </div>
    </Card>
  </div>;
}

// ─── Scheduler ────────────────────────────────────────────────────────────────
function Scheduler({schedule,setSchedule,profiles,log,resetAllData,exportData,importData,validateImport,dismissedIds,clearDismissedIds}){
  var [draft,setDraft]=useState(schedule);
  var [dirty,setDirty]=useState(false);
  var [excludeKeys,setExcludeKeys]=useState(false); // for export
  var [importPreview,setImportPreview]=useState(null); // {payload,stats} or null
  var [showAllLog,setShowAllLog]=useState(false); // expand to full log when truthy
  var [importError,setImportError]=useState("");
  var fileInputRef=useRef(null);
  function update(patch){setDraft(function(d){return Object.assign({},d,patch);});setDirty(true);}
  function toggleDay(day){update({days:draft.days.includes(day)?draft.days.filter(function(d){return d!==day;}):draft.days.concat([day])});}
  function save(){setSchedule(draft);setDirty(false);}
  function revert(){setDraft(schedule);setDirty(false);}

  // Kick off the native file picker. Parse + validate happens in onFileChosen.
  function startImport(){
    setImportError("");
    setImportPreview(null);
    if(fileInputRef.current) fileInputRef.current.click();
  }
  function onFileChosen(e){
    var file=e.target.files&&e.target.files[0];
    if(!file) return;
    var reader=new FileReader();
    reader.onload=function(evt){
      try{
        var obj=JSON.parse(evt.target.result);
        var err=validateImport(obj);
        if(err){ setImportError(err); e.target.value=""; return; }
        // Build a preview summary so the user can sanity-check before restoring
        var d=obj.data||{};
        var stats={
          jobs:(d.jobs||[]).length,
          profiles:(d.profiles||[]).length,
          hasCv:!!(d.cv&&d.cv.text),
          hasKeys:!!(d.afKey||d.jsKey||d.anthropicKey),
          exportedAt:obj.exportedAt||"unknown",
        };
        setImportPreview({payload:obj,stats:stats});
      }catch(err){
        setImportError("Couldn't parse file: "+(err.message||err));
      }
      // Reset the input so picking the same file again triggers onChange
      e.target.value="";
    };
    reader.onerror=function(){ setImportError("Couldn't read the file."); e.target.value=""; };
    reader.readAsText(file);
  }
  function confirmImport(){
    if(!importPreview) return;
    if(!confirm("This will REPLACE all your current jobs, profiles, CV, schedule, and log with the contents of the backup. Continue?")) return;
    importData(importPreview.payload);
    setImportPreview(null);
  }

  var activeCount=profiles.filter(function(p){return p.active;}).length;
  var timeInvalid=draft.startTime>=draft.stopTime;
  return <div style={{display:"flex",flexDirection:"column",gap:16}}>
    <Card>
      <SectionTitle>Scheduler status</SectionTitle>
      <Toggle value={draft.enabled} onChange={function(){update({enabled:!draft.enabled});}} label={draft.enabled?"Scheduler is ON — jobs will be fetched automatically":"Scheduler is OFF — turn on to fetch jobs automatically"} hint={draft.enabled?"Active profiles will be fetched on the days and times set below.":"Enable this to have the app check for new jobs in the background."} />
      {schedule.enabled&&<Alert type="success">Currently running · {activeCount} active profile{activeCount!==1?"s":""} · {schedule.days.join(", ")} · {schedule.startTime}–{schedule.stopTime} · every {schedule.intervalMinutes} min</Alert>}
      <Alert type="info">ℹ Scheduled fetches only run while the app is open in an active tab. On mobile, minimising the browser or locking the screen pauses scheduling. For true always-on fetching, keep the app open in a pinned tab.</Alert>
    </Card>
    <Card>
      <SectionTitle>Which days should it run?</SectionTitle>
      <div style={{fontSize:13,color:C.textHint,marginBottom:12}}>Tap a day to toggle it on or off. Green = active.</div>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        {DAYS.map(function(d){var on=draft.days.includes(d);return <button key={d} onClick={function(){toggleDay(d);}} style={{flex:1,padding:"10px 4px",borderRadius:10,border:"2px solid "+(on?C.primary:C.border),background:on?C.primaryLight:"transparent",color:on?C.primary:C.textSecondary,fontSize:13,fontWeight:on?700:500,cursor:"pointer"}}>{d}</button>;})}
      </div>
      <div style={{display:"flex",gap:8}}>
        {[["Weekdays only",["Mon","Tue","Wed","Thu","Fri"]],["Every day",DAYS.slice()],["Clear all",[]]].map(function(item){return <Btn key={item[0]} onClick={function(){update({days:item[1]});}} style={{fontSize:12,padding:"6px 14px"}}>{item[0]}</Btn>;})}
      </div>
    </Card>
    <Card>
      <SectionTitle>Active time window</SectionTitle>
      <div style={{fontSize:13,color:C.textHint,marginBottom:14}}>The scheduler only runs between these times — so it doesn't disturb you outside working hours.</div>
      <div className="jt-grid-2" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:16}}>
        {[["Start fetching at","startTime"],["Stop fetching at","stopTime"]].map(function(item){return <div key={item[1]}><Label>{item[0]}</Label><Inp type="time" value={draft[item[1]]} onChange={function(e){var v=e.target.value;var patch={};patch[item[1]]=v;update(patch);}} /></div>;})}
      </div>
      {timeInvalid&&<Alert type="error">The stop time must be later than the start time.</Alert>}
    </Card>
    <Card>
      <SectionTitle>How often should it fetch?</SectionTitle>
      <div style={{fontSize:13,color:C.textHint,marginBottom:14}}>Choose how frequently the app checks for new jobs within your active time window.</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {[15,30,60,120,240,480].map(function(m){var on=draft.intervalMinutes===m;var label=m<60?m+" minutes":(m/60)+" hour"+(m>60?"s":"");return <button key={m} onClick={function(){update({intervalMinutes:m});}} style={{flex:1,minWidth:80,padding:"12px 8px",borderRadius:12,border:"2px solid "+(on?C.primary:C.border),background:on?C.primaryLight:"transparent",color:on?C.primary:C.textSecondary,fontSize:13,fontWeight:on?700:500,cursor:"pointer",textAlign:"center"}}>{label}</button>;})}
      </div>
    </Card>
    <div style={{display:"flex",gap:10,alignItems:"center"}}>
      <Btn variant="primary" onClick={save} disabled={!dirty||timeInvalid} style={{padding:"12px 28px"}}>Save schedule</Btn>
      {dirty&&<Btn onClick={revert}>Revert changes</Btn>}
      <span style={{fontSize:13,color:C.textHint}}>{activeCount} active profile{activeCount!==1?"s":""} will run on this schedule.</span>
    </div>
    <Card>
      <SectionTitle action={log.length>10?<Btn onClick={function(){setShowAllLog(function(v){return !v;});}} style={{fontSize:12,padding:"6px 12px"}}>{showAllLog?"Show last 10":"Show all ("+log.length+")"}</Btn>:null}>Run log</SectionTitle>
      <div style={{fontSize:13,color:C.textHint,marginBottom:12}}>A record of every time the scheduler ran and what it found. Entries older than 30 days are removed automatically.</div>
      {log.length===0
        ?<EmptyState icon="📋" title="No runs logged yet" body="Enable the scheduler and save your settings to start." />
        :<div style={{display:"flex",flexDirection:"column",gap:8}}>
          {(function(){
            // Newest first; limit to 10 unless expanded
            var ordered=log.slice().reverse();
            var visible=showAllLog?ordered:ordered.slice(0,10);
            return visible.map(function(e,i){return <div key={i} style={{display:"flex",gap:12,padding:"10px 14px",background:C.surfaceAlt,borderRadius:10,fontSize:13}}><span style={{color:C.textHint,whiteSpace:"nowrap",fontFamily:"monospace",fontSize:12}}>{e.time}</span><span style={{color:e.type==="error"?C.error:e.type==="manual"?C.info:C.success}}>{e.msg}</span></div>;});
          })()}
          {!showAllLog&&log.length>10&&<div style={{fontSize:12,color:C.textHint,textAlign:"center",padding:"4px"}}>… {log.length-10} more entr{log.length-10===1?"y":"ies"} hidden</div>}
        </div>}
    </Card>
    <Card>
      <SectionTitle>Backup & restore</SectionTitle>
      <div style={{fontSize:13,color:C.textHint,marginBottom:14,lineHeight:1.55}}>Download a JSON file containing all your jobs, profiles, CV, schedule, conversations and settings. Keep it safe — this is your only recovery option if your browser data is cleared.</div>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:18}}>
        <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:C.textSecondary,cursor:"pointer",userSelect:"none"}}>
          <input type="checkbox" checked={excludeKeys} onChange={function(){setExcludeKeys(function(v){return !v;});}} style={{width:16,height:16,cursor:"pointer",accentColor:C.primary}} />
          <span>Exclude API keys from export <span style={{color:C.textHint}}>(recommended if you'll share the file)</span></span>
        </label>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <Btn variant="primary" onClick={function(){exportData(excludeKeys);}}>⬇ Export backup ({excludeKeys?"without keys":"with keys"})</Btn>
        </div>
      </div>
      <div style={{borderTop:"1px solid "+C.border,paddingTop:16}}>
        <div style={{fontSize:13,color:C.textHint,marginBottom:14,lineHeight:1.55}}>Restore from a previous backup. Your current data will be fully replaced.</div>
        <input ref={fileInputRef} type="file" accept="application/json,.json" onChange={onFileChosen} style={{display:"none"}} />
        <Btn onClick={startImport}>⬆ Import backup…</Btn>
        {importError&&<Alert type="error">{importError}</Alert>}
        {importPreview&&<div style={{marginTop:14,padding:"14px 16px",background:C.primaryLight,borderRadius:12,border:"2px solid "+C.primary}}>
          <div style={{fontSize:13,fontWeight:700,color:C.primary,marginBottom:8,letterSpacing:"0.5px"}}>BACKUP READY TO RESTORE</div>
          <div style={{fontSize:13,color:C.textPrimary,lineHeight:1.7,marginBottom:12}}>
            • {importPreview.stats.jobs} job{importPreview.stats.jobs!==1?"s":""}<br/>
            • {importPreview.stats.profiles} search profile{importPreview.stats.profiles!==1?"s":""}<br/>
            • CV: {importPreview.stats.hasCv?"included":"not included"}<br/>
            • API keys: {importPreview.stats.hasKeys?"included":"not included"}<br/>
            • Exported: {importPreview.stats.exportedAt!=="unknown"?new Date(importPreview.stats.exportedAt).toLocaleString():"unknown"}
          </div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <Btn variant="primary" onClick={confirmImport}>Replace all data with this backup</Btn>
            <Btn onClick={function(){setImportPreview(null);}}>Cancel</Btn>
          </div>
        </div>}
      </div>
    </Card>
    <Card>
      <SectionTitle>Dismissed jobs list</SectionTitle>
      <div style={{fontSize:13,color:C.textHint,marginBottom:14,lineHeight:1.55}}>
        When you dismiss or delete a job, its ID is remembered so future fetches from Arbetsförmedlingen or JSearch won't re-add it.
        {(dismissedIds&&dismissedIds.length)?" Currently blocking "+dismissedIds.length+" job ID"+(dismissedIds.length!==1?"s":"")+" from re-ingestion.":" The list is currently empty."}
      </div>
      <Btn onClick={function(){
        if(!dismissedIds||!dismissedIds.length) return;
        if(!confirm("Clear the dismissed-jobs list? Previously dismissed jobs will become eligible for re-ingestion on the next fetch.")) return;
        if(clearDismissedIds) clearDismissedIds();
      }} disabled={!dismissedIds||!dismissedIds.length}>Clear dismissed list</Btn>
    </Card>
    <Card>
      <SectionTitle>Reset</SectionTitle>
      <div style={{fontSize:13,color:C.textHint,marginBottom:14,lineHeight:1.55}}>Your jobs, profiles, CV, API keys and schedule are saved in this browser only. Nothing is sent anywhere unless you trigger a fetch or AI action yourself.</div>
      <Btn variant="danger" onClick={resetAllData}>Reset all data</Btn>
    </Card>
  </div>;
}

// ─── CV & Profile ─────────────────────────────────────────────────────────────
// ─── InlineListEditor ─────────────────────────────────────────────────────────
// Reusable spreadsheet-style list editor. Used for Tools, Skills, Achievements.
// `fields` defines column specs: [{key, label, placeholder, type, flex, minWidth, multiline}]
// `sortFields` defines which columns are sortable: [{key, label}]
// `defaultSort` sets the initial sort: {key, dir} where dir is "asc"|"desc"
const PROFICIENCY = ["Beginner","Intermediate","Advanced","Expert"];
const PROF_ORDER = {Beginner:0,Intermediate:1,Advanced:2,Expert:3};

function InlineListEditor({items,onChange,fields,addLabel,sortFields,defaultSort}){
  var [editId,setEditId]=useState(null);
  var [draft,setDraft]=useState({});
  var [adding,setAdding]=useState(false);
  var [sort,setSort]=useState(defaultSort||{key:null,dir:"asc"});

  function emptyDraft(){
    var d={};
    fields.forEach(function(f){ d[f.key]=f.type==="number"?0:""; });
    return d;
  }
  function startAdd(){
    setDraft(emptyDraft());
    setAdding(true);
    setEditId(null);
  }
  function startEdit(item){
    setDraft(Object.assign({},item));
    setEditId(item.id);
    setAdding(false);
  }
  function cancel(){
    setAdding(false);
    setEditId(null);
    setDraft({});
  }
  function save(){
    var firstKey=fields[0].key;
    if(!String(draft[firstKey]||"").trim()) return;
    if(adding){
      onChange(items.concat([Object.assign({id:Date.now()},draft)]));
    } else {
      onChange(items.map(function(x){ return x.id===editId?Object.assign({},x,draft):x; }));
    }
    cancel();
  }
  function remove(id){
    onChange(items.filter(function(x){ return x.id!==id; }));
  }
  function setField(key,val){
    setDraft(function(d){ return Object.assign({},d,{[key]:val}); });
  }
  function toggleSort(key){
    setSort(function(s){
      if(s.key===key) return {key:key,dir:s.dir==="asc"?"desc":"asc"};
      // Default direction per field type
      var f=fields.find(function(f){return f.key===key;});
      var defaultDir=(f&&(f.type==="number"||key==="year"))?"desc":"asc";
      return {key:key,dir:defaultDir};
    });
  }

  // Apply sort to display list (never mutates the source array)
  var displayed=items.slice();
  if(sort.key){
    var sk=sort.key;
    var sd=sort.dir;
    displayed.sort(function(a,b){
      var av=a[sk],bv=b[sk];
      // Level uses proficiency order
      if(sk==="level"){
        av=PROF_ORDER[av]||0;
        bv=PROF_ORDER[bv]||0;
        return sd==="asc"?av-bv:bv-av;
      }
      if(typeof av==="number"&&typeof bv==="number"){
        return sd==="asc"?av-bv:bv-av;
      }
      // String / year
      av=String(av||"").toLowerCase();
      bv=String(bv||"").toLowerCase();
      if(av<bv) return sd==="asc"?-1:1;
      if(av>bv) return sd==="asc"?1:-1;
      return 0;
    });
  }

  function renderCell(f,val,onChangeFn){
    var baseStyle={fontSize:13,padding:"6px 8px",borderRadius:7,border:"1.5px solid "+C.border,background:C.surface,color:C.textPrimary,fontFamily:"inherit",width:"100%",boxSizing:"border-box"};
    if(f.type==="select"){
      return <select value={val||""} onChange={function(e){onChangeFn(e.target.value);}} style={baseStyle}>
        {(f.options||[]).map(function(o){ return <option key={o}>{o}</option>; })}
      </select>;
    }
    if(f.type==="number"){
      return <input type="number" min={0} max={50} value={val||""} onChange={function(e){onChangeFn(Number(e.target.value));}} style={Object.assign({},baseStyle,{width:60})} />;
    }
    if(f.multiline){
      return <textarea value={val||""} onChange={function(e){onChangeFn(e.target.value);}} placeholder={f.placeholder||""} rows={2} style={Object.assign({},baseStyle,{resize:"vertical",lineHeight:1.4})} />;
    }
    return <input type="text" value={val||""} onChange={function(e){onChangeFn(e.target.value);}} placeholder={f.placeholder||""} style={baseStyle} />;
  }

  var isEditing=adding||editId!==null;

  // Sort controls
  var sortControls=sortFields&&sortFields.length>0&&<div style={{display:"flex",gap:6,alignItems:"center",marginBottom:8,flexWrap:"wrap"}}>
    <span style={{fontSize:11,color:C.textHint,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px",marginRight:2}}>Sort:</span>
    {sortFields.map(function(sf){
      var active=sort.key===sf.key;
      var arrow=active?(sort.dir==="asc"?" ↑":" ↓"):"";
      return <button key={sf.key} onClick={function(){toggleSort(sf.key);}} style={{fontSize:12,padding:"3px 10px",borderRadius:6,border:"1.5px solid "+(active?C.primary:C.border),background:active?C.primaryLight:"transparent",color:active?C.primary:C.textSecondary,cursor:"pointer",fontWeight:active?700:400}}>
        {sf.label}{arrow}
      </button>;
    })}
  </div>;

  return <div>
    {items.length>1&&sortControls}
    {/* Saved rows */}
    {displayed.length>0&&<div style={{marginBottom:8}}>
      {displayed.map(function(item){
        if(editId===item.id){
          return <div key={item.id} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"6px 8px",background:C.primaryLight,borderRadius:8,marginBottom:4}}>
            {fields.map(function(f){
              return <div key={f.key} style={{flex:f.flex||1,minWidth:f.minWidth||0}}>
                {renderCell(f,draft[f.key],function(v){ setField(f.key,v); })}
              </div>;
            })}
            <div style={{display:"flex",gap:4,width:56,flexShrink:0,paddingTop:2}}>
              <button onClick={save} title="Save" style={{flex:1,background:C.primary,color:"#fff",border:"none",borderRadius:6,padding:"5px 0",cursor:"pointer",fontSize:13}}>✓</button>
              <button onClick={cancel} title="Cancel" style={{flex:1,background:C.border,color:C.textPrimary,border:"none",borderRadius:6,padding:"5px 0",cursor:"pointer",fontSize:13}}>✗</button>
            </div>
          </div>;
        }
        return <div key={item.id} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"7px 8px",borderRadius:8,marginBottom:3,background:C.surfaceAlt}}>
          {fields.map(function(f){
            var val=item[f.key];
            var display=f.type==="number"&&val?val+" yr"+(val!==1?"s":""):val;
            return <div key={f.key} style={{flex:f.flex||1,minWidth:f.minWidth||0,fontSize:13,color:C.textPrimary,whiteSpace:f.multiline?"pre-wrap":"nowrap",overflow:f.multiline?"visible":"hidden",textOverflow:f.multiline?"unset":"ellipsis",wordBreak:f.multiline?"break-word":"normal",lineHeight:1.45}}>
              {display||<span style={{color:C.textHint}}>—</span>}
            </div>;
          })}
          <div style={{display:"flex",gap:4,width:56,flexShrink:0,paddingTop:2}}>
            <button onClick={function(){ startEdit(item); }} disabled={isEditing} title="Edit" style={{flex:1,background:"none",border:"1px solid "+C.border,borderRadius:6,padding:"4px 0",cursor:isEditing?"not-allowed":"pointer",fontSize:12,color:C.textSecondary}}>✏</button>
            <button onClick={function(){ remove(item.id); }} disabled={isEditing} title="Delete" style={{flex:1,background:"none",border:"1px solid "+C.border,borderRadius:6,padding:"4px 0",cursor:isEditing?"not-allowed":"pointer",fontSize:12,color:C.error}}>🗑</button>
          </div>
        </div>;
      })}
    </div>}
    {/* Add row */}
    {adding&&<div style={{display:"flex",gap:8,alignItems:"flex-start",padding:"6px 8px",background:C.primaryLight,borderRadius:8,marginBottom:8}}>
      {fields.map(function(f){
        return <div key={f.key} style={{flex:f.flex||1,minWidth:f.minWidth||0}}>
          {renderCell(f,draft[f.key],function(v){ setField(f.key,v); })}
        </div>;
      })}
      <div style={{display:"flex",gap:4,width:56,flexShrink:0,paddingTop:2}}>
        <button onClick={save} title="Save" style={{flex:1,background:C.primary,color:"#fff",border:"none",borderRadius:6,padding:"5px 0",cursor:"pointer",fontSize:13}}>✓</button>
        <button onClick={cancel} title="Cancel" style={{flex:1,background:C.border,color:C.textPrimary,border:"none",borderRadius:6,padding:"5px 0",cursor:"pointer",fontSize:13}}>✗</button>
      </div>
    </div>}
    {!isEditing&&<button onClick={startAdd} style={{fontSize:13,color:C.primary,background:"none",border:"1.5px dashed "+C.primary,borderRadius:8,padding:"7px 14px",cursor:"pointer",fontWeight:600,width:"100%",marginTop:displayed.length?4:0}}>+ {addLabel||"Add entry"}</button>}
  </div>;
}
