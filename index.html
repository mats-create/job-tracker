}


// ─── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard({jobs,schedule,setActiveTab,navigateToJobs,rescoreAll,scoringStatus,onRunAllProfiles,profiles,cv,anthropicKey}){
  var [fetchStatus,setFetchStatus]=useState(null);
  var [fetchMsg,setFetchMsg]=useState("");
  var canFetch=(profiles||[]).filter(function(p){return p.active;}).length>0;
  var canRescore=hasCv(cv)&&jobs.filter(function(j){return !j.archived;}).length>0;

  async function handleRunAll(){
    if(!canFetch) return;
    setFetchStatus("running");
    setFetchMsg("Fetch started — running all active profiles…");
    try{
      await onRunAllProfiles("manual");
      setFetchStatus("done");
      setFetchMsg("Fetch complete — dashboard updated.");
    }catch(e){
      setFetchStatus("error");
      setFetchMsg("Fetch failed: "+(e.message||"unknown error"));
    }
    setTimeout(function(){setFetchStatus(null);setFetchMsg("");},5000);
  }

  function handleRescore(){
    if(!canRescore) return;
    rescoreAll();
  }

  var active=jobs.filter(function(j){return !j.archived;});
  var total=active.length;
  var avgScore=total?Math.round(active.reduce(function(a,j){return a+j.score;},0)/total):0;
  var applied=active.filter(function(j){return APPLIED_STATUSES.includes(j.status);}).length;
  var topMatch=active.reduce(function(a,j){return j.score>(a?a.score:0)?j:a;},null);
  var newCount=active.filter(function(j){return j.status==="New";}).length;
  var rejectedCount=active.filter(function(j){return j.status==="Rejected";}).length;
  var noResponseCount=active.filter(function(j){return j.status==="No response";}).length;
  var adRemovedCount=active.filter(function(j){return j.status==="Ad removed";}).length;
  var notRelevantCount=active.filter(function(j){return j.status==="Not relevant";}).length;
  var closedTotal=rejectedCount+noResponseCount+adRemovedCount+notRelevantCount;

  return <div style={{display:"flex",flexDirection:"column",gap:20}}>
    <div style={{background:"linear-gradient(135deg,"+C.primary+" 0%,"+C.primaryDark+" 100%)",borderRadius:20,padding:"28px",color:"#fff",boxShadow:C.shadowMd}}>
      <div style={{fontSize:22,fontWeight:700,marginBottom:6}}>Good to see you! 👋</div>
      <div style={{fontSize:14,opacity:0.85,marginBottom:20}}>Here's your job search summary for today.</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12}}>
        {[
          {label:"Jobs tracked",value:total,sub:"total in pipeline",nav:total>0?{}:null},
          {label:"New to review",value:newCount,sub:"waiting for you",nav:newCount>0?{status:"New"}:null},
          {label:"Applications sent",value:applied,sub:"in progress",nav:applied>0?{statusGroup:"applied"}:null},
          {label:"Best match",value:topMatch?topMatch.score+"%":"—",sub:topMatch?topMatch.company:"no jobs yet",nav:topMatch?{expandId:topMatch.id}:null},
        ].map(function(s){
          var clickable=!!(s.nav&&navigateToJobs);
          var content=<React.Fragment>
            <div style={{fontSize:24,fontWeight:700,marginBottom:2}}>{s.value}</div>
            <div style={{fontSize:12,fontWeight:600,opacity:0.9}}>{s.label}</div>
            <div style={{fontSize:11,opacity:0.65,marginTop:2}}>{s.sub}</div>
          </React.Fragment>;
          if(!clickable){
            return <div key={s.label} style={{background:"rgba(255,255,255,0.15)",borderRadius:12,padding:"14px 16px"}}>{content}</div>;
          }
          return <button key={s.label} onClick={function(){navigateToJobs(s.nav);}} style={{background:"rgba(255,255,255,0.15)",borderRadius:12,padding:"14px 16px",border:"none",color:"inherit",cursor:"pointer",textAlign:"left",fontFamily:"inherit",transition:"background 0.15s ease, transform 0.1s ease"}} onMouseEnter={function(e){e.currentTarget.style.background="rgba(255,255,255,0.25)";}} onMouseLeave={function(e){e.currentTarget.style.background="rgba(255,255,255,0.15)";}}>{content}</button>;
        })}
      </div>
    </div>
    <Card style={{display:"flex",flexDirection:"column",gap:12,padding:"16px 20px"}}>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <div style={{width:12,height:12,borderRadius:"50%",background:schedule.enabled?"#4CAF50":C.border,flexShrink:0,boxShadow:schedule.enabled?"0 0 0 3px rgba(76,175,80,0.2)":"none"}} />
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:600,color:C.textPrimary}}>{schedule.enabled?"Auto-fetch is running":"Auto-fetch is off"}</div>
          <div style={{fontSize:12,color:C.textHint,marginTop:2}}>{schedule.enabled?"Fetching on "+schedule.days.join(", ")+" · "+schedule.startTime+"–"+schedule.stopTime+" · every "+schedule.intervalMinutes+" min":"Turn on the Scheduler to automatically fetch new jobs throughout the day."}</div>
        </div>
        <Btn onClick={function(){setActiveTab("scheduler");}} style={{fontSize:13,padding:"8px 16px",whiteSpace:"nowrap"}}>{schedule.enabled?"View schedule":"Set up schedule"}</Btn>
      </div>
      <div style={{borderTop:"1px solid "+C.border,paddingTop:12,display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
        <Btn
          onClick={handleRunAll}
          disabled={!canFetch||fetchStatus==="running"}
          style={{fontSize:13,padding:"8px 16px",display:"inline-flex",alignItems:"center",gap:6}}
        >
          {fetchStatus==="running"
            ?<React.Fragment><span style={{display:"inline-block",width:12,height:12,border:"2px solid currentColor",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.7s linear infinite",flexShrink:0}} />Fetching…</React.Fragment>
            :"▶ Run all active"}
        </Btn>
        <Btn
          onClick={handleRescore}
          disabled={!canRescore||scoringStatus.active}
          style={{fontSize:13,padding:"8px 16px",display:"inline-flex",alignItems:"center",gap:6}}
        >
          {scoringStatus.active
            ?<React.Fragment><span style={{display:"inline-block",width:12,height:12,border:"2px solid currentColor",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.7s linear infinite",flexShrink:0}} />Scoring {scoringStatus.done}/{scoringStatus.total}…</React.Fragment>
            :"⟳ Rescore all"}
        </Btn>
        {!canFetch&&<span style={{fontSize:12,color:C.textHint}}>No active search profiles.</span>}
        {!canRescore&&!scoringStatus.active&&!hasCv(cv)&&<span style={{fontSize:12,color:C.textHint}}>Add your CV to enable rescoring.</span>}
      </div>
      {(fetchStatus||scoringStatus.active||(!scoringStatus.active&&scoringStatus.total>0))&&
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {fetchMsg&&<Alert type={fetchStatus==="error"?"error":fetchStatus==="done"?"success":"info"}>{fetchMsg}</Alert>}
          {scoringStatus.active&&<Alert type="info">Rescoring started — scoring {scoringStatus.done} of {scoringStatus.total} jobs…</Alert>}
          {!scoringStatus.active&&scoringStatus.total>0&&<Alert type="success">Rescoring complete — {scoringStatus.total} jobs updated.</Alert>}
        </div>}
    </Card>
    <Card>
      <SectionTitle>Application pipeline</SectionTitle>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        {ACTIVE_STATUSES.map(function(s){
          var count=active.filter(function(j){return j.status===s;}).length;
          var clickable=count>0&&navigateToJobs;
          var inner=<React.Fragment>
            <div style={{fontSize:22,fontWeight:700,color:STATUS[s].color}}>{count}</div>
            <div style={{fontSize:11,fontWeight:600,color:STATUS[s].color,marginTop:4,opacity:0.8}}>{s}</div>
          </React.Fragment>;
          if(!clickable){
            return <div key={s} style={{flex:"1 1 100px",minWidth:90,background:STATUS[s].bg,borderRadius:12,padding:"14px 10px",textAlign:"center"}}>{inner}</div>;
          }
          return <button key={s} onClick={function(){navigateToJobs({status:s});}} style={{flex:"1 1 100px",minWidth:90,background:STATUS[s].bg,borderRadius:12,padding:"14px 10px",textAlign:"center",border:"none",cursor:"pointer",fontFamily:"inherit",transition:"transform 0.1s ease, box-shadow 0.15s ease"}} onMouseEnter={function(e){e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,0.08)";}} onMouseLeave={function(e){e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="";}}>{inner}</button>;
        })}
      </div>
      {closedTotal>0&&<div style={{marginTop:14,paddingTop:14,borderTop:"1px solid "+C.border,display:"flex",alignItems:"center",gap:16,flexWrap:"wrap",fontSize:12,color:C.textSecondary}}>
        <span style={{fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",color:C.textHint,fontSize:11}}>Closed</span>
        {rejectedCount>0&&(navigateToJobs
          ?<button onClick={function(){navigateToJobs({status:"Rejected"});}} style={{background:"none",border:"none",cursor:"pointer",color:C.textSecondary,fontFamily:"inherit",fontSize:12,padding:0,textDecoration:"underline",textDecorationColor:"transparent",textUnderlineOffset:3,transition:"text-decoration-color 0.15s"}} onMouseEnter={function(e){e.currentTarget.style.textDecorationColor=STATUS.Rejected.color;}} onMouseLeave={function(e){e.currentTarget.style.textDecorationColor="transparent";}}><b style={{color:STATUS.Rejected.color}}>{rejectedCount}</b> rejected</button>
          :<span><b style={{color:STATUS.Rejected.color}}>{rejectedCount}</b> rejected</span>)}
        {noResponseCount>0&&(navigateToJobs
          ?<button onClick={function(){navigateToJobs({status:"No response"});}} style={{background:"none",border:"none",cursor:"pointer",color:C.textSecondary,fontFamily:"inherit",fontSize:12,padding:0,textDecoration:"underline",textDecorationColor:"transparent",textUnderlineOffset:3,transition:"text-decoration-color 0.15s"}} onMouseEnter={function(e){e.currentTarget.style.textDecorationColor=STATUS["No response"].color;}} onMouseLeave={function(e){e.currentTarget.style.textDecorationColor="transparent";}}><b style={{color:STATUS["No response"].color}}>{noResponseCount}</b> no response</button>
          :<span><b style={{color:STATUS["No response"].color}}>{noResponseCount}</b> no response</span>)}
        {adRemovedCount>0&&(navigateToJobs
          ?<button onClick={function(){navigateToJobs({status:"Ad removed"});}} style={{background:"none",border:"none",cursor:"pointer",color:C.textSecondary,fontFamily:"inherit",fontSize:12,padding:0,textDecoration:"underline",textDecorationColor:"transparent",textUnderlineOffset:3,transition:"text-decoration-color 0.15s"}} onMouseEnter={function(e){e.currentTarget.style.textDecorationColor=STATUS["Ad removed"].color;}} onMouseLeave={function(e){e.currentTarget.style.textDecorationColor="transparent";}}><b style={{color:STATUS["Ad removed"].color}}>{adRemovedCount}</b> ad removed</button>
          :<span><b style={{color:STATUS["Ad removed"].color}}>{adRemovedCount}</b> ad removed</span>)}
        {notRelevantCount>0&&(navigateToJobs
          ?<button onClick={function(){navigateToJobs({status:"Not relevant"});}} style={{background:"none",border:"none",cursor:"pointer",color:C.textSecondary,fontFamily:"inherit",fontSize:12,padding:0,textDecoration:"underline",textDecorationColor:"transparent",textUnderlineOffset:3,transition:"text-decoration-color 0.15s"}} onMouseEnter={function(e){e.currentTarget.style.textDecorationColor=STATUS["Not relevant"].color;}} onMouseLeave={function(e){e.currentTarget.style.textDecorationColor="transparent";}}><b style={{color:STATUS["Not relevant"].color}}>{notRelevantCount}</b> not relevant</button>
          :<span><b style={{color:STATUS["Not relevant"].color}}>{notRelevantCount}</b> not relevant</span>)}
        <span style={{color:C.textHint,marginLeft:"auto"}}>Total closed: {closedTotal}</span>
      </div>}
      {(function(){
        var now=Date.now();
        var thirtyDaysMs=30*24*60*60*1000;
        var stale=active.filter(function(j){
          if(j.status!=="Applied") return false;
          var ref=j.appliedAt||j.date;
          if(!ref) return false;
          return (now-new Date(ref).getTime())>thirtyDaysMs;
        });
        if(!stale.length) return null;
        return <Alert type="info">
          <span>{stale.length} applied job{stale.length!==1?"s have":" has"} been silent for 30+ days. <span style={{fontWeight:600,textDecoration:"underline",cursor:"pointer"}} onClick={function(){setActiveTab("jobs");}}>Review in My Jobs</span> and mark as <i>No response</i> if appropriate to close the loop.</span>
        </Alert>;
      })()}
    </Card>
    <Card>
      <SectionTitle action={<Btn onClick={function(){setActiveTab("jobs");}} style={{fontSize:12,padding:"6px 14px"}}>View all</Btn>}>Recently added jobs</SectionTitle>
      {active.length===0
        ?<EmptyState icon="🔍" title="No jobs yet" body="Go to Search Profiles to fetch jobs automatically." />
        :<div style={{display:"flex",flexDirection:"column",gap:10}}>
          {active.slice(0,5).map(function(j){
            var inner=<React.Fragment>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:700,color:C.textPrimary,marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{j.title}</div>
                <div style={{fontSize:12,color:C.textSecondary}}>{j.company} · {j.location}</div>
              </div>
              <ScorePill score={j.score} rationale={j.rationale} scored={j.scored!==false} />
              <Chip label={j.status} bg={STATUS[j.status].bg} color={STATUS[j.status].color} />
            </React.Fragment>;
            if(!navigateToJobs){
              return <div key={j.id} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",background:C.surfaceAlt,borderRadius:12}}>{inner}</div>;
            }
            return <button key={j.id} onClick={function(){navigateToJobs({expandId:j.id});}} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",background:C.surfaceAlt,borderRadius:12,border:"none",cursor:"pointer",fontFamily:"inherit",textAlign:"left",width:"100%",transition:"background 0.15s ease"}} onMouseEnter={function(e){e.currentTarget.style.background=C.primaryLight;}} onMouseLeave={function(e){e.currentTarget.style.background=C.surfaceAlt;}}>{inner}</button>;
          })}
        </div>}
    </Card>
  </div>;
}


// ─── StatusSheet — mobile bottom sheet for status picking ────────────────────
function StatusSheet({current,onSelect,onClose}){
  return <React.Fragment>
    <div className="jt-status-sheet-overlay" onClick={onClose} />
    <div className="jt-status-sheet">
      <div className="jt-status-sheet-handle" />
      <div className="jt-status-sheet-title">Change status</div>
      {STATUSES.map(function(s){
        var active=s===current;
        var col=STATUS[s]?STATUS[s].color:"#666";
        var bg=STATUS[s]?STATUS[s].bg:"#eee";
        return <button key={s} className="jt-status-option"
          onClick={function(){onSelect(s);}}
          style={{background:active?bg:"transparent",fontWeight:active?700:500}}>
          <span className="jt-status-dot" style={{background:col}} />
          <span style={{flex:1,color:active?col:C.textPrimary}}>{s}</span>
          {active&&<span style={{color:col,fontSize:18}}>✓</span>}
        </button>;
      })}
    </div>
  </React.Fragment>;
}

// ─── Job Row ──────────────────────────────────────────────────────────────────
function JobRow({job:j,expanded,selected,onSelectToggle,onToggle,onStatusChange,onNotesChange,onArchiveToggle,onDismiss,onWriteCoverLetter}){
  var src=SOURCES[j.sourceType]||SOURCES.manual;
  var hasNotes=!!(j.notes&&j.notes.trim());
  var todayStr=new Date().toISOString().slice(0,10);
  var deadlineSoon=j.deadline&&j.deadline>=todayStr&&(new Date(j.deadline)-new Date())<7*24*60*60*1000;
  var deadlinePast=j.deadline&&j.deadline<todayStr;
  var isArchived=!!j.archived;
  var [noteDraft,setNoteDraft]=useState(j.notes||"");
  var [showStatusSheet,setShowStatusSheet]=useState(false);
  var isMobile=typeof window!=="undefined"&&window.innerWidth<=767;

  useEffect(function(){ setNoteDraft(j.notes||""); },[j.id,j.notes]);
  function commitNotes(){ if((j.notes||"")!==noteDraft) onNotesChange(noteDraft); }

  function handleStatusSelect(val){
    setShowStatusSheet(false);
    onStatusChange({target:{value:val}});
  }

  var scoreColor=j.score>=75?C.success:j.score>=50?C.warning:C.error;
  var scoreBg=j.score>=75?C.successBg:j.score>=50?C.warningBg:C.errorBg;
  var rowBg=selected?C.primaryLight:isArchived?"#F0F0EE":C.surfaceAlt;
  var rowBorder=selected?"1.5px solid "+C.primary:isArchived?"1.5px dashed "+C.border:"1.5px solid transparent";

  return <div className="jt-job-row" style={{background:rowBg,borderRadius:14,border:rowBorder,opacity:isArchived&&!selected?0.75:1,transition:"background 0.15s"}}>

    {showStatusSheet&&<StatusSheet current={j.status} onSelect={handleStatusSelect} onClose={function(){setShowStatusSheet(false);}} />}

    {/* ── Collapsed header ── */}
    <div className="jt-job-row-header" style={{padding:"14px 14px 12px",display:"flex",alignItems:"flex-start",gap:10}}>
      {onSelectToggle&&<input type="checkbox" checked={!!selected} onChange={onSelectToggle}
        onClick={function(e){e.stopPropagation();}}
        style={{width:20,height:20,marginTop:4,flexShrink:0,cursor:"pointer",accentColor:C.primary}} />}

      <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={onToggle}>
        {/* Title + score */}
        <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:5}}>
          <span className="jt-job-title" style={{flex:1,fontSize:15,fontWeight:700,color:C.textPrimary,lineHeight:1.3,wordBreak:"break-word"}}>
            {j.title}
            {isArchived&&<span style={{fontSize:11,padding:"1px 6px",borderRadius:8,background:C.border,color:C.textSecondary,fontWeight:600,marginLeft:6,verticalAlign:"middle"}}>archived</span>}
          </span>
          {j.scored!==false&&j.score!=null&&
            <span className="jt-job-score" style={{fontSize:12,fontWeight:700,color:scoreColor,background:scoreBg,borderRadius:8,padding:"3px 8px",flexShrink:0,lineHeight:1.6}}>
              {j.score}%
            </span>}
        </div>

        {/* Company + location */}
        <div className="jt-job-meta" style={{fontSize:mob()?15:13,color:C.textSecondary,marginBottom:8,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
          {j.company}{j.location?<span style={{color:C.textHint}}> · {j.location}</span>:null}
        </div>

        {/* Status + badges row */}
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          {isMobile
            ? <button onClick={function(e){e.stopPropagation();setShowStatusSheet(true);}}
                style={{display:"inline-flex",alignItems:"center",gap:6,
                  fontSize:13,fontWeight:700,padding:"6px 12px",
                  background:STATUS[j.status].bg,color:STATUS[j.status].color,
                  border:"none",borderRadius:10,cursor:"pointer",
                  fontFamily:"inherit",minHeight:36,flexShrink:0}}>
                <span style={{width:8,height:8,borderRadius:"50%",background:STATUS[j.status].color,flexShrink:0}} />
                {j.status}
                <span style={{fontSize:10,opacity:0.7}}>▼</span>
              </button>
            : <select value={j.status} onChange={onStatusChange}
                onClick={function(e){e.stopPropagation();}}
                style={{fontSize:12,padding:"4px 8px",background:STATUS[j.status].bg,color:STATUS[j.status].color,fontWeight:700,border:"none",borderRadius:8,cursor:"pointer",flexShrink:0}}>
                {STATUSES.map(function(s){return <option key={s}>{s}</option>;})}
              </select>}

          {deadlinePast&&<span style={{fontSize:11,fontWeight:600,color:C.error}}>⚠ Deadline passed</span>}
          {!deadlinePast&&deadlineSoon&&<span style={{fontSize:11,fontWeight:600,color:C.warning}}>⏰ {j.deadline}</span>}
          {hasNotes&&!expanded&&<span style={{fontSize:13,color:C.textHint}} title="Has notes">📝</span>}
          {j.coverLetter&&!expanded&&<span title="Cover letter saved" style={{fontSize:12,fontWeight:600,color:C.primary,background:C.primary+"22",borderRadius:6,padding:"2px 7px"}}>✉</span>}
          <span style={{marginLeft:"auto",fontSize:12,color:C.primary,fontWeight:600,whiteSpace:"nowrap"}}>
            {expanded?"▲ Less":"▼ More"}
          </span>
        </div>
      </div>
    </div>

    {/* ── Expanded section ── */}
    {expanded&&<div style={{borderTop:"1px solid "+C.border}}>

      {/* Details strip */}
      <div style={{padding:"12px 14px 0",fontSize:mob()?15:13,color:C.textHint,display:"flex",flexWrap:"wrap",gap:"4px 14px"}}>
        <span>Added {j.date}</span>
        {j.employmentType&&<span>{j.employmentType}</span>}
        {j.remote===true&&<span>🌐 Remote</span>}
        {j.salary&&<span>💰 {j.salary}</span>}
        {!deadlinePast&&!deadlineSoon&&j.deadline&&<span>📅 {j.deadline}</span>}
      </div>

      {/* AI rationale */}
      {j.rationale&&j.scored!==false&&<div style={{margin:"10px 14px 0",fontSize:mob()?15:13,color:C.textSecondary,fontStyle:"italic",background:C.surface,borderRadius:8,padding:"8px 12px",lineHeight:1.55,borderLeft:"3px solid "+C.primary}}>
        {j.rationale}
      </div>}

      {/* Tags + link */}
      <div style={{padding:"10px 14px 0",display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
        <Chip label={src.label} bg={src.bg} color={src.color} />
        {j.tags.map(function(t,i){return <Chip key={t+i} label={t} />;})}
        {(j.applyUrl||j.url)&&<a href={j.applyUrl||j.url} target="_blank" rel="noopener noreferrer"
          style={{fontSize:13,color:C.primary,fontWeight:600,textDecoration:"none",marginLeft:"auto"}}>
          View posting ↗
        </a>}
      </div>

      {/* Notes */}
      <div style={{padding:"12px 14px 0"}}>
        <div style={{fontSize:mob()?13:12,fontWeight:600,color:C.textHint,letterSpacing:"0.5px",marginBottom:6}}>NOTES</div>
        <textarea
          className="jt-notes-area"
          value={noteDraft}
          onChange={function(e){setNoteDraft(e.target.value);}}
          onBlur={commitNotes}
          placeholder="Track progress, interview prep, next steps..."
          rows={3}
          style={{width:"100%",fontSize:14,padding:"10px 12px",borderRadius:10,
            border:"1.5px solid "+C.border,background:C.surface,color:C.textPrimary,
            boxSizing:"border-box",resize:"vertical",fontFamily:"inherit",lineHeight:1.5}} />
      </div>

      {/* Full description */}
      {j.description&&<div style={{padding:"10px 14px 0"}}>
        <div style={{fontSize:mob()?13:12,fontWeight:600,color:C.textHint,letterSpacing:"0.5px",marginBottom:6}}>ROLE DESCRIPTION</div>
        <div style={{fontSize:mob()?15:13,lineHeight:1.65,color:C.textPrimary,maxHeight:220,overflowY:"auto",
          whiteSpace:"pre-wrap",background:C.surface,padding:"10px 12px",borderRadius:10,
          border:"1px solid "+C.border}}>{j.description}</div>
      </div>}

      {/* Saved cover letter preview */}
      {j.coverLetter&&<div style={{padding:"10px 14px 0"}}>
        <div style={{fontSize:12,fontWeight:600,color:C.textHint,letterSpacing:"0.5px",marginBottom:6,display:"flex",alignItems:"center",gap:8}}>
          COVER LETTER
          <button onClick={function(){navigator.clipboard.writeText(j.coverLetter);}}
            style={{fontSize:11,fontWeight:600,color:C.primary,background:"none",border:"none",cursor:"pointer",padding:"1px 6px",borderRadius:6,fontFamily:"inherit"}}>Copy</button>
        </div>
        <div style={{fontSize:mob()?15:13,lineHeight:1.7,color:C.textPrimary,whiteSpace:"pre-wrap",
          background:C.surface,padding:"10px 12px",borderRadius:10,border:"1px solid "+C.border,
          maxHeight:240,overflowY:"auto"}}>{j.coverLetter}</div>
      </div>}

      {/* ── Action buttons ── */}
      <div className="jt-job-actions" style={{padding:"14px",display:"flex",flexDirection:"column",gap:10}}>
        {/* Primary: cover letter */}
        {onWriteCoverLetter&&!isArchived&&["New","Reviewing","Applied"].includes(j.status)&&
          <button onClick={function(){onWriteCoverLetter(j.id);}}
            className="jt-mob-btn"
            style={{fontSize:14,fontWeight:700,padding:"12px 16px",borderRadius:12,
              border:"none",background:C.primaryLight,color:C.primary,
              cursor:"pointer",fontFamily:"inherit",width:"100%",minHeight:48,
              display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            ✉ Write cover letter
          </button>}

        {/* Secondary: archive + dismiss side by side */}
        <div className="jt-job-action-row" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {onArchiveToggle&&
            <button onClick={onArchiveToggle}
              style={{fontSize:14,fontWeight:600,padding:"12px 8px",borderRadius:12,
                border:"1.5px solid "+C.border,background:"transparent",
                color:C.textSecondary,cursor:"pointer",fontFamily:"inherit",
                minHeight:48,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              {isArchived?"↩ Restore":"📦 Archive"}
            </button>}
          {onDismiss&&!isArchived&&
            <button onClick={onDismiss}
              style={{fontSize:14,fontWeight:600,padding:"12px 8px",borderRadius:12,
                border:"1.5px solid #F5C6C6",background:C.errorBg,
                color:C.error,cursor:"pointer",fontFamily:"inherit",
                minHeight:48,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              🗑 Dismiss
            </button>}
        </div>
      </div>

    </div>}
  </div>;
}

// ─── Jobs ─────────────────────────────────────────────────────────────────────
function Jobs({jobs,setJobs,rescoreAll,scoringStatus,scoringError,cv,sort,setSort,dismissJob,tombstoneIds,startCoverLetter,pendingJobsView,setPendingJobsView}){
  var [filter,setFilter]=useState("All");
  var [statusGroupFilter,setStatusGroupFilter]=useState(null);
  var [sourceFilter,setSourceFilter]=useState("all");
  var [scoreFilter,setScoreFilter]=useState(0);
  var [search,setSearch]=useState("");
  var [showAdd,setShowAdd]=useState(false);
  var [showArchived,setShowArchived]=useState(false);
  var [showFilters,setShowFilters]=useState(false);
  var [expandedId,setExpandedId]=useState(null);
  var [selectedIds,setSelectedIds]=useState(new Set());
  var [form,setForm]=useState({title:"",company:"",location:"",tags:"",applyUrl:"",salary:"",employmentType:"",description:""});

  useEffect(function(){
    if(!pendingJobsView) return;
    var p=pendingJobsView;
    if(p.status&&typeof p.status==="string"){ setFilter(p.status); setStatusGroupFilter(null); setShowFilters(true); }
    else if(p.statusGroup){ setStatusGroupFilter(p.statusGroup); setFilter("All"); setShowFilters(true); }
    else if(Object.keys(p).length===0||p.expandId){ setFilter("All"); setStatusGroupFilter(null); }
    if(typeof p.archived==="boolean") setShowArchived(p.archived);
    setSourceFilter("all"); setScoreFilter(0); setSearch("");
    if(p.expandId){
      var match=jobs.find(function(j){return String(j.id)===String(p.expandId);});
      if(match) setExpandedId(match.id);
    }
    if(setPendingJobsView) setPendingJobsView(null);
    setTimeout(function(){ window.scrollTo({top:0,behavior:"smooth"}); },0);
  },[pendingJobsView]);

  var filtered=jobs
    .filter(function(j){return showArchived?true:!j.archived;})
    .filter(function(j){return filter==="All"||j.status===filter;})
    .filter(function(j){
      if(!statusGroupFilter) return true;
      if(statusGroupFilter==="applied") return APPLIED_STATUSES.includes(j.status);
      return true;
    })
    .filter(function(j){return sourceFilter==="all"||j.sourceType===sourceFilter;})
    .filter(function(j){
      if(scoreFilter===0) return true;
      if(j.scored===false) return false;
      return(j.score||0)>=scoreFilter;
    })
    .filter(function(j){return matchesSearch(j,search);});
  filtered=sortJobs(filtered,sort);

  var todayStr=new Date().toISOString().slice(0,10);
  var passedCount=jobs.filter(function(j){return !j.archived&&j.deadline&&j.deadline<todayStr;}).length;
  var archivedCount=jobs.filter(function(j){return j.archived;}).length;

  var filteredIdSet=new Set(filtered.map(function(j){return String(j.id);}));
  var visibleSelectedCount=0;
  selectedIds.forEach(function(id){ if(filteredIdSet.has(id)) visibleSelectedCount++; });
  var allVisibleSelected=filtered.length>0&&visibleSelectedCount===filtered.length;

  function toggleSelect(jobId){
    var key=String(jobId);
    setSelectedIds(function(prev){var next=new Set(prev);if(next.has(key)) next.delete(key);else next.add(key);return next;});
  }
  function toggleSelectAllVisible(){
    setSelectedIds(function(prev){
      var next=new Set(prev);
      if(allVisibleSelected){ filtered.forEach(function(j){ next.delete(String(j.id)); }); }
      else{ filtered.forEach(function(j){ next.add(String(j.id)); }); }
      return next;
    });
  }
  function clearSelection(){ setSelectedIds(new Set()); }

  function bulkSetStatus(newStatus){
    var nowIso=new Date().toISOString();
    setJobs(function(prev){return prev.map(function(j){
      if(!selectedIds.has(String(j.id))) return j;
      var patch={status:newStatus};
      if(newStatus==="Applied"&&!j.appliedAt) patch.appliedAt=nowIso;
      if(newStatus==="Rejected"&&!j.rejectedAt) patch.rejectedAt=nowIso;
      if(newStatus==="Ad removed"&&!j.adRemovedAt) patch.adRemovedAt=nowIso;
      return Object.assign({},j,patch);
    });});
    clearSelection();
  }
  function bulkDelete(){
    var n=selectedIds.size;
    if(!confirm("Delete "+n+" job"+(n!==1?"s":"")+"? This cannot be undone.")) return;
    if(tombstoneIds) tombstoneIds(Array.from(selectedIds));
    setJobs(function(prev){return prev.filter(function(j){return !selectedIds.has(String(j.id));});});
    clearSelection();
  }
  function bulkArchive(){
    setJobs(function(prev){return prev.map(function(j){return selectedIds.has(String(j.id))?Object.assign({},j,{archived:true}):j;});});
    clearSelection();
  }
  function bulkUnarchive(){
    setJobs(function(prev){return prev.map(function(j){return selectedIds.has(String(j.id))?Object.assign({},j,{archived:false}):j;});});
    clearSelection();
  }
  function toggleArchive(jobId){
    setJobs(function(prev){return prev.map(function(j){return j.id===jobId?Object.assign({},j,{archived:!j.archived}):j;});});
  }
  function archivePassed(){
    if(!passedCount) return;
    if(!confirm("Archive "+passedCount+" job"+(passedCount!==1?"s":"")+" with passed deadlines?")) return;
    setJobs(function(prev){return prev.map(function(j){
      if(!j.archived&&j.deadline&&j.deadline<todayStr) return Object.assign({},j,{archived:true});
      return j;
    });});
  }
  function addJob(){
    if(!form.title||!form.company) return;
    setJobs(function(prev){return [{
      id:Date.now(),title:form.title,company:form.company,location:form.location,
      status:"New",score:NEUTRAL_SCORE,scored:false,rationale:"",
      source:"Manual",sourceType:"manual",
      date:new Date().toISOString().slice(0,10),lang:"English",
      tags:form.tags.split(",").map(function(t){return t.trim();}).filter(Boolean),
      url:form.applyUrl||null,description:form.description||"",
      applyUrl:form.applyUrl||null,deadline:null,
      employmentType:form.employmentType||null,salary:form.salary||null,
      remote:null,employerUrl:null,
    }].concat(prev);});
    setForm({title:"",company:"",location:"",tags:"",applyUrl:"",salary:"",employmentType:"",description:""});
    setShowAdd(false);
  }

  var activeFilterCount=0;
  if(filter!=="All"||statusGroupFilter) activeFilterCount++;
  if(sourceFilter!=="all") activeFilterCount++;
  if(scoreFilter>0) activeFilterCount++;
  if(sort!=="added_desc") activeFilterCount++;

  return <div style={{display:"flex",flexDirection:"column",gap:12}}>

    {/* ── Search + filter bar ── */}
    <Card style={{padding:"14px 16px"}}>
      <div style={{position:"relative",marginBottom:10}}>
        <Inp value={search} onChange={function(e){setSearch(e.target.value);}}
          placeholder="Search jobs…"
          style={{paddingLeft:36,paddingRight:search?36:12}} />
        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:15,color:C.textHint,pointerEvents:"none"}}>🔍</span>
        {search&&<button onClick={function(){setSearch("");}}
          style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",
            background:"none",border:"none",fontSize:20,color:C.textHint,
            cursor:"pointer",padding:"4px 8px",lineHeight:1,minHeight:"auto"}}>×</button>}
      </div>

      <button className="jt-filter-toggle"
        onClick={function(){setShowFilters(function(v){return !v;});}}
        style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",
          background:"none",border:"none",cursor:"pointer",padding:"8px 0",
          fontSize:14,fontWeight:600,color:showFilters||activeFilterCount>0?C.primary:C.textSecondary,
          fontFamily:"inherit",minHeight:44}}>
        <span style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{transition:"transform 0.2s",display:"inline-block",transform:showFilters?"rotate(90deg)":"rotate(0deg)"}}>▶</span>
          Filters &amp; Sort
          {activeFilterCount>0&&<span style={{fontSize:12,fontWeight:700,background:C.primary,color:"#fff",borderRadius:10,padding:"1px 7px",lineHeight:1.6}}>{activeFilterCount}</span>}
        </span>
        {activeFilterCount>0&&<button onClick={function(e){e.stopPropagation();setFilter("All");setStatusGroupFilter(null);setSourceFilter("all");setScoreFilter(0);setSort("added_desc");}}
          style={{fontSize:12,color:C.textHint,background:"none",border:"none",cursor:"pointer",
            padding:"4px 8px",fontFamily:"inherit",minHeight:"auto"}}>Clear all</button>}
      </button>

      {showFilters&&<div style={{display:"flex",flexDirection:"column",gap:16,paddingTop:12,borderTop:"1px solid "+C.border}}>
        {/* Sort */}
        <div>
          <div style={{fontSize:12,color:C.textHint,fontWeight:700,letterSpacing:"0.5px",marginBottom:8}}>SORT BY</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {SORT_OPTIONS.map(function(o){var on=sort===o.key;return <button key={o.key} onClick={function(){setSort(o.key);}} style={{fontSize:13,fontWeight:on?700:500,padding:"7px 14px",borderRadius:20,border:"1.5px solid "+(on?C.primary:C.border),background:on?C.primaryLight:"transparent",color:on?C.primary:C.textSecondary,cursor:"pointer",minHeight:36}}>{o.label}</button>;})}
          </div>
        </div>
        {/* Status filter */}
        <div>
          <div style={{fontSize:12,color:C.textHint,fontWeight:700,letterSpacing:"0.5px",marginBottom:8}}>STATUS</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {["All"].concat(STATUSES).map(function(s){
              var on=filter===s&&!statusGroupFilter;
              var cnt=s!=="All"?"("+jobs.filter(function(j){return j.status===s&&(showArchived||!j.archived);}).length+")":"";
              return <button key={s} onClick={function(){setFilter(s);setStatusGroupFilter(null);}} style={{fontSize:13,fontWeight:on?700:500,padding:"7px 14px",borderRadius:20,border:"1.5px solid "+(on?STATUS[s]?STATUS[s].color:C.primary:C.border),background:on?(STATUS[s]?STATUS[s].bg:C.primaryLight):"transparent",color:on?(STATUS[s]?STATUS[s].color:C.primary):C.textSecondary,cursor:"pointer",minHeight:36}}>{s} {cnt}</button>;
            })}
          </div>
        </div>
        {/* Score filter */}
        <div>
          <div style={{fontSize:12,color:C.textHint,fontWeight:700,letterSpacing:"0.5px",marginBottom:8}}>MATCH SCORE</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {[[0,"Any"],[50,"≥ 50%"],[70,"≥ 70%"],[85,"≥ 85%"]].map(function(item){
              var on=scoreFilter===item[0];
              return <button key={item[0]} onClick={function(){setScoreFilter(item[0]);}} style={{fontSize:13,fontWeight:on?700:500,padding:"7px 14px",borderRadius:20,border:"1.5px solid "+(on?C.primary:C.border),background:on?C.primaryLight:"transparent",color:on?C.primary:C.textSecondary,cursor:"pointer",minHeight:36}}>{item[1]}</button>;
            })}
          </div>
        </div>
        {/* Archived toggle */}
        {archivedCount>0&&<label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",userSelect:"none",fontSize:14,color:C.textSecondary,minHeight:44}}>
          <input type="checkbox" checked={showArchived} onChange={function(){setShowArchived(function(v){return !v;});}} style={{width:18,height:18,cursor:"pointer",accentColor:C.primary,flexShrink:0}} />
          Show archived ({archivedCount})
        </label>}
        {passedCount>0&&<Btn onClick={archivePassed} style={{fontSize:13}}>📦 Archive {passedCount} passed deadline{passedCount!==1?"s":""}</Btn>}
      </div>}
    </Card>

    {/* ── Jobs list header ── */}
    <Card>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <div style={{fontSize:16,fontWeight:700,color:C.textPrimary}}>
          {filtered.length} job{filtered.length!==1?"s":""}
          {(function(){var pool=showArchived?jobs.length:jobs.length-archivedCount;return filtered.length!==pool?" of "+pool:"";})()} 
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <Btn onClick={rescoreAll} disabled={scoringStatus.active||jobs.length===0||!hasCv(cv)} style={{fontSize:13,padding:"8px 14px"}}>
            {scoringStatus.active?"Scoring "+scoringStatus.done+"/"+scoringStatus.total+"...":"⟳ Rescore"}
          </Btn>
          <Btn variant="primary" onClick={function(){setShowAdd(function(v){return !v;});}} style={{fontSize:13,padding:"8px 14px"}}>+ Add</Btn>
        </div>
      </div>

      {!hasCv(cv)&&jobs.length>0&&<Alert type="info">Add your CV to enable AI match scoring.</Alert>}
      {scoringStatus.active&&<Alert type="info">Scoring jobs… ({scoringStatus.done}/{scoringStatus.total})</Alert>}
      {scoringError&&!scoringStatus.active&&<Alert type="error">Scoring failed: {scoringError}</Alert>}

      {/* Add job form */}
      {showAdd&&<div style={{background:C.surfaceAlt,borderRadius:12,padding:"16px",marginTop:12,border:"1.5px solid "+C.border}}>
        <div style={{fontSize:15,fontWeight:700,color:C.textPrimary,marginBottom:14}}>Add a job manually</div>
        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:12}}>
          <div><Label hint="e.g. Senior UX Designer">Job title *</Label><Inp value={form.title} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{title:v});});}} placeholder="Job title" /></div>
          <div><Label>Company *</Label><Inp value={form.company} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{company:v});});}} placeholder="Company name" /></div>
          <div><Label>Location</Label><Inp value={form.location} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{location:v});});}} placeholder="e.g. Stockholm" /></div>
          <div><Label>Apply URL</Label><Inp value={form.applyUrl} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{applyUrl:v});});}} placeholder="https://..." /></div>
          <div><Label>Role description</Label><Txta value={form.description} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{description:v});});}} placeholder="Paste the job description…" rows={5} /></div>
        </div>
        <div style={{display:"flex",gap:10}}>
          <Btn variant="primary" onClick={addJob}>Save job</Btn>
          <Btn onClick={function(){setShowAdd(false);}}>Cancel</Btn>
        </div>
      </div>}
    </Card>

    {/* ── Bulk selection bar ── */}
    {visibleSelectedCount>0&&<div style={{position:"sticky",top:4,zIndex:10,background:C.primaryLight,border:"1.5px solid "+C.primary,borderRadius:12,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}}>
      <span style={{fontSize:14,fontWeight:700,color:C.primary,flex:1}}>{visibleSelectedCount} selected</span>
      <Sel value="" onChange={function(e){if(e.target.value) bulkSetStatus(e.target.value);}} style={{width:"auto",fontSize:13,padding:"6px 10px",minWidth:150}}>
        <option value="">Change status…</option>
        {STATUSES.map(function(s){return <option key={s} value={s}>{s}</option>;})}
      </Sel>
      {(function(){
        var sel=jobs.filter(function(j){return selectedIds.has(String(j.id));});
        var allArch=sel.length>0&&sel.every(function(j){return j.archived;});
        return allArch
          ?<Btn onClick={bulkUnarchive} style={{fontSize:13,padding:"7px 12px"}}>↩ Unarchive</Btn>
          :<Btn onClick={bulkArchive} style={{fontSize:13,padding:"7px 12px"}}>📦 Archive</Btn>;
      })()}
      <Btn variant="danger" onClick={bulkDelete} style={{fontSize:13,padding:"7px 12px"}}>Delete</Btn>
      <Btn onClick={clearSelection} style={{fontSize:13,padding:"7px 12px"}}>Cancel</Btn>
    </div>}

    {/* ── Job list ── */}
    {filtered.length===0
      ?(jobs.length>0
        ?<Card><div style={{textAlign:"center",padding:"24px 16px"}}>
          <div style={{fontSize:32,marginBottom:10}}>🔍</div>
          <div style={{fontSize:15,fontWeight:600,color:C.textSecondary,marginBottom:6}}>No jobs match your filters</div>
          <Btn onClick={function(){setSearch("");setFilter("All");setSourceFilter("all");setScoreFilter(0);}}>Clear filters</Btn>
        </div></Card>
        :<Card><EmptyState icon="📋" title="No jobs yet" body="Add manually or fetch from Search Profiles." /></Card>)
      :<div style={{display:"flex",flexDirection:"column",gap:10}}>
        {/* Select all row */}
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 4px"}}>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",userSelect:"none",fontSize:14,color:C.textSecondary,minHeight:44}}>
            <input type="checkbox" checked={allVisibleSelected} onChange={toggleSelectAllVisible} style={{width:18,height:18,cursor:"pointer",accentColor:C.primary}} />
            {visibleSelectedCount>0?visibleSelectedCount+" selected":"Select all"}
          </label>
        </div>
        {filtered.map(function(j){
          var jid=String(j.id);
          return <JobRow
            key={j.id} job={j}
            expanded={expandedId===j.id}
            selected={selectedIds.has(jid)}
            onSelectToggle={function(){toggleSelect(j.id);}}
            onToggle={function(){setExpandedId(function(cur){return cur===j.id?null:j.id;});}}
            onStatusChange={function(e){var val=e.target.value;setJobs(function(prev){return prev.map(function(x){
              if(x.id!==j.id) return x;
              var patch={status:val};
              if(val==="Applied"&&!x.appliedAt) patch.appliedAt=new Date().toISOString();
              if(val==="Rejected"&&!x.rejectedAt) patch.rejectedAt=new Date().toISOString();
              if(val==="Ad removed"&&!x.adRemovedAt) patch.adRemovedAt=new Date().toISOString();
              return Object.assign({},x,patch);
            });});}}
            onNotesChange={function(val){setJobs(function(prev){return prev.map(function(x){return x.id===j.id?Object.assign({},x,{notes:val}):x;});});}}
            onArchiveToggle={function(){toggleArchive(j.id);}}
            onDismiss={dismissJob?function(){dismissJob(j.id);}:null}
            onWriteCoverLetter={startCoverLetter?function(){startCoverLetter(j.id);}:null}
          />;
        })}
      </div>}
  </div>;
}


// ─── Search Profiles ──────────────────────────────────────────────────────────
function SearchProfiles({profiles,setProfiles,setJobs,afKey,setAfKey,jsKey,setJsKey,anthropicKey,setAnthropicKey,pendingProfileRun,setPendingProfileRun,dismissedIds}){
  var [showAfKey,setShowAfKey]=useState(false);
  var [showJsKey,setShowJsKey]=useState(false);
  var [showAnthropicKey,setShowAnthropicKey]=useState(false);
  var [editId,setEditId]=useState(null);
  var [showForm,setShowForm]=useState(false);
  var [form,setForm]=useState({name:"",query:"",limit:10,sources:["af"],locations:[]});
  var [runStatus,setRunStatus]=useState({});
  var formRef=useRef(null);

  function toggleSource(src){setForm(function(f){var srcs=f.sources.includes(src)?f.sources.filter(function(s){return s!==src;}):f.sources.concat([src]);return Object.assign({},f,{sources:srcs});});}
  function toggleLocation(loc){setForm(function(f){var locs=(f.locations||[]);var next=locs.includes(loc)?locs.filter(function(l){return l!==loc;}):locs.concat([loc]);return Object.assign({},f,{locations:next});});}

  function saveProfile(){
    if(!form.name||!form.query||form.sources.length===0) return;
    if(editId){setProfiles(function(prev){return prev.map(function(p){return p.id===editId?Object.assign({},p,form,{limit:Number(form.limit)}):p;});});setEditId(null);}
    else{setProfiles(function(prev){return prev.concat([Object.assign({id:Date.now()},form,{limit:Number(form.limit),active:true})]);});}
    setForm({name:"",query:"",limit:10,sources:["af"],locations:[]});setShowForm(false);
  }

  function startEdit(p){
    setForm({name:p.name,query:p.query,limit:p.limit,sources:p.sources||["af"],locations:p.locations||[]});
    setEditId(p.id);
    setShowForm(true);
    setTimeout(function(){
      if(formRef.current){ formRef.current.scrollIntoView({behavior:"smooth",block:"center"}); }
    },50);
  }

  async function fetchAF(p){
    try{
      var url="https://jobsearch.api.jobtechdev.se/search?q="+encodeURIComponent(p.query)+"&limit="+p.limit+"&resdet=full";
      var headers={"accept":"application/json"};
      if(afKey) headers["api-key"]=afKey;
      var out=await smartFetch(url,{headers:headers});
      var res=out.response;
      if(!res.ok){
        if(res.status===403){ throw new Error("403 Forbidden"+(out.viaProxy?" (the CORS proxy rejected the request — try again in a moment)":" (the API rejected the request — check your API key if you added one)")); }
        if(res.status===429) throw new Error("429 Rate limited — slow down and try again in a minute");
        throw new Error("Error "+res.status);
      }
      var data=await res.json();
      var ads=data.hits||[];
      var added=0;
      var skippedDismissed=0;
      var tombstones=new Set((dismissedIds||[]).map(String));
      setJobs(function(prev){
        var ex=new Set(prev.map(function(j){return j.id?j.id.toString():""; }));
        var nj=ads.filter(function(a){
          var aid=a.id?a.id.toString():"";
          if(!aid) return false;
          if(ex.has(aid)) return false;
          if(tombstones.has(aid)){ skippedDismissed++; return false; }
          return true;
        }).map(function(a){return mapAfJob(a,p.name);});
        nj=filterByLocation(nj,p.locations||[]);
        added=nj.length;return nj.concat(prev);
      });
      return{added:added,skipped:skippedDismissed};
    }catch(e){return{added:0,error:e.message};}
  }

  async function fetchJS(p){
    if(!jsKey) return{added:0,error:"No JSearch API key entered. Go to Search Profiles and add your RapidAPI key."};
    try{
      var url="https://jsearch.p.rapidapi.com/search?query="+encodeURIComponent(p.query)+"&num_pages=1&page=1";
      var out=await smartFetch(url,{headers:{"x-rapidapi-key":jsKey,"x-rapidapi-host":"jsearch.p.rapidapi.com"}});
      var res=out.response;
      if(!res.ok){
        if(res.status===401||res.status===403) throw new Error(res.status+" — check your RapidAPI key and that you're subscribed to JSearch");
        if(res.status===429) throw new Error("429 Rate limited — JSearch free tier is limited, try again later");
        throw new Error("Error "+res.status);
      }
      var data=await res.json();
      var ads=(data.data||[]).slice(0,p.limit);
      var added=0;
      var skippedDismissed=0;
      var tombstones=new Set((dismissedIds||[]).map(String));
      setJobs(function(prev){
        var ex=new Set(prev.map(function(j){return j.id?j.id.toString():""; }));
        var nj=ads.filter(function(a){
          var aid=a.job_id?String(a.job_id):"";
          if(!aid) return false;
          if(ex.has(aid)) return false;
          if(tombstones.has(aid)){ skippedDismissed++; return false; }
          return true;
        }).map(function(a){return mapJsJob(a,p.name);});
        nj=filterByLocation(nj,p.locations||[]);
        added=nj.length;return nj.concat(prev);
      });
      return{added:added,skipped:skippedDismissed};
    }catch(e){return{added:0,error:e.message};}
  }

  async function runProfile(p){
    setRunStatus(function(s){var u=Object.assign({},s);u[p.id]={type:"loading",msg:"Fetching jobs..."};return u;});
    var srcs=p.sources||["af"];
    var results=[];
    for(var i=0;i<srcs.length;i++){var r=srcs[i]==="af"?await fetchAF(p):await fetchJS(p);results.push({src:srcs[i],added:r.added,skipped:r.skipped||0,error:r.error});}
    var totalAdded=results.reduce(function(a,r){return a+(r.added||0);},0);
    var parts=results.map(function(r){
      if(r.error) return (r.src==="af"?"Arbetsförmedlingen":"JSearch")+": "+r.error;
      var msg=(r.src==="af"?"Arbetsförmedlingen":"JSearch")+": "+r.added+" new jobs added";
      if(r.skipped>0) msg+=" ("+r.skipped+" previously dismissed, skipped)";
      return msg;
    });
    var hasError=results.some(function(r){return r.error;});
    setRunStatus(function(s){var u=Object.assign({},s);u[p.id]={type:hasError&&!totalAdded?"error":"success",msg:parts.join(" · ")};return u;});
  }

  async function runAll(){var active=profiles.filter(function(p){return p.active;});for(var i=0;i<active.length;i++) await runProfile(active[i]);}

  useEffect(function(){
    if(!pendingProfileRun) return;
    var p=profiles.find(function(x){return x.id===pendingProfileRun;});
    if(p){ runProfile(p); }
    setPendingProfileRun(null);
  },[pendingProfileRun]);

  var profileFormFields = function(isEdit){
    return <React.Fragment>
      <div className="jt-grid-2" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:14,marginBottom:14}}>
        <div><Label hint="A name to help you identify this search">Profile name</Label><Inp value={form.name} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{name:v});});}} placeholder="e.g. Product Manager Stockholm" /></div>
        <div><Label hint="Maximum jobs to fetch each time this profile runs">Max results</Label><Inp type="number" value={form.limit} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{limit:v});});}} placeholder="10" style={{width:100}} /></div>
      </div>
      <div style={{marginBottom:14}}><Label hint="One role or one location per profile. Create separate profiles for variations — no AND/OR operators supported.">Search query</Label><Txta value={form.query} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{query:v});});}} placeholder='e.g. "product manager SaaS Stockholm"' rows={2} /></div>
      <div style={{marginBottom:16}}>
        <Label hint="Choose which job boards to search">Search in</Label>
        <div style={{display:"flex",gap:10,marginTop:4}}>
          {[["af","Arbetsförmedlingen (Swedish jobs)","#EAF2EF","#3D6B5C"],["jsearch","JSearch — Indeed, LinkedIn, Glassdoor","#E3EFF8","#1A5A8A"]].map(function(item){
            var on=form.sources.includes(item[0]);
            return <button key={item[0]} onClick={function(){toggleSource(item[0]);}} style={{flex:1,padding:"12px 16px",borderRadius:12,border:"2px solid "+(on?item[3]:C.border),background:on?item[2]:"transparent",color:on?item[3]:C.textSecondary,cursor:"pointer",fontSize:13,fontWeight:on?700:500,textAlign:"left"}}>{on?"✓ ":""}{item[1]}</button>;
          })}
        </div>
      </div>
      <div style={{marginBottom:16}}>
        <Label hint="Filter results to specific cities or remote. Leave empty to get jobs from all of Sweden/anywhere.">Locations <span style={{fontWeight:400,color:C.textHint}}>(optional — empty = no filter)</span></Label>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:6}}>
          {LOCATION_OPTIONS.map(function(opt){
            var on=(form.locations||[]).includes(opt.value);
            return <button key={opt.value} onClick={function(){toggleLocation(opt.value);}} style={{fontSize:12,fontWeight:on?700:500,padding:"5px 13px",borderRadius:20,border:"1.5px solid "+(on?C.primary:C.border),background:on?C.primaryLight:"transparent",color:on?C.primary:C.textSecondary,cursor:"pointer"}}>{opt.value}</button>;
          })}
        </div>
        {(form.locations||[]).length>0&&<div style={{fontSize:11,color:C.textHint,marginTop:6}}>Jobs not matching these locations will be filtered out after fetching.</div>}
      </div>
      <div style={{display:"flex",gap:10}}><Btn variant="primary" onClick={saveProfile}>{isEdit?"Update profile":"Save profile"}</Btn><Btn onClick={function(){setShowForm(false);setEditId(null);}}>Cancel</Btn></div>
    </React.Fragment>;
  };

  return <div style={{display:"flex",flexDirection:"column",gap:16}}>
    <Card>
      <SectionTitle action={<div style={{display:"flex",gap:8,alignItems:"center"}}><InfoTip label="How it works">A search profile is a saved query that runs against job boards automatically. Each active profile searches its sources on schedule or when you click Fetch, adding new matching jobs to your list. Queries use simple keyword matching — no AND/OR operators. To search for multiple roles or locations, create separate profiles (e.g. "Product Manager Stockholm", "Product Owner Stockholm").</InfoTip><Btn onClick={runAll} style={{fontSize:13,padding:"8px 14px"}}>▶ Run all active</Btn><Btn variant="primary" onClick={function(){setEditId(null);setForm({name:"",query:"",limit:10,sources:["af"],locations:[]});setShowForm(function(v){return !v;});}} style={{fontSize:13,padding:"8px 14px"}}>+ New profile</Btn></div>}>Search profiles</SectionTitle>
      {showForm&&!editId&&<div ref={formRef} style={{background:C.surfaceAlt,borderRadius:14,padding:"20px",margin:"16px 0",border:"1.5px solid "+C.border}}>
        <div style={{fontSize:15,fontWeight:700,color:C.textPrimary,marginBottom:16}}>New search profile</div>
        {profileFormFields(false)}
      </div>}
      {profiles.length===0
        ?<EmptyState icon="🔎" title="No search profiles yet" body="Create a profile with a search query to start fetching jobs." />
        :<div style={{display:"flex",flexDirection:"column",gap:12,marginTop:16}}>
          {profiles.map(function(p){
            var st=runStatus[p.id];
            var isEditingThis=editId===p.id;
            var afUrl="https://jobsearch.api.jobtechdev.se/search?q="+encodeURIComponent(p.query)+"&limit="+p.limit;
            var jsUrl="https://jsearch.p.rapidapi.com/search?query="+encodeURIComponent(p.query)+"&num_pages=1";

            if(isEditingThis){
              return <div key={p.id} ref={formRef} style={{background:C.primaryLight,borderRadius:14,padding:"20px",border:"1.5px solid "+C.primary}}>
                <div style={{fontSize:14,fontWeight:700,color:C.primary,marginBottom:14}}>Editing: {p.name}</div>
                {profileFormFields(true)}
              </div>;
            }

            return <div key={p.id} style={{background:C.surfaceAlt,borderRadius:14,padding:"14px 16px",opacity:p.active?1:0.65}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:8}}>
                <div style={{paddingTop:2,flexShrink:0}}><Toggle value={p.active} onChange={function(){var pid=p.id;setProfiles(function(prev){return prev.map(function(x){return x.id===pid?Object.assign({},x,{active:!x.active}):x;});});}} /></div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700,color:C.textPrimary,lineHeight:1.3,marginBottom:4}}>{p.name}</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                    <Chip label={p.active?"Active":"Inactive"} bg={p.active?C.primaryLight:C.surfaceAlt} color={p.active?C.primary:C.textHint} />
                    <Chip label={"max "+p.limit} />
                    {(p.sources||["af"]).map(function(src){var s=SOURCES[src];return <Chip key={src} label={s.label} bg={s.bg} color={s.color} />;}) }
                    {(p.locations||[]).map(function(loc){return <Chip key={loc} label={"📍 "+loc} bg={C.primaryLight} color={C.primary} />;})}
                  </div>
                </div>
              </div>
              <div style={{position:"relative",display:"block",marginBottom:10}} className="jt-query-pill">
                <div style={{fontSize:12,color:C.textSecondary,fontFamily:"monospace",background:C.surface,padding:"6px 10px",borderRadius:8,cursor:"default",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>"{p.query}"</div>
                <div className="jt-query-tooltip" style={{display:"none",position:"fixed",marginTop:4,background:C.textPrimary,color:C.surface,fontSize:11,padding:"10px 14px",borderRadius:10,zIndex:400,whiteSpace:"pre-wrap",boxShadow:"0 4px 20px rgba(0,0,0,0.25)",width:300,wordBreak:"break-all",lineHeight:1.7,pointerEvents:"none"}}>
                  {(p.sources||["af"]).includes("af")&&"AF API:\n"+afUrl+"\n"}
                  {(p.sources||["af"]).includes("jsearch")&&"JSearch:\n"+jsUrl}
                </div>
              </div>
              {st&&<Alert type={st.type==="loading"?"info":st.type}>{st.msg}</Alert>}
              <div style={{display:"flex",gap:8,paddingTop:10,borderTop:"1px solid "+C.border,flexWrap:"wrap"}}>
                <Btn onClick={function(){startEdit(p);}} style={{fontSize:12,padding:"8px 14px",flex:1,textAlign:"center",minWidth:60}}>✏ Edit</Btn>
                <Btn onClick={function(){if(p.active) runProfile(p);}} disabled={!p.active} style={{fontSize:12,padding:"8px 14px",flex:1,textAlign:"center",minWidth:60,background:p.active?C.primaryLight:"transparent",color:p.active?C.primary:C.textHint}}>▶ Fetch</Btn>
                <Btn variant="danger" onClick={function(){var pid=p.id;setProfiles(function(prev){return prev.filter(function(x){return x.id!==pid;});});}} style={{fontSize:12,padding:"8px 14px",minWidth:60}}>🗑</Btn>
              </div>
            </div>;
          })}
        </div>}
    </Card>
    <Card>
      <SectionTitle>API keys</SectionTitle>
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        <div>
          <Label hint="The Arbetsförmedlingen API is free and open — no key needed. Leave blank to use it without authentication.">Arbetsförmedlingen API key (optional)</Label>
          <div style={{display:"flex",gap:8}}><Inp type={showAfKey?"text":"password"} value={afKey} onChange={function(e){var v=e.target.value;setAfKey(v);}} placeholder="Leave blank — no key needed" style={{fontFamily:"monospace"}} /><Btn onClick={function(){setShowAfKey(function(v){return !v;});}} style={{whiteSpace:"nowrap",padding:"10px 16px"}}>{showAfKey?"Hide":"Show"}</Btn></div>
        </div>
        <div>
          <Label hint="Sign up free at rapidapi.com, search for JSearch by OpenWeb Ninja, subscribe to the free plan, and paste your key here.">JSearch API key (for Indeed, LinkedIn, Glassdoor)</Label>
          <div style={{display:"flex",gap:8}}><Inp type={showJsKey?"text":"password"} value={jsKey} onChange={function(e){var v=e.target.value;setJsKey(v);}} placeholder="Paste your RapidAPI key here" style={{fontFamily:"monospace"}} /><Btn onClick={function(){setShowJsKey(function(v){return !v;});}} style={{whiteSpace:"nowrap",padding:"10px 16px"}}>{showJsKey?"Hide":"Show"}</Btn></div>
        </div>
        <div>
          <Label hint="Required for AI match scoring, cover letters, and reports. Get a key at console.anthropic.com and paste it here. Starts with 'sk-ant-'.">Anthropic API key (for AI features)</Label>
          <div style={{display:"flex",gap:8}}><Inp type={showAnthropicKey?"text":"password"} value={anthropicKey} onChange={function(e){var v=e.target.value;setAnthropicKey(v);}} placeholder="sk-ant-..." style={{fontFamily:"monospace"}} /><Btn onClick={function(){setShowAnthropicKey(function(v){return !v;});}} style={{whiteSpace:"nowrap",padding:"10px 16px"}}>{showAnthropicKey?"Hide":"Show"}</Btn></div>
        </div>
        <Alert type="info">🔒 Keys are stored encrypted in your Firestore account and are never shared with anyone. <InfoTip>Your API keys are only used when you explicitly trigger a fetch or AI action. They are stored in your personal Firestore document, accessible only when signed in as you.</InfoTip></Alert>
      </div>
    </Card>
  </div>;
}


// ─── InlineListEditor ─────────────────────────────────────────────────────────
function InlineListEditor({items,onChange,fields,addLabel,sortFields,defaultSort}){
  var [editId,setEditId]=useState(null);
  var [draft,setDraft]=useState({});
  var [adding,setAdding]=useState(false);
  var [sort,setSort]=useState(defaultSort||{key:null,dir:"asc"});

  function emptyDraft(){
    var d={};
    fields.forEach(function(f){ d[f.key]=f.type==="number"?0:""; });
    return d;
  }
  function startAdd(){ setDraft(emptyDraft()); setAdding(true); setEditId(null); }
  function startEdit(item){ setDraft(Object.assign({},item)); setEditId(item.id); setAdding(false); }
  function cancel(){ setAdding(false); setEditId(null); setDraft({}); }
  function save(){
    var firstKey=fields[0].key;
    if(!String(draft[firstKey]||"").trim()) return;
    if(adding){
      onChange(items.concat([Object.assign({id:Date.now()},draft)]));
    } else {
      onChange(items.map(function(x){ return x.id===editId?Object.assign({},x,draft):x; }));
    }
    cancel();
  }
  function remove(id){ onChange(items.filter(function(x){ return x.id!==id; })); }
  function setField(key,val){ setDraft(function(d){ return Object.assign({},d,{[key]:val}); }); }
  function toggleSort(key){
    setSort(function(s){
      if(s.key===key) return {key:key,dir:s.dir==="asc"?"desc":"asc"};
      var f=fields.find(function(f){return f.key===key;});
      var defaultDir=(f&&(f.type==="number"||key==="year"))?"desc":"asc";
      return {key:key,dir:defaultDir};
    });
  }

  var displayed=items.slice();
  if(sort.key){
    var sk=sort.key;
    var sd=sort.dir;
    displayed.sort(function(a,b){
      var av=a[sk],bv=b[sk];
      if(sk==="level"){ av=PROF_ORDER[av]||0; bv=PROF_ORDER[bv]||0; return sd==="asc"?av-bv:bv-av; }
      if(typeof av==="number"&&typeof bv==="number"){ return sd==="asc"?av-bv:bv-av; }
      av=String(av||"").toLowerCase(); bv=String(bv||"").toLowerCase();
      if(av<bv) return sd==="asc"?-1:1;
      if(av>bv) return sd==="asc"?1:-1;
      return 0;
    });
  }

  function renderCell(f,val,onChangeFn){
    var baseStyle={fontSize:13,padding:"6px 8px",borderRadius:7,border:"1.5px solid "+C.border,background:C.surface,color:C.textPrimary,fontFamily:"inherit",width:"100%",boxSizing:"border-box"};
    if(f.type==="select"){
      return <select value={val||""} onChange={function(e){onChangeFn(e.target.value);}} style={baseStyle}>
        {(f.options||[]).map(function(o){ return <option key={o}>{o}</option>; })}
      </select>;
    }
    if(f.type==="number"){
      return <input type="number" min={0} max={50} value={val||""} onChange={function(e){onChangeFn(Number(e.target.value));}} style={Object.assign({},baseStyle,{width:60})} />;
    }
    if(f.multiline){
      return <textarea value={val||""} onChange={function(e){onChangeFn(e.target.value);}} placeholder={f.placeholder||""} rows={2} style={Object.assign({},baseStyle,{resize:"vertical",lineHeight:1.4})} />;
    }
    return <input type="text" value={val||""} onChange={function(e){onChangeFn(e.target.value);}} placeholder={f.placeholder||""} style={baseStyle} />;
  }

  var isEditing=adding||editId!==null;
  var isMobile=typeof window!=="undefined"&&window.innerWidth<600;

  var sortControls=sortFields&&sortFields.length>0&&<div style={{display:"flex",gap:6,alignItems:"center",marginBottom:8,flexWrap:"wrap"}}>
    <span style={{fontSize:11,color:C.textHint,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px",marginRight:2}}>Sort:</span>
    {sortFields.map(function(sf){
      var active=sort.key===sf.key;
      var arrow=active?(sort.dir==="asc"?" ↑":" ↓"):"";
      return <button key={sf.key} onClick={function(){toggleSort(sf.key);}} style={{fontSize:12,padding:"3px 10px",borderRadius:6,border:"1.5px solid "+(active?C.primary:C.border),background:active?C.primaryLight:"transparent",color:active?C.primary:C.textSecondary,cursor:"pointer",fontWeight:active?700:400}}>
        {sf.label}{arrow}
      </button>;
    })}
  </div>;

  return <div>
    {items.length>1&&sortControls}
    {displayed.length>0&&<div style={{marginBottom:8}}>
      {displayed.map(function(item){
        if(editId===item.id){
          return <div key={item.id} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"6px 8px",background:C.primaryLight,borderRadius:8,marginBottom:4}}>
            {fields.map(function(f){
              if(isMobile&&f.mobileHide) return null;
              return <div key={f.key} style={{flex:f.flex||1,minWidth:isMobile?0:(f.minWidth||0)}}>
                {renderCell(f,draft[f.key],function(v){ setField(f.key,v); })}
              </div>;
            })}
            <div style={{display:"flex",gap:4,width:56,flexShrink:0,paddingTop:2}}>
              <button onClick={save} title="Save" style={{flex:1,background:C.primary,color:"#fff",border:"none",borderRadius:6,padding:"5px 0",cursor:"pointer",fontSize:13}}>✓</button>
              <button onClick={cancel} title="Cancel" style={{flex:1,background:C.border,color:C.textPrimary,border:"none",borderRadius:6,padding:"5px 0",cursor:"pointer",fontSize:13}}>✗</button>
            </div>
          </div>;
        }
        return <div key={item.id} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"7px 8px",borderRadius:8,marginBottom:3,background:C.surfaceAlt}}>
          {fields.map(function(f){
            if(isMobile&&f.mobileHide) return null;
            var val=item[f.key];
            var display=f.type==="number"&&val?val+" yr"+(val!==1?"s":""):val;
            return <div key={f.key} style={{flex:f.flex||1,minWidth:isMobile?0:(f.minWidth||0),fontSize:13,color:C.textPrimary,whiteSpace:f.multiline?"pre-wrap":"nowrap",overflow:f.multiline?"visible":"hidden",textOverflow:f.multiline?"unset":"ellipsis",wordBreak:f.multiline?"break-word":"normal",lineHeight:1.45}}>
              {display||<span style={{color:C.textHint}}>—</span>}
            </div>;
          })}
          <div style={{display:"flex",gap:4,width:56,flexShrink:0,paddingTop:2}}>
            <button onClick={function(){ startEdit(item); }} disabled={isEditing} title="Edit" style={{flex:1,background:"none",border:"1px solid "+C.border,borderRadius:6,padding:"4px 0",cursor:isEditing?"not-allowed":"pointer",fontSize:12,color:C.textSecondary}}>✏</button>
            <button onClick={function(){ remove(item.id); }} disabled={isEditing} title="Delete" style={{flex:1,background:"none",border:"1px solid "+C.border,borderRadius:6,padding:"4px 0",cursor:isEditing?"not-allowed":"pointer",fontSize:12,color:C.error}}>🗑</button>
          </div>
        </div>;
      })}
    </div>}
    {adding&&<div style={{display:"flex",gap:8,alignItems:"flex-start",padding:"6px 8px",background:C.primaryLight,borderRadius:8,marginBottom:8}}>
      {fields.map(function(f){
        if(isMobile&&f.mobileHide) return null;
        return <div key={f.key} style={{flex:f.flex||1,minWidth:isMobile?0:(f.minWidth||0)}}>
          {renderCell(f,draft[f.key],function(v){ setField(f.key,v); })}
        </div>;
      })}
      <div style={{display:"flex",gap:4,width:56,flexShrink:0,paddingTop:2}}>
        <button onClick={save} title="Save" style={{flex:1,background:C.primary,color:"#fff",border:"none",borderRadius:6,padding:"5px 0",cursor:"pointer",fontSize:13}}>✓</button>
        <button onClick={cancel} title="Cancel" style={{flex:1,background:C.border,color:C.textPrimary,border:"none",borderRadius:6,padding:"5px 0",cursor:"pointer",fontSize:13}}>✗</button>
      </div>
    </div>}
    {!isEditing&&<button onClick={startAdd} style={{fontSize:13,color:C.primary,background:"none",border:"1.5px dashed "+C.primary,borderRadius:8,padding:"7px 14px",cursor:"pointer",fontWeight:600,width:"100%",marginTop:displayed.length?4:0}}>+ {addLabel||"Add entry"}</button>}
  </div>;
}

// ─── Cover Letters ────────────────────────────────────────────────────────────
function CoverLetters({jobs,setJobs,cv,anthropicKey,setActiveTab,pendingCoverLetterJob,setPendingCoverLetterJob}){
  var [showAllStatuses,setShowAllStatuses]=useState(false);
  var eligibleJobs=jobs.filter(function(j){
    if(j.archived) return false;
    return showAllStatuses?true:j.status==="Reviewing";
  });
  var [selectedJob,setSelectedJob]=useState(eligibleJobs[0]?eligibleJobs[0].id:null);
  useEffect(function(){
    var stillEligible=eligibleJobs.some(function(j){return j.id===selectedJob;});
    if(!stillEligible){ setSelectedJob(eligibleJobs[0]?eligibleJobs[0].id:null); }
  },[eligibleJobs.length,showAllStatuses]);

  useEffect(function(){
    if(!pendingCoverLetterJob) return;
    var target=jobs.find(function(j){return j.id===pendingCoverLetterJob;});
    if(target){
      var inPool=eligibleJobs.some(function(j){return j.id===target.id;});
      if(!inPool) setShowAllStatuses(true);
      setSelectedJob(target.id);
    }
    if(setPendingCoverLetterJob) setPendingCoverLetterJob(null);
  },[pendingCoverLetterJob]);

  var [tone,setTone]=useState("Professional");
  var [language,setLanguage]=useState("auto");
  var [letter,setLetter]=useState("");
  var [error,setError]=useState("");
  var [loading,setLoading]=useState(false);
  var [showEmail,setShowEmail]=useState(false);
  var [saved,setSaved]=useState(false);

  function detectJobLanguage(job){
    if(!job) return "English";
    var text=((job.description||"")+" "+(job.title||"")).toLowerCase();
    if(!text.trim()) return "English";
    var svWords=["och","att","för","med","som","det","vi","på","är","av","har","inom","ett","en","till","samt","goda","kunskaper","erfarenhet","arbeta","söker","tjänst","krav","meriterande"];
    var enWords=["and","the","for","with","our","you","we","are","will","your","have","this","that","role","team","experience","skills","join","looking","responsible"];
    var svScore=svWords.reduce(function(n,w){return n+(text.split(new RegExp("\\b"+w+"\\b","g")).length-1);},0);
    var enScore=enWords.reduce(function(n,w){return n+(text.split(new RegExp("\\b"+w+"\\b","g")).length-1);},0);
    return svScore>enScore?"Swedish":"English";
  }

  useEffect(function(){
    var job=jobs.find(function(j){return j.id===selectedJob;});
    setLetter(job&&job.coverLetter?job.coverLetter:"");
    setSaved(false);
    setShowEmail(false);
    setError("");
    setLanguage("auto");
  },[selectedJob]);

  function saveLetter(text){
    if(!setJobs||!selectedJob) return;
    setJobs(function(prev){return prev.map(function(j){
      return j.id===selectedJob?Object.assign({},j,{coverLetter:text||""}):j;
    });});
    setSaved(true);
    setTimeout(function(){setSaved(false);},2000);
  }

  async function generate(){
    var job=eligibleJobs.find(function(j){return j.id===selectedJob;});
    if(!job) return;
    if(!cv.text||cv.text.trim().length<100){
      setError("Please add a substantive CV in the My CV tab first. The letter can only be grounded in what you've actually written.");
      return;
    }
    var resolvedLang=language==="auto"?detectJobLanguage(job):language;
    setLoading(true);setLetter("");setError("");setShowEmail(false);
    try{
      var jobBrief="Title: "+job.title+"\nCompany: "+job.company+"\nLocation: "+(job.location||"Not specified");
      if(job.employmentType) jobBrief+="\nEmployment type: "+job.employmentType;
      if(job.tags&&job.tags.length) jobBrief+="\nTags: "+job.tags.join(", ");
      if(job.description){
        var desc=job.description.slice(0,3000).replace(/\s+/g," ").trim();
        jobBrief+="\n\nJob description:\n"+desc;
      }
      var prompt=
        "You are writing a cover letter for a job applicant. Write it in "+resolvedLang+" with a "+tone.toLowerCase()+" tone.\n\n"+
        "═══ STRICT GROUNDING RULES — FOLLOW EXACTLY ═══\n"+
        "1. The CV below is the ONLY source of truth about the applicant. Do NOT invent, infer, or extrapolate skills, experience, qualifications, achievements, tools, languages, certifications, employers, education, or soft skills that are not explicitly stated in the CV.\n"+
        "2. If the job description lists a requirement that is NOT evidenced in the CV, do NOT claim the applicant has it. Do NOT hint at it, imply it, or use filler phrases suggesting it. Either omit it entirely or frame it honestly as something the applicant is eager to learn.\n"+
        "3. Do NOT use generic stock phrases like \"proven track record\", \"passionate about\", \"results-driven\", \"strong communication skills\", \"team player\", \"proactive self-starter\", \"wealth of experience\", unless those exact qualities are demonstrated by specific content in the CV.\n"+
        "4. When you reference a skill or achievement, it must be traceable to a concrete line or section of the CV. Prefer specific wording from the CV itself.\n"+
        "5. Do NOT fabricate numbers, percentages, metrics, project names, client names, or dates. Only cite numbers that appear in the CV.\n"+
        "6. Keep the letter CONCISE — aim for 200-300 words. A shorter, honest letter is better than a padded, speculative one.\n"+
        "7. If the CV is sparse on something the job needs, it is better to write a shorter letter that highlights what IS a fit, than to pad with generic claims.\n"+
        "8. Start directly with the salutation. No preamble, no meta-commentary, no \"Here is your cover letter\".\n\n"+
        "═══ JOB ═══\n"+jobBrief+"\n\n"+
        "═══ CV & PROFILE (ONLY source of truth about the applicant) ═══\n"+cvSummaryText(cv)+"\n\n"+
        "Write the cover letter now, following every rule above.";
      var text=await callClaude({apiKey:anthropicKey,prompt:prompt,maxTokens:1500});
      setLetter(text);
      if(setJobs&&selectedJob){
        setJobs(function(prev){return prev.map(function(j){
          return j.id===selectedJob?Object.assign({},j,{coverLetter:text}):j;
        });});
      }
    }catch(e){setError(e.message||"Error connecting to Claude. Please try again.");}
    setLoading(false);
  }

  var currentJob=eligibleJobs.find(function(j){return j.id===selectedJob;});
  var emailSubject=currentJob?"Application — "+currentJob.title+" at "+currentJob.company:"Cover letter";
  var reviewingCount=jobs.filter(function(j){return !j.archived&&j.status==="Reviewing";}).length;
  var noJobsAtAll=jobs.filter(function(j){return !j.archived;}).length===0;

  return <div style={{display:"flex",flexDirection:"column",gap:16}}>
    <Card>
      <SectionTitle>Cover letter <InfoTip>Claude writes a personalised letter based on the job and your CV. Only references what's in your CV — no invented skills.</InfoTip></SectionTitle>
      {noJobsAtAll
        ?<Alert type="warning">Add some jobs first — go to My Jobs or Search Profiles to get started.</Alert>
        :eligibleJobs.length===0
          ?<div style={{padding:"20px",background:C.surfaceAlt,borderRadius:12,textAlign:"center"}}>
            <div style={{fontSize:32,marginBottom:10}}>📝</div>
            <div style={{fontSize:15,fontWeight:600,color:C.textPrimary,marginBottom:6}}>No jobs ready</div>
            <div style={{fontSize:14,color:C.textSecondary,marginBottom:16,lineHeight:1.6}}>Move a job to <b>Reviewing</b> status first, or tap below to show all.</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <Btn variant="primary" onClick={function(){if(setActiveTab) setActiveTab("jobs");}} style={{fontSize:15,minHeight:48}}>Go to My Jobs</Btn>
              <Btn onClick={function(){setShowAllStatuses(true);}} style={{fontSize:15,minHeight:48}}>Show all statuses</Btn>
            </div>
          </div>
          :<div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div>
              <Label hint={showAllStatuses?"Showing all non-archived jobs.":"Showing Reviewing jobs."}>Job</Label>
              <Sel className="jt-cover-select" value={selectedJob||""} onChange={function(e){var v=e.target.value;var num=Number(v);setSelectedJob(isNaN(num)||String(num)!==v?v:num);}}>
                {eligibleJobs.map(function(j){return <option key={j.id} value={j.id}>{j.title} – {j.company}{showAllStatuses?" ["+j.status+"]":""}</option>;})}
              </Sel>
            </div>
            <div>
              <Label>Tone</Label>
              <Sel className="jt-cover-select" value={tone} onChange={function(e){setTone(e.target.value);}}>
                {["Professional","Conversational","Enthusiastic","Formal","Creative"].map(function(t){return <option key={t}>{t}</option>;})}
              </Sel>
            </div>
            <div>
              <Label hint="Auto-detect reads the job description language.">
                Language
                {language==="auto"&&currentJob&&<span style={{fontSize:12,color:C.textHint,fontWeight:400,marginLeft:6}}>→ {detectJobLanguage(currentJob)}</span>}
              </Label>
              <Sel className="jt-cover-select" value={language} onChange={function(e){setLanguage(e.target.value);}}>
                <option value="auto">Auto-detect</option>
                <option value="English">English</option>
                <option value="Swedish">Swedish</option>
              </Sel>
            </div>
            <label style={{display:"flex",alignItems:"center",gap:10,fontSize:14,color:C.textSecondary,cursor:"pointer",userSelect:"none",minHeight:44}}>
              <input type="checkbox" checked={showAllStatuses} onChange={function(){setShowAllStatuses(function(v){return !v;});}} style={{width:18,height:18,cursor:"pointer",accentColor:C.primary,flexShrink:0}} />
              Show all statuses
              {!showAllStatuses&&reviewingCount>0&&<span style={{color:C.textHint}}>({reviewingCount} reviewing)</span>}
            </label>
            <button onClick={generate} disabled={loading||!selectedJob||!anthropicKey}
              className="jt-mob-btn"
              style={{fontSize:16,fontWeight:700,padding:"14px",borderRadius:14,border:"none",
                background:loading||!selectedJob||!anthropicKey?C.border:C.primary,
                color:loading||!selectedJob||!anthropicKey?C.textHint:"#fff",
                cursor:loading||!selectedJob||!anthropicKey?"not-allowed":"pointer",
                fontFamily:"inherit",width:"100%",minHeight:52,
                display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
              {loading
