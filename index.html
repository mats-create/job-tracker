                ?<React.Fragment><span style={{display:"inline-block",width:18,height:18,border:"2.5px solid rgba(255,255,255,0.4)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 0.7s linear infinite"}} />Writing letter…</React.Fragment>
                :"Generate cover letter ↗"}
            </button>
            <div style={{fontSize:mob()?14:12,color:C.textHint,fontStyle:"italic",lineHeight:1.6}}>Only references skills from your CV. No invented claims.</div>
          </div>
      }
      {!anthropicKey&&<Alert type="warning">Add your Anthropic API key in Search Profiles → API keys.</Alert>}
      {error&&<Alert type="error">{error}</Alert>}
    </Card>

    {letter&&<Card>
      <SectionTitle>Your letter</SectionTitle>
      <Txta className="jt-cover-textarea" value={letter} onChange={function(e){setLetter(e.target.value);setSaved(false);}} rows={mob()?16:14} style={{fontSize:mob()?17:15,lineHeight:1.75}} />
      <div className="jt-cover-actions" style={{display:"flex",flexDirection:"column",gap:10,marginTop:14}}>
        <button onClick={function(){setShowEmail(true);}}
          style={{fontSize:15,fontWeight:700,padding:"13px",borderRadius:12,border:"none",
            background:C.primary,color:"#fff",cursor:"pointer",fontFamily:"inherit",
            width:"100%",minHeight:50,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          ✉ Send via email
        </button>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Btn onClick={function(){exportLetterPdf({letter:letter,cv:cv,job:currentJob});}} style={{fontSize:14,minHeight:46}}>📄 PDF</Btn>
          <Btn onClick={function(){navigator.clipboard.writeText(letter);}} style={{fontSize:14,minHeight:46}}>Copy</Btn>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Btn onClick={function(){saveLetter(letter);}} style={{fontSize:14,minHeight:46}}>{saved?"✓ Saved":"Save"}</Btn>
          <Btn variant="danger" onClick={function(){if(confirm("Remove cover letter?")){{setLetter("");saveLetter("");}};}} style={{fontSize:14,minHeight:46}}>Remove</Btn>
        </div>
      </div>
      {showEmail&&<EmailDialog recipients={cv.recipients||[]} subject={emailSubject} body={letter} onClose={function(){setShowEmail(false);}} />}
    </Card>}
  </div>;
}


// ─── Profile Assistant helpers ────────────────────────────────────────────────
function jobsSummaryText(jobs){
  if(!jobs||!jobs.length) return "(No jobs in the pipeline yet.)";
  var groups={};
  var order=["New","Reviewing","Applied","Interview","Offer","Rejected","No response","Ad removed","Not relevant"];
  jobs.forEach(function(j){
    var key=j.archived?"Archived":(j.status||"Unknown");
    if(!groups[key]) groups[key]=[];
    groups[key].push(j);
  });
  var lines=[];
  var allKeys=order.concat(Object.keys(groups).filter(function(k){return !order.includes(k);}));
  allKeys.forEach(function(status){
    var group=groups[status];
    if(!group||!group.length) return;
    lines.push("\n── "+status.toUpperCase()+" ("+group.length+") ──");
    group.forEach(function(j){
      var score=j.scored===false?"unscored":((j.score||0)+"%");
      var tags=j.tags&&j.tags.length?" ["+j.tags.slice(0,4).join(", ")+"]":"";
      var emp=j.employmentType?" · "+j.employmentType:"";
      var loc=j.location?" · "+j.location:"";
      var desc=j.description?(" | desc: "+j.description.replace(/\s+/g," ").slice(0,300)):"";
      var rat=j.rationale?" | AI: "+j.rationale:"";
      lines.push("• "+score+" — "+j.title+" @ "+j.company+loc+emp+tags+rat+desc);
    });
  });
  return "Total jobs: "+jobs.length+" ("+Object.keys(groups).map(function(k){return k+": "+groups[k].length;}).join(", ")+")\n"+lines.join("\n");
}

function buildAssistantSystem(cv,profiles,jobs){
  var cvBlock=hasCv(cv)?cvSummaryText(cv):"(No CV loaded yet. Ask the user to add their CV in the My CV tab before proposing profiles.)";
  var existing=(profiles||[]).length
    ? profiles.map(function(p){return "- \""+p.name+"\" · query: "+p.query+" · sources: "+(p.sources||[]).join("+")+" · max "+p.limit;}).join("\n")
    : "(No profiles saved yet.)";
  var pipelineBlock=jobsSummaryText(jobs||[]);

  return [
    "You are the Profile Assistant embedded in a personal job-tracking app.",
    "",
    "STRICT SCOPE — you ONLY discuss these topics:",
    "  (a) How this app's features work (Dashboard, My Jobs, Search Profiles, Scheduler, My CV, Cover Letters, Reports).",
    "  (b) Helping the user design high-quality search profiles based on their CV and preferences.",
    "  (c) What the connected job-search APIs (Arbetsförmedlingen, JSearch) can and cannot do.",
    "  (d) Analysing and discussing the user's job pipeline — patterns across statuses, commonalities in roles they reached Interview for, reasons for rejections, quality of matches, strategic advice based on their actual job data.",
    "",
    "If the user asks about ANYTHING else (general knowledge, coding, personal advice, other products, news, math, trivia, etc.),",
    "politely decline in one sentence and redirect: \"I'm only able to help with building search profiles and using this job tracker. What kind of role are you looking for?\"",
    "Do not answer off-topic questions even partially.",
    "",
    "TONE: friendly, concise, practical. Ask at most one clarifying question at a time. Never dump long explanations.",
    "",
    "API CAPABILITIES (what you can and can't suggest):",
    "• Arbetsförmedlingen (code: 'af') — Free Swedish Public Employment Service API. Good for Swedish jobs including Swedish-language roles. Accepts a single free-text query 'q' parameter. Does NOT support boolean AND/OR operators or nested expressions. Results are filtered only by the 'q' free-text and a 'limit'. The user query should read naturally, e.g. 'UX designer Stockholm' or 'produktdesigner remote'.",
    "• JSearch (code: 'jsearch') — RapidAPI aggregator of Indeed/LinkedIn/Glassdoor/ZipRecruiter listings. Requires user's RapidAPI key. Good for English-language and international/remote roles. Accepts a single free-text 'query' parameter. Does NOT support boolean AND/OR. Can be combined in the same query string (e.g. 'senior product designer remote fintech').",
    "• No other boards are connected. Do not promise LinkedIn-direct, Monster, etc.",
    "",
    "PROFILE DESIGN GUIDANCE:",
    "• A profile has: name, query (free-text), sources (array of 'af' and/or 'jsearch'), limit (integer 5–50).",
    "• Split into multiple focused profiles rather than one broad catch-all — narrower profiles produce higher-signal matches.",
    "• Use the user's CV skills, years of experience, industries, and locations to inform the query terms.",
    "• For Swedish roles, pick 'af' and include Swedish synonyms (e.g. 'produktdesigner' alongside 'product designer').",
    "• For remote/international roles, pick 'jsearch' and use English terms.",
    "• If the user wants both, suggest two separate profiles or one profile with both sources — explain the tradeoff.",
    "",
    "PIPELINE ANALYSIS GUIDANCE:",
    "The user's full job pipeline is provided below. Use it to:",
    "• Identify patterns within any status group — e.g. what Interview-stage jobs have in common (industry, seniority, employer type, skills in description).",
    "• Spot mismatches — e.g. if Rejected jobs cluster around a specific role type or company size the user's CV doesn't fit well.",
    "• Surface patterns across statuses — e.g. compare what Interview jobs vs Rejected jobs have in common to identify where the user's profile lands well vs poorly.",
    "• Recognise 'Not relevant' patterns — if the user keeps marking certain job types as not relevant, that's signal to refine search profiles.",
    "• Flag 'Ad removed' clusters — if many ads are removed early, that may indicate timing issues (applying too late).",
    "• Use AI match scores as a calibration signal — high scores that led to Rejection vs low scores that led to Interview are worth flagging.",
    "• Always ground observations in the actual data. Don't speculate beyond what the pipeline shows.",
    "• When the pipeline is small (<10 jobs), acknowledge limited signal and be appropriately cautious about generalisations.",
    "",
    "WHEN TO PROPOSE A CONCRETE PROFILE:",
    "Only after you have enough detail about role, seniority, and location/remoteness. Ask for clarification first if needed.",
    "When you propose a profile, emit it inside a special block exactly like this (including the markers):",
    "<<<PROFILE>>>",
    "{\"name\":\"Short descriptive name\",\"query\":\"free-text search terms\",\"sources\":[\"af\"],\"limit\":15,\"reasoning\":\"One sentence on why this query\"}",
    "<<</PROFILE>>>",
    "You may propose multiple profiles in one reply — emit a separate block per profile. Keep conversational text around each block short (one or two lines of intro per profile).",
    "Do NOT use markdown code fences around the PROFILE block. Do NOT invent fields beyond name/query/sources/limit/reasoning.",
    "",
    "THE USER'S CV AND PREFERENCES:",
    cvBlock,
    "",
    "THE USER'S EXISTING SEARCH PROFILES:",
    existing,
    "",
    "THE USER'S FULL JOB PIPELINE (read-only — for analysis and discussion only, never modify):",
    pipelineBlock,
  ].join("\n");
}

function extractProfiles(reply){
  var re=/<<<PROFILE>>>([\s\S]*?)<<<\/PROFILE>>>/g;
  var textParts=[];
  var profiles=[];
  var lastIndex=0;
  var m;
  while((m=re.exec(reply))!==null){
    var before=reply.slice(lastIndex,m.index).trim();
    if(before) textParts.push(before);
    try{
      var raw=m[1].trim().replace(/^```(?:json)?\s*/i,"").replace(/\s*```\s*$/,"").trim();
      var obj=JSON.parse(raw);
      if(obj&&typeof obj.name==="string"&&typeof obj.query==="string"){
        profiles.push({
          name:obj.name.slice(0,80),
          query:obj.query.slice(0,300),
          sources:Array.isArray(obj.sources)&&obj.sources.length?obj.sources.filter(function(s){return s==="af"||s==="jsearch";}):["af"],
          limit:Math.max(1,Math.min(50,parseInt(obj.limit,10)||15)),
          reasoning:typeof obj.reasoning==="string"?obj.reasoning.slice(0,300):"",
        });
      }
    }catch(e){
      textParts.push("[Could not parse a suggested profile — you can re-ask for it]");
    }
    lastIndex=re.lastIndex;
  }
  var tail=reply.slice(lastIndex).trim();
  if(tail) textParts.push(tail);
  if(!textParts.length&&!profiles.length) textParts.push(reply.trim());
  return{textParts:textParts,profiles:profiles};
}

function getStarterPrompts(cv,jobs){
  var scoredCount=(jobs||[]).filter(function(j){return j.scored!==false&&!j.archived&&typeof j.score==="number";}).length;
  var interviewCount=(jobs||[]).filter(function(j){return j.status==="Interview"||j.status==="Offer";}).length;
  var rejectedCount=(jobs||[]).filter(function(j){return j.status==="Rejected";}).length;
  var smartPrompt=scoredCount>=10?"Suggest a new profile based on my highest-scoring jobs.":null;

  if(!hasCv(cv)){
    var base=[
      "I'd like help building my first search profile.",
      "What kinds of job searches can this app do?",
      "How should I structure my CV to get better match scores?",
    ];
    return smartPrompt?[smartPrompt].concat(base).slice(0,4):base;
  }
  var prompts=[];
  if(smartPrompt) prompts.push(smartPrompt);
  if(interviewCount>=2) prompts.push("What do my Interview-stage jobs have in common?");
  else if(interviewCount===1) prompts.push("What stands out about the job I reached Interview for?");
  if(rejectedCount>=3) prompts.push("Are there patterns in the jobs I've been rejected from?");
  prompts.push("Help me build a search profile from my CV.");
  if(cv.locations) prompts.push("Find roles in "+cv.locations.split(",")[0].trim()+" that fit my background.");
  if(cv.roles) prompts.push("I want to search for "+cv.roles.split(",")[0].trim()+" positions — where should I start?");
  if(cv.workType&&cv.workType!=="Any") prompts.push("Help me find "+cv.workType.toLowerCase()+" roles.");
  else prompts.push("Split my search into a local profile and a remote profile.");
  return prompts.slice(0,4);
}

// ─── ProfileCard ──────────────────────────────────────────────────────────────
function ProfileCard({profile,alreadySaved,justSaved,onSave,onRun}){
  var p=profile;
  var srcLabels=p.sources.map(function(s){return s==="af"?"Arbetsförmedlingen":"JSearch";}).join(" + ");
  return <div style={{border:"2px solid "+C.primary,borderRadius:12,padding:"14px 16px",background:C.primaryLight}}>
    <div style={{fontSize:11,fontWeight:700,color:C.primary,letterSpacing:"0.5px",marginBottom:6}}>SUGGESTED PROFILE</div>
    <div style={{fontSize:15,fontWeight:700,color:C.textPrimary,marginBottom:4}}>{p.name}</div>
    <div style={{fontSize:13,color:C.textSecondary,marginBottom:8}}>Query: <span style={{fontFamily:"monospace",background:"#fff",padding:"1px 6px",borderRadius:4}}>{p.query}</span></div>
    <div style={{fontSize:12,color:C.textSecondary,marginBottom:p.reasoning?8:12}}>{srcLabels} · max {p.limit} results</div>
    {p.reasoning&&<div style={{fontSize:12,color:C.textHint,fontStyle:"italic",marginBottom:12}}>💡 {p.reasoning}</div>}
    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
      {!alreadySaved&&!justSaved&&<Btn variant="primary" onClick={onSave} style={{fontSize:13,padding:"7px 14px"}}>+ Save this profile</Btn>}
      {(alreadySaved||justSaved)&&<div style={{fontSize:13,color:C.success,fontWeight:600,padding:"7px 0"}}>✓ Saved</div>}
      {justSaved&&<Btn onClick={onRun} style={{fontSize:13,padding:"7px 14px"}}>▶ Run now</Btn>}
    </div>
  </div>;
}

// ─── ProfileAssistant ─────────────────────────────────────────────────────────
function ProfileAssistant({cv,profiles,setProfiles,anthropicKey,conversation,setConversation,setActiveTab,setPendingProfileRun,jobs}){
  var [input,setInput]=useState("");
  var [loading,setLoading]=useState(false);
  var [error,setError]=useState("");
  var [justSavedId,setJustSavedId]=useState(null);
  var scrollRef=useRef(null);

  useEffect(function(){
    if(scrollRef.current){ scrollRef.current.scrollTop=scrollRef.current.scrollHeight; }
  },[conversation,loading]);

  var starters=getStarterPrompts(cv,jobs);

  async function send(userText){
    var text=(userText||input).trim();
    if(!text||loading) return;
    if(!anthropicKey){ setError("Add your Anthropic API key in Search Profiles → API keys first."); return; }
    setError("");
    setInput("");
    var newMsgs=conversation.concat([{role:"user",content:text}]);
    setConversation(newMsgs);
    setLoading(true);
    try{
      var reply=await callClaudeChat({
        apiKey:anthropicKey,
        system:buildAssistantSystem(cv,profiles,jobs),
        messages:newMsgs,
        maxTokens:1200,
      });
      setConversation(newMsgs.concat([{role:"assistant",content:reply}]));
    }catch(e){
      setError(e.message||"Failed to reach Claude.");
      setConversation(conversation);
      setInput(text);
    }
    setLoading(false);
  }

  function clearConversation(){
    if(!confirm("Clear this conversation? This cannot be undone.")) return;
    setConversation([]);
    setError("");
    setInput("");
  }

  function saveProfile(prof){
    var newProfile={id:Date.now(),name:prof.name,query:prof.query,limit:prof.limit,sources:prof.sources,active:true};
    setProfiles(function(prev){return prev.concat([newProfile]);});
    setJustSavedId(newProfile.id);
  }
  function runNow(profileId){
    setPendingProfileRun(profileId);
    setActiveTab("profiles");
  }

  function renderMarkdown(text){
    if(!text) return null;
    var paragraphs=text.split(/\n{2,}/);
    return paragraphs.map(function(para,pi){
      var lines=para.split("\n");
      var isList=lines.every(function(l){return !l.trim()||/^[-•*]\s/.test(l.trim());});
      if(isList){
        var items=lines.filter(function(l){return l.trim();}).map(function(l){
          return l.trim().replace(/^[-•*]\s+/,"");
        });
        return <ul key={pi} style={{margin:"4px 0 4px 18px",padding:0,listStyleType:"disc"}}>
          {items.map(function(item,ii){
            return <li key={ii} style={{fontSize:14,lineHeight:1.6,color:C.textPrimary,marginBottom:2}}>{inlineFormat(item)}</li>;
          })}
        </ul>;
      }
      return <p key={pi} style={{margin:"0 0 6px 0",fontSize:14,lineHeight:1.6,color:C.textPrimary}}>{inlineFormat(para)}</p>;
    });
  }

  function inlineFormat(str){
    var result=[];
    var re=/\*\*(.+?)\*\*|\*(.+?)\*|\x60([^\x60]+)\x60/g;
    var last=0;
    var m;
    while((m=re.exec(str))!==null){
      if(m.index>last) result.push(str.slice(last,m.index));
      if(m[1]!==undefined) result.push(<strong key={m.index} style={{fontWeight:700}}>{m[1]}</strong>);
      else if(m[2]!==undefined) result.push(<em key={m.index} style={{fontStyle:"italic"}}>{m[2]}</em>);
      else if(m[3]!==undefined) result.push(<code key={m.index} style={{fontFamily:"monospace",fontSize:13,background:C.surfaceAlt,padding:"1px 5px",borderRadius:4,color:C.textPrimary}}>{m[3]}</code>);
      last=m.index+m[0].length;
    }
    if(last<str.length) result.push(str.slice(last));
    return result;
  }

  function renderAssistantMessage(reply,msgIdx){
    var parsed=extractProfiles(reply);
    var order=[];
    var re=/<<<PROFILE>>>[\s\S]*?<<<\/PROFILE>>>/g;
    var lastIndex=0;
    var m;
    var pIdx=0;
    while((m=re.exec(reply))!==null){
      var before=reply.slice(lastIndex,m.index).trim();
      if(before) order.push({type:"text",value:before});
      if(parsed.profiles[pIdx]) order.push({type:"profile",value:parsed.profiles[pIdx]});
      pIdx++;
      lastIndex=re.lastIndex;
    }
    var tail=reply.slice(lastIndex).trim();
    if(tail) order.push({type:"text",value:tail});
    if(!order.length) order.push({type:"text",value:reply.trim()});

    return order.map(function(item,i){
      if(item.type==="text"){
        return <div key={i} style={{lineHeight:1.55,fontSize:14,color:C.textPrimary}}>{renderMarkdown(item.value)}</div>;
      }
      var p=item.value;
      var alreadySaved=profiles.some(function(sp){return sp.name===p.name&&sp.query===p.query;});
      return <ProfileCard key={i} profile={p} alreadySaved={alreadySaved} justSaved={justSavedId&&profiles.find(function(sp){return sp.id===justSavedId;})&&profiles.find(function(sp){return sp.id===justSavedId;}).name===p.name} onSave={function(){saveProfile(p);}} onRun={function(){if(justSavedId) runNow(justSavedId);}} />;
    });
  }

  return <div style={{display:"flex",flexDirection:"column",gap:16}}>
    <Card>
      <SectionTitle action={conversation.length>0?<Btn onClick={clearConversation} style={{fontSize:12,padding:"6px 12px"}}>Clear conversation</Btn>:null}>Profile Assistant</SectionTitle>
      <div style={{fontSize:13,color:C.textHint,marginBottom:14}}>A focused chatbot that helps you design high-quality search profiles from your CV. It only discusses this app and search-profile design — not general topics.</div>
      {!anthropicKey&&<Alert type="warning">Add your Anthropic API key in Search Profiles → API keys to use the assistant.</Alert>}
      {!hasCv(cv)&&anthropicKey&&<Alert type="info">Tip: Upload or paste your CV in the My CV tab first, so the assistant can tailor suggestions to your background.</Alert>}
    </Card>

    <Card>
      <div ref={scrollRef} style={{maxHeight:"60vh",overflowY:"auto",display:"flex",flexDirection:"column",gap:14,paddingRight:4}}>
        {conversation.length===0&&<div>
          <div style={{fontSize:14,color:C.textSecondary,marginBottom:12,lineHeight:1.55}}>
            Hi! I can help you turn your CV into focused search profiles, explain what the connected APIs can do, and walk you through any feature in the app.
            {starters[0]&&starters[0].indexOf("highest-scoring")>=0&&<span> <span style={{color:C.primary,fontWeight:600}}>You now have enough scored jobs for smart suggestions — try the first starter below.</span></span>}
          </div>
          <div style={{fontSize:12,color:C.textHint,fontWeight:600,letterSpacing:"0.5px",marginBottom:8}}>TRY ONE OF THESE:</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {starters.map(function(s,i){
              var isSmart=s.indexOf("highest-scoring")>=0;
              return <button key={i} onClick={function(){send(s);}} disabled={loading||!anthropicKey} style={{textAlign:"left",padding:"12px 14px",borderRadius:10,border:"1.5px solid "+(isSmart?C.primary:C.border),background:isSmart?C.primaryLight:C.surfaceAlt,color:C.textPrimary,fontSize:13,cursor:loading||!anthropicKey?"not-allowed":"pointer",opacity:loading||!anthropicKey?0.5:1,fontWeight:isSmart?600:400}}>{isSmart?"✨":"💬"} {s}</button>;
            })}
          </div>
        </div>}
        {conversation.map(function(msg,i){
          if(msg.role==="user"){
            return <div key={i} style={{alignSelf:"flex-end",maxWidth:"85%",background:C.primary,color:"#fff",padding:"10px 14px",borderRadius:"14px 14px 2px 14px",fontSize:14,lineHeight:1.5,whiteSpace:"pre-wrap"}}>{msg.content}</div>;
          }
          return <div key={i} style={{alignSelf:"flex-start",maxWidth:"95%",width:"95%"}}>
            <div style={{fontSize:11,color:C.textHint,fontWeight:600,letterSpacing:"0.5px",marginBottom:4}}>ASSISTANT</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>{renderAssistantMessage(msg.content,i)}</div>
          </div>;
        })}
        {loading&&<div style={{alignSelf:"flex-start",fontSize:13,color:C.textHint,fontStyle:"italic"}}>Thinking…</div>}
      </div>
      {error&&<Alert type="error">{error}</Alert>}
      <div style={{display:"flex",gap:8,marginTop:14}}>
        <Inp value={input} onChange={function(e){setInput(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey&&input.trim()&&!loading&&anthropicKey){e.preventDefault();send();}}} enterKeyHint="send" placeholder="Ask about profiles, APIs, or features…" style={{flex:1}} />
        <Btn variant="primary" onClick={function(){send();}} disabled={loading||!input.trim()||!anthropicKey} style={{padding:"10px 20px"}}>Send</Btn>
      </div>
    </Card>
  </div>;
}


// ─── Scheduler ────────────────────────────────────────────────────────────────
function Scheduler({schedule,setSchedule,profiles,log,resetAllData,exportData,importData,validateImport,dismissedIds,clearDismissedIds}){
  var [draft,setDraft]=useState(schedule);
  var [dirty,setDirty]=useState(false);
  var [excludeKeys,setExcludeKeys]=useState(false);
  var [importPreview,setImportPreview]=useState(null);
  var [showAllLog,setShowAllLog]=useState(false);
  var [importError,setImportError]=useState("");
  var fileInputRef=useRef(null);
  function update(patch){setDraft(function(d){return Object.assign({},d,patch);});setDirty(true);}
  function toggleDay(day){update({days:draft.days.includes(day)?draft.days.filter(function(d){return d!==day;}):draft.days.concat([day])});}
  function save(){setSchedule(draft);setDirty(false);}
  function revert(){setDraft(schedule);setDirty(false);}

  function startImport(){
    setImportError("");
    setImportPreview(null);
    if(fileInputRef.current) fileInputRef.current.click();
  }
  function onFileChosen(e){
    var file=e.target.files&&e.target.files[0];
    if(!file) return;
    var reader=new FileReader();
    reader.onload=function(evt){
      try{
        var obj=JSON.parse(evt.target.result);
        var err=validateImport(obj);
        if(err){ setImportError(err); e.target.value=""; return; }
        var d=obj.data||{};
        var stats={
          jobs:(d.jobs||[]).length,
          profiles:(d.profiles||[]).length,
          hasCv:!!(d.cv&&d.cv.text),
          hasKeys:!!(d.afKey||d.jsKey||d.anthropicKey),
          exportedAt:obj.exportedAt||"unknown",
        };
        setImportPreview({payload:obj,stats:stats});
      }catch(err){
        setImportError("Couldn't parse file: "+(err.message||err));
      }
      e.target.value="";
    };
    reader.onerror=function(){ setImportError("Couldn't read the file."); e.target.value=""; };
    reader.readAsText(file);
  }
  function confirmImport(){
    if(!importPreview) return;
    if(!confirm("This will REPLACE all your current jobs, profiles, CV, schedule, and log with the contents of the backup. Continue?")) return;
    importData(importPreview.payload);
    setImportPreview(null);
  }

  var activeCount=profiles.filter(function(p){return p.active;}).length;
  var timeInvalid=draft.startTime>=draft.stopTime;

  return <div style={{display:"flex",flexDirection:"column",gap:16}}>
    <Card>
      <SectionTitle>Scheduler status <InfoTip>Scheduled fetches only run while the app is open in an active browser tab. Closing or minimising pauses it. For always-on fetching, keep the app open in a pinned tab.</InfoTip></SectionTitle>
      <Toggle value={draft.enabled} onChange={function(){update({enabled:!draft.enabled});}} label={draft.enabled?"Scheduler is ON — jobs will be fetched automatically":"Scheduler is OFF — turn on to fetch jobs automatically"} hint={draft.enabled?"Active profiles will be fetched on the days and times set below.":"Enable this to have the app check for new jobs in the background."} />
      {schedule.enabled&&<Alert type="success">Currently running · {activeCount} active profile{activeCount!==1?"s":""} · {schedule.days.join(", ")} · {schedule.startTime}–{schedule.stopTime} · every {schedule.intervalMinutes} min</Alert>}
    </Card>
    <Card>
      <SectionTitle>Which days should it run?</SectionTitle>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        {DAYS.map(function(d){var on=draft.days.includes(d);return <button key={d} onClick={function(){toggleDay(d);}} style={{flex:1,padding:"10px 4px",borderRadius:10,border:"2px solid "+(on?C.primary:C.border),background:on?C.primaryLight:"transparent",color:on?C.primary:C.textSecondary,fontSize:13,fontWeight:on?700:500,cursor:"pointer"}}>{d}</button>;})}
      </div>
      <div style={{display:"flex",gap:8}}>
        {[["Weekdays only",["Mon","Tue","Wed","Thu","Fri"]],["Every day",DAYS.slice()],["Clear all",[]]].map(function(item){return <Btn key={item[0]} onClick={function(){update({days:item[1]});}} style={{fontSize:12,padding:"6px 14px"}}>{item[0]}</Btn>;})}
      </div>
    </Card>
    <Card>
      <SectionTitle>Active time window <InfoTip>The scheduler only runs between these hours — so it won't disturb you outside working hours.</InfoTip></SectionTitle>
      <div className="jt-grid-2" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:16}}>
        {[["Start fetching at","startTime"],["Stop fetching at","stopTime"]].map(function(item){return <div key={item[1]}><Label>{item[0]}</Label><Inp type="time" value={draft[item[1]]} onChange={function(e){var v=e.target.value;var patch={};patch[item[1]]=v;update(patch);}} /></div>;})}
      </div>
      {timeInvalid&&<Alert type="error">The stop time must be later than the start time.</Alert>}
    </Card>
    <Card>
      <SectionTitle>How often should it fetch? <InfoTip>How frequently the app checks for new jobs within your active time window.</InfoTip></SectionTitle>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {[15,30,60,120,240,480].map(function(m){var on=draft.intervalMinutes===m;var label=m<60?m+" minutes":(m/60)+" hour"+(m>60?"s":"");return <button key={m} onClick={function(){update({intervalMinutes:m});}} style={{flex:1,minWidth:80,padding:"12px 8px",borderRadius:12,border:"2px solid "+(on?C.primary:C.border),background:on?C.primaryLight:"transparent",color:on?C.primary:C.textSecondary,fontSize:13,fontWeight:on?700:500,cursor:"pointer",textAlign:"center"}}>{label}</button>;})}
      </div>
    </Card>
    <div style={{display:"flex",gap:10,alignItems:"center"}}>
      <Btn variant="primary" onClick={save} disabled={!dirty||timeInvalid} style={{padding:"12px 28px"}}>Save schedule</Btn>
      {dirty&&<Btn onClick={revert}>Revert changes</Btn>}
      <span style={{fontSize:13,color:C.textHint}}>{activeCount} active profile{activeCount!==1?"s":""} will run on this schedule.</span>
    </div>
    <Card>
      <SectionTitle action={log.length>10?<Btn onClick={function(){setShowAllLog(function(v){return !v;});}} style={{fontSize:12,padding:"6px 12px"}}>{showAllLog?"Show last 10":"Show all ("+log.length+")"}</Btn>:null}>Run log</SectionTitle>
      <div style={{fontSize:13,color:C.textHint,marginBottom:12}}>A record of every time the scheduler ran and what it found. Entries older than 30 days are removed automatically.</div>
      {log.length===0
        ?<EmptyState icon="📋" title="No runs logged yet" body="Enable the scheduler and save your settings to start." />
        :<div style={{display:"flex",flexDirection:"column",gap:8}}>
          {(function(){
            var ordered=log.slice().reverse();
            var visible=showAllLog?ordered:ordered.slice(0,10);
            return visible.map(function(e,i){return <div key={i} style={{display:"flex",gap:12,padding:"10px 14px",background:C.surfaceAlt,borderRadius:10,fontSize:13}}><span style={{color:C.textHint,whiteSpace:"nowrap",fontFamily:"monospace",fontSize:12}}>{e.time}</span><span style={{color:e.type==="error"?C.error:e.type==="manual"?C.info:C.success}}>{e.msg}</span></div>;});
          })()}
          {!showAllLog&&log.length>10&&<div style={{fontSize:12,color:C.textHint,textAlign:"center",padding:"4px"}}>… {log.length-10} more entr{log.length-10===1?"y":"ies"} hidden</div>}
        </div>}
    </Card>
    <Card>
      <SectionTitle>Backup & restore <InfoTip>Download a JSON file with all your jobs, profiles, CV, schedule and settings. Keep it as a manual backup — Firestore cloud sync is your primary backup, this is the "leave the cloud" escape hatch.</InfoTip></SectionTitle>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:18}}>
        <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:C.textSecondary,cursor:"pointer",userSelect:"none"}}>
          <input type="checkbox" checked={excludeKeys} onChange={function(){setExcludeKeys(function(v){return !v;});}} style={{width:16,height:16,cursor:"pointer",accentColor:C.primary}} />
          <span>Exclude API keys from export <span style={{color:C.textHint}}>(recommended if you'll share the file)</span></span>
        </label>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <Btn variant="primary" onClick={function(){exportData(excludeKeys);}}>⬇ Export backup ({excludeKeys?"without keys":"with keys"})</Btn>
        </div>
      </div>
      <div style={{borderTop:"1px solid "+C.border,paddingTop:16}}>
        <input ref={fileInputRef} type="file" accept="application/json,.json" onChange={onFileChosen} style={{display:"none"}} />
        <Btn onClick={startImport}>⬆ Import backup…</Btn>
        {importError&&<Alert type="error">{importError}</Alert>}
        {importPreview&&<div style={{marginTop:14,padding:"14px 16px",background:C.primaryLight,borderRadius:12,border:"2px solid "+C.primary}}>
          <div style={{fontSize:13,fontWeight:700,color:C.primary,marginBottom:8,letterSpacing:"0.5px"}}>BACKUP READY TO RESTORE</div>
          <div style={{fontSize:13,color:C.textPrimary,lineHeight:1.7,marginBottom:12}}>
            • {importPreview.stats.jobs} job{importPreview.stats.jobs!==1?"s":""}<br/>
            • {importPreview.stats.profiles} search profile{importPreview.stats.profiles!==1?"s":""}<br/>
            • CV: {importPreview.stats.hasCv?"included":"not included"}<br/>
            • API keys: {importPreview.stats.hasKeys?"included":"not included"}<br/>
            • Exported: {importPreview.stats.exportedAt!=="unknown"?new Date(importPreview.stats.exportedAt).toLocaleString():"unknown"}
          </div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <Btn variant="primary" onClick={confirmImport}>Replace all data with this backup</Btn>
            <Btn onClick={function(){setImportPreview(null);}}>Cancel</Btn>
          </div>
        </div>}
      </div>
    </Card>
    <Card>
      <SectionTitle>Dismissed jobs <InfoTip>When you dismiss or delete a job, its ID is remembered so future fetches won't re-add it. Clear the list if you want previously dismissed jobs to reappear on the next fetch.</InfoTip></SectionTitle>
      <div style={{fontSize:13,color:C.textHint,marginBottom:14}}>
        {(dismissedIds&&dismissedIds.length)?"Blocking "+dismissedIds.length+" job ID"+(dismissedIds.length!==1?"s":"")+" from re-ingestion.":"No dismissed jobs — list is empty."}
      </div>
      <Btn onClick={function(){
        if(!dismissedIds||!dismissedIds.length) return;
        if(!confirm("Clear the dismissed-jobs list? Previously dismissed jobs will become eligible for re-ingestion on the next fetch.")) return;
        if(clearDismissedIds) clearDismissedIds();
      }} disabled={!dismissedIds||!dismissedIds.length}>Clear dismissed list</Btn>
    </Card>
    <Card>
      <SectionTitle>Reset <InfoTip>Permanently deletes all your data — jobs, profiles, CV, API keys and schedule — from both this device and the cloud. Cannot be undone.</InfoTip></SectionTitle>
      <Btn variant="danger" onClick={resetAllData}>Reset all data</Btn>
    </Card>
  </div>;
}

// ─── ActivityListings ─────────────────────────────────────────────────────────
function ActivityListings({jobs}){
  var now=new Date();
  var thisMonth=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  var [startMonth,setStartMonth]=useState(thisMonth);
  var [endMonth,setEndMonth]=useState(thisMonth);
  var [groupBy,setGroupBy]=useState("status");
  var [copied,setCopied]=useState("");

  function refDate(j){
    return APPLIED_STATUSES.includes(j.status)&&j.appliedAt?j.appliedAt.slice(0,10):j.date||"";
  }

  var filtered=jobs.filter(function(j){
    var d=refDate(j);
    if(!d) return false;
    var month=d.slice(0,7);
    return month>=startMonth&&month<=endMonth;
  }).sort(function(a,b){
    return (refDate(a)||"").localeCompare(refDate(b)||"");
  });

  function shortId(j){ return String(j.id).slice(-4); }

  function rowData(j){
    return {
      id:shortId(j),
      title:j.title||"",
      company:j.company||"",
      employmentType:j.employmentType||"—",
      location:j.location||"—",
      appliedAt:fmtDate(j.appliedAt),
      refDate:refDate(j),
      status:j.status+(j.archived?" (archived)":""),
    };
  }

  function buildStatusGroups(){
    var groups={};
    var allStatuses=STATUSES.slice();
    filtered.forEach(function(j){
      var key=j.status+(j.archived?" (archived)":"");
      if(!groups[key]) groups[key]=[];
      groups[key].push(rowData(j));
    });
    var order=STATUSES.map(function(s,i){return {s:s,i:i};});
    return Object.keys(groups).sort(function(a,b){
      var ai=order.findIndex(function(x){return a.startsWith(x.s);});
      var bi=order.findIndex(function(x){return b.startsWith(x.s);});
      return (ai===-1?99:ai)-(bi===-1?99:bi);
    }).map(function(key){return {label:key,rows:groups[key]};});
  }

  function buildWeekGroups(){
    var groups={};
    filtered.forEach(function(j){
      var d=refDate(j);
      if(!d) return;
      var ws=weekStart(d);
      if(!groups[ws]) groups[ws]=[];
      groups[ws].push(rowData(j));
    });
    return Object.keys(groups).sort().map(function(ws){
      var we=weekEnd(ws);
      var wn=isoWeek(ws);
      var label="Week "+wn+" ("+ws+" – "+we+")";
      return {label:label,rows:groups[ws],weekStart:ws};
    });
  }

  var groups=groupBy==="status"?buildStatusGroups():buildWeekGroups();
  var totalRows=filtered.length;

  function buildPlainText(){
    var lines=["Job Activity Listing","Period: "+startMonth+" to "+endMonth,"Grouped by: "+(groupBy==="status"?"Status":"Week"),"Generated: "+new Date().toISOString().slice(0,10),"Total jobs: "+totalRows,""];
    groups.forEach(function(g){
      lines.push("── "+g.label+" ("+g.rows.length+") ──");
      g.rows.forEach(function(r){
        lines.push([
          "#"+r.id,
          r.title.padEnd(30).slice(0,30),
          r.company.padEnd(20).slice(0,20),
          r.employmentType.padEnd(14).slice(0,14),
          r.location.padEnd(16).slice(0,16),
          "Applied: "+r.appliedAt,
          "Ref: "+r.refDate,
          r.status.padEnd(16).slice(0,16),
        ].filter(Boolean).join("  "));
      });
      lines.push("");
    });
    return lines.join("\n");
  }

  function buildCsv(){
    var rows=[["ID","Title","Company","Employment Type","Location","Applied","Ref Date","Status","Period","Week"]];
    groups.forEach(function(g){
      g.rows.forEach(function(r){
        rows.push([
          "#"+r.id,r.title,r.company,r.employmentType,r.location,r.appliedAt,r.refDate,r.status,
          startMonth+(startMonth!==endMonth?" to "+endMonth:""),
          g.weekStart||"",
        ].map(function(v){ return "\""+String(v).replace(/"/g,"\"\"")+"\""; }).join(","));
      });
    });
    return rows.join("\n");
  }

  function copyText(){ navigator.clipboard.writeText(buildPlainText()); setCopied("text"); setTimeout(function(){setCopied("");},2000); }
  function downloadCsv(){
    var csv=buildCsv();
    var bom="\uFEFF";
    var b=new Blob([bom+csv],{type:"text/csv;charset=utf-8"});
    var a=document.createElement("a");
    a.href=URL.createObjectURL(b);
    a.download="job-activity-"+startMonth+"-to-"+endMonth+".csv";
    a.click();
  }

  var thStyle={fontSize:11,fontWeight:700,color:C.textHint,textTransform:"uppercase",letterSpacing:"0.5px",padding:"6px 10px",textAlign:"left",borderBottom:"2px solid "+C.border,whiteSpace:"nowrap"};
  var tdStyle={fontSize:13,color:C.textPrimary,padding:"7px 10px",verticalAlign:"top"};
  var tdHint={fontSize:13,color:C.textHint,padding:"7px 10px",verticalAlign:"top",whiteSpace:"nowrap"};

  return <Card>
    <SectionTitle>Activity listing <InfoTip>Tabular listing of jobs by period — all statuses including archived. Reference date is the application date for applied jobs, ingestion date otherwise. Export as CSV opens in Excel.</InfoTip></SectionTitle>
    <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end",marginBottom:16}}>
      <div>
        <Label>From month</Label>
        <input type="month" value={startMonth} onChange={function(e){setStartMonth(e.target.value);}} style={{fontSize:13,padding:"8px 10px",borderRadius:8,border:"1.5px solid "+C.border,background:C.surface,color:C.textPrimary,fontFamily:"inherit"}} />
      </div>
      <div>
        <Label>To month</Label>
        <input type="month" value={endMonth} onChange={function(e){var v=e.target.value;setEndMonth(v<startMonth?startMonth:v);}} style={{fontSize:13,padding:"8px 10px",borderRadius:8,border:"1.5px solid "+C.border,background:C.surface,color:C.textPrimary,fontFamily:"inherit"}} />
      </div>
      <div>
        <Label>Group by</Label>
        <div style={{display:"flex",gap:6}}>
          {["status","week"].map(function(g){
            return <button key={g} onClick={function(){setGroupBy(g);}} style={{fontSize:13,padding:"8px 14px",borderRadius:8,border:"1.5px solid "+(groupBy===g?C.primary:C.border),background:groupBy===g?C.primaryLight:"transparent",color:groupBy===g?C.primary:C.textSecondary,cursor:"pointer",fontWeight:groupBy===g?700:400,textTransform:"capitalize"}}>
              {g==="status"?"By status":"By week"}
            </button>;
          })}
        </div>
      </div>
      <div style={{marginLeft:"auto",display:"flex",gap:8,flexWrap:"wrap"}}>
        <Btn onClick={copyText} disabled={totalRows===0}>{copied==="text"?"Copied!":"Copy as text"}</Btn>
        <Btn variant="primary" onClick={downloadCsv} disabled={totalRows===0}>⬇ Download CSV</Btn>
      </div>
    </div>
    {totalRows===0
      ?<Alert type="info">No jobs found for the selected period. Try adjusting the date range.</Alert>
      :<div>
        <div style={{fontSize:12,color:C.textHint,marginBottom:10}}>{totalRows} job{totalRows!==1?"s":""} in period</div>
        {groups.map(function(g){
          return <div key={g.label} style={{marginBottom:20}}>
            <div style={{fontSize:13,fontWeight:700,color:C.primary,marginBottom:6,padding:"4px 0",borderBottom:"1px solid "+C.border}}>
              {g.label} <span style={{fontWeight:400,color:C.textHint}}>({g.rows.length})</span>
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead>
                  <tr>
                    <th style={thStyle}>ID</th>
                    <th style={thStyle}>Title</th>
                    <th style={thStyle}>Company</th>
                    <th style={thStyle}>Employment type</th>
                    <th style={thStyle}>Location</th>
                    <th style={thStyle}>Applied</th>
                    <th style={thStyle}>Ref date</th>
                    <th style={thStyle}>Status</th>
                  </tr>
                </thead>
                <tbody>
                  {g.rows.map(function(r,i){
                    var bg=i%2===0?C.surfaceAlt:C.surface;
                    var rawStatus=r.status.replace(" (archived)","");
                    return <tr key={r.id+i} style={{background:bg}}>
                      <td style={Object.assign({},tdHint,{fontFamily:"monospace"})}>{r.id}</td>
                      <td style={Object.assign({},tdStyle,{maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"})}>{r.title}</td>
                      <td style={tdStyle}>{r.company}</td>
                      <td style={tdHint}>{r.employmentType}</td>
                      <td style={tdHint}>{r.location}</td>
                      <td style={tdHint}>{r.appliedAt}</td>
                      <td style={tdHint}>{r.refDate}</td>
                      <td style={tdStyle}><span style={{background:STATUS[rawStatus]?STATUS[rawStatus].bg:C.surfaceAlt,color:STATUS[rawStatus]?STATUS[rawStatus].color:C.textSecondary,borderRadius:6,padding:"2px 8px",fontSize:12,fontWeight:600,whiteSpace:"nowrap"}}>{r.status}</span></td>
                    </tr>;
                  })}
                </tbody>
              </table>
            </div>
          </div>;
        })}
      </div>
    }
  </Card>;
}

// ─── Reports ──────────────────────────────────────────────────────────────────
function Reports({jobs,cv,anthropicKey}){
  var [type,setType]=useState("Weekly digest");
  var [report,setReport]=useState("");
  var [error,setError]=useState("");
  var [loading,setLoading]=useState(false);
  var [showEmail,setShowEmail]=useState(false);

  async function generate(){
    setLoading(true);setReport("");setError("");setShowEmail(false);
    var active=jobs.filter(function(j){return !j.archived;});
    var byStatus={};
    STATUSES.forEach(function(s){byStatus[s]=0;});
    active.forEach(function(j){if(byStatus[j.status]!==undefined) byStatus[j.status]++;});
    var appliedTotal=APPLIED_STATUSES.reduce(function(a,s){return a+(byStatus[s]||0);},0);
    var rejected=byStatus.Rejected||0;
    var noResponse=byStatus["No response"]||0;
    var interviewed=byStatus.Interview||0;
    var offered=byStatus.Offer||0;
    var stillApplied=byStatus.Applied||0;
    var responded=appliedTotal-noResponse;
    var responseRate=appliedTotal>0?Math.round((responded/appliedTotal)*100):0;
    var rejectedWithDates=active.filter(function(j){return j.status==="Rejected"&&j.appliedAt&&j.rejectedAt;});
    var avgDaysToRejection=null;
    if(rejectedWithDates.length>0){
      var totalDays=rejectedWithDates.reduce(function(sum,j){
        return sum+(new Date(j.rejectedAt)-new Date(j.appliedAt))/(1000*60*60*24);
      },0);
      avgDaysToRejection=Math.round(totalDays/rejectedWithDates.length);
    }
    var funnel=
      "FUNNEL STATS (computed from current data, use these verbatim if you cite numbers):\n"+
      "• Total active in pipeline: "+active.length+"\n"+
      "• Applications sent (all-time, including closed): "+appliedTotal+"\n"+
      "• Still awaiting response (Applied status): "+stillApplied+"\n"+
      "• Progressed to Interview stage: "+(interviewed+offered+rejected)+" (currently Interview: "+interviewed+", Offer: "+offered+", Rejected after applying: "+rejected+")\n"+
      "• Closed - No response (ghosted): "+noResponse+"\n"+
      "• Closed - Ad removed (employer took down listing): "+(byStatus["Ad removed"]||0)+"\n"+
      "• Closed - Not relevant (reviewed and ruled out as mismatch): "+(byStatus["Not relevant"]||0)+"\n"+
      "• Response rate (any reply, positive or negative): "+responseRate+"%\n"+
      (avgDaysToRejection!==null?"• Average days from application to rejection: "+avgDaysToRejection+" days (based on "+rejectedWithDates.length+" rejections with timestamps)\n":"")+
      "• Breakdown by status: "+STATUSES.map(function(s){return s+"="+(byStatus[s]||0);}).join(", ");
    var summary=active.map(function(j){return j.title+" at "+j.company+" ("+j.status+", match: "+j.score+"%, source: "+j.source+")";}).join("\n");
    try{
      var cvContext=cv&&hasCv(cv)?"CANDIDATE PROFILE:\n"+cvSummaryText(cv)+"\n\n":"";
      var prompt="Generate a \""+type+"\" report for a job seeker.\n\n"+
        cvContext+funnel+"\n\n"+
        "JOBS LIST:\n"+summary+"\n\n"+
        "Write a clear, friendly report with key insights and practical recommendations. "+
        "Where relevant to the report type, use the funnel stats above — especially response rate and the breakdown between closed outcomes (Rejected vs No response). "+
        "Where the candidate profile is provided, use it to comment on skill/tool alignment patterns across the pipeline and whether the types of jobs being tracked match the candidate's background. "+
        "For status reports, explicitly comment on how many applications are closed vs still active, and whether the user should follow up on silent applications. "+
        "Use plain text, no markdown.";
      var text=await callClaude({apiKey:anthropicKey,prompt:prompt,maxTokens:1500});
      setReport(text);
    }catch(e){setError(e.message||"Error connecting to Claude. Please try again.");}
    setLoading(false);
  }

  var emailSubject=type+" — "+new Date().toISOString().slice(0,10);
  return <div style={{display:"flex",flexDirection:"column",gap:16}}>
    <Card>
      <SectionTitle>Generate a report <InfoTip>Claude analyses your pipeline and writes a summary with insights and recommendations. Uses your CV if available.</InfoTip></SectionTitle>
      <div style={{marginBottom:16}}>
        <Label hint="Choose what kind of report you'd like.">Report type</Label>
        <Sel className="jt-report-select" value={type} onChange={function(e){setType(e.target.value);}}>
          {["Weekly digest","Top 10 matches","Application status report","Monthly summary"].map(function(t){return <option key={t}>{t}</option>;})}
        </Sel>
      </div>
      <button onClick={generate} disabled={loading||jobs.length===0||!anthropicKey}
        style={{fontSize:15,fontWeight:700,padding:"14px",borderRadius:14,border:"none",
          background:loading||jobs.length===0||!anthropicKey?C.border:C.primary,
          color:loading||jobs.length===0||!anthropicKey?C.textHint:"#fff",
          cursor:loading||jobs.length===0||!anthropicKey?"not-allowed":"pointer",
          fontFamily:"inherit",width:"100%",minHeight:52,
          display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
        {loading
          ?<React.Fragment><span style={{display:"inline-block",width:18,height:18,border:"2.5px solid rgba(255,255,255,0.4)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 0.7s linear infinite"}} />Writing report…</React.Fragment>
          :"Generate report ↗"}
      </button>
      {!anthropicKey&&<Alert type="warning">Add your Anthropic API key in Search Profiles → API keys.</Alert>}
      {jobs.length===0&&<Alert type="warning">No jobs yet — add some first.</Alert>}
      {error&&<Alert type="error">{error}</Alert>}
    </Card>
    {report&&<Card>
      <SectionTitle>Your report</SectionTitle>
      <div className="jt-report-body" style={{fontSize:mob()?16:14,lineHeight:1.85,whiteSpace:"pre-wrap",color:C.textPrimary,background:C.surfaceAlt,borderRadius:12,padding:"16px",marginBottom:14}}>{report}</div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <button onClick={function(){setShowEmail(true);}}
          style={{fontSize:15,fontWeight:700,padding:"13px",borderRadius:12,border:"none",
            background:C.primary,color:"#fff",cursor:"pointer",fontFamily:"inherit",
            width:"100%",minHeight:50,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          ✉ Send via email
        </button>
        <Btn onClick={function(){navigator.clipboard.writeText(report);}} style={{fontSize:14,minHeight:46,width:"100%"}}>Copy to clipboard</Btn>
      </div>
      {showEmail&&<EmailDialog recipients={(cv&&cv.recipients)||[]} subject={emailSubject} body={report} onClose={function(){setShowEmail(false);}} />}
    </Card>}
    <ActivityListings jobs={jobs} />
  </div>;
}


// ─── AppShell ─────────────────────────────────────────────────────────────────
function AppShell({user,onSignOut}){
  var [activeTab,setActiveTab]=useState("dashboard");
  var [jobs,setJobsRaw]=useState([]);
  var [profiles,setProfilesRaw]=useState([]);
  var [cv,setCvRaw]=useState({text:"",roles:"",industries:"",locations:"",salary:"",workType:"Any",tools:[],skills:[],achievements:[],recipients:[],uploaded:false,fileName:""});
  var [afKey,setAfKeyRaw]=useState("");
  var [jsKey,setJsKeyRaw]=useState("");
  var [anthropicKey,setAnthropicKeyRaw]=useState("");
  var [schedule,setScheduleRaw]=useState(DEFAULT_SCHEDULE);
  var [log,setLogRaw]=useState([]);
  var [sort,setSortRaw]=useState("added_desc");
  var [assistantConv,setAssistantConvRaw]=useState([]);
  var [dismissedIds,setDismissedIdsRaw]=useState([]);
  var [sidebarCollapsed,setSidebarCollapsedRaw]=useState(false);
  var [cloudReady,setCloudReady]=useState(false);
  var [cloudReadyRef]=useState({current:false});
  var [suppressWriteUntilRef]=useState({current:Date.now()+2000});
  var [mobileOpen,setMobileOpen]=useState(false);
  var [scoringStatus,setScoringStatus]=useState({active:false,done:0,total:0});
  var [scoringError,setScoringError]=useState("");
  var [dismissToast,setDismissToast]=useState(null);
  var [dismissUndoTimer,setDismissUndoTimer]=useState(null);
  var [pendingJobsView,setPendingJobsView]=useState(null);
  var [pendingProfileRun,setPendingProfileRun]=useState(null);
  var [pendingCoverLetterJob,setPendingCoverLetterJob]=useState(null);
  var [theme,setThemeRaw]=useState(getSavedTheme);
  var [isMobile,setIsMobile]=useState(typeof window!=="undefined"&&window.innerWidth<=767);

  useEffect(function(){
    function onResize(){ setIsMobile(window.innerWidth<=767); }
    window.addEventListener("resize",onResize);
    return function(){ window.removeEventListener("resize",onResize); };
  },[]);

  function setTheme(t){
    setThemeRaw(t);
    applyTheme(t);
  }

  // ── setters that also trigger cloud save ─────────────────────────────────
  var pendingSave=useRef(null);
  var latestState=useRef({});

  function doCloudSave(state){
    if(!cloudReadyRef.current) return;
    if(Date.now()<suppressWriteUntilRef.current) return;
    cloudSave(user.uid,state);
  }

  function scheduleSave(patch){
    latestState.current=Object.assign({},latestState.current,patch);
    if(pendingSave.current) clearTimeout(pendingSave.current);
    pendingSave.current=setTimeout(function(){ doCloudSave(latestState.current); pendingSave.current=null; },600);
  }

  function setJobs(v){ var val=typeof v==="function"?v(jobs):v; setJobsRaw(val); scheduleSave({jobs:val}); }
  function setProfiles(v){ var val=typeof v==="function"?v(profiles):v; setProfilesRaw(val); scheduleSave({profiles:val}); }
  function setCv(v){ var val=typeof v==="function"?v(cv):v; setCvRaw(val); scheduleSave({cv:val}); }
  function setAfKey(v){ setAfKeyRaw(v); scheduleSave({afKey:v}); }
  function setJsKey(v){ setJsKeyRaw(v); scheduleSave({jsKey:v}); }
  function setAnthropicKey(v){ setAnthropicKeyRaw(v); scheduleSave({anthropicKey:v}); }
  function setSchedule(v){ var val=typeof v==="function"?v(schedule):v; setScheduleRaw(val); scheduleSave({schedule:val}); }
  function setLog(v){ var val=typeof v==="function"?v(log):v; setLogRaw(val); scheduleSave({log:val}); }
  function setSort(v){ setSortRaw(v); scheduleSave({sort:v}); }
  function setAssistantConv(v){ var val=typeof v==="function"?v(assistantConv):v; setAssistantConvRaw(val); scheduleSave({assistantConv:val}); }
  function setDismissedIds(v){ var val=typeof v==="function"?v(dismissedIds):v; setDismissedIdsRaw(val); scheduleSave({dismissedIds:val}); }
  function setSidebarCollapsed(v){ var val=typeof v==="function"?v(sidebarCollapsed):v; setSidebarCollapsedRaw(val); scheduleSave({sidebarCollapsed:val}); }

  // ── Cloud hydration ──────────────────────────────────────────────────────
  useEffect(function(){
    if(!user) return;
    var unsub=cloudSubscribe(user.uid,function(data){
      if(data){
        if(Array.isArray(data.jobs)) setJobsRaw(data.jobs);
        if(Array.isArray(data.profiles)) setProfilesRaw(data.profiles);
        if(data.cv&&typeof data.cv==="object") setCvRaw(data.cv);
        if(typeof data.afKey==="string") setAfKeyRaw(data.afKey);
        if(typeof data.jsKey==="string") setJsKeyRaw(data.jsKey);
        if(typeof data.anthropicKey==="string") setAnthropicKeyRaw(data.anthropicKey);
        if(data.schedule&&typeof data.schedule==="object") setScheduleRaw(data.schedule);
        if(Array.isArray(data.log)) setLogRaw(data.log);
        if(typeof data.sort==="string") setSortRaw(data.sort);
        if(Array.isArray(data.assistantConv)) setAssistantConvRaw(data.assistantConv);
        if(Array.isArray(data.dismissedIds)) setDismissedIdsRaw(data.dismissedIds);
        if(typeof data.sidebarCollapsed==="boolean") setSidebarCollapsedRaw(data.sidebarCollapsed);
        latestState.current=data;
      }
      suppressWriteUntilRef.current=Date.now()+2000;
      cloudReadyRef.current=true;
      setCloudReady(true);
    });
    return function(){ if(unsub) unsub(); };
  },[user]);

  // ── Scoring ──────────────────────────────────────────────────────────────
  function addLog(msg,type){
    var entry={time:new Date().toLocaleString("sv-SE"),msg:msg,type:type||"info"};
    setLog(function(prev){
      var cutoff=new Date();cutoff.setDate(cutoff.getDate()-30);
      var kept=prev.filter(function(e){return new Date(e.time)>=cutoff;});
      return kept.concat([entry]).slice(-200);
    });
  }

  var applyScores=useCallback(function(scored){
    setJobs(function(prev){
      return prev.map(function(j){
        var s=scored.find(function(x){return x.id===j.id;});
        return s?Object.assign({},j,{score:s.score,rationale:s.rationale,scored:true}):j;
      });
    });
  },[]);

  var rescoreAll=useCallback(async function(){
    var unscored=jobs.filter(function(j){return !j.archived;});
    if(!unscored.length||!hasCv(cv)) return;
    setScoringStatus({active:true,done:0,total:unscored.length});
    setScoringError("");
    try{
      await scoreJobs({
        jobs:unscored,cv:cv,apiKey:anthropicKey,
        onBatch:function(results,doneCount){
          applyScores(results);
          setScoringStatus({active:true,done:doneCount,total:unscored.length});
        },
      });
      setScoringStatus({active:false,done:unscored.length,total:unscored.length});
    }catch(e){
      setScoringError(e.message||"Scoring failed.");
      setScoringStatus({active:false,done:0,total:0});
    }
  },[jobs,cv,anthropicKey,applyScores]);

  // ── Schedule runner ──────────────────────────────────────────────────────
  var runAllProfiles=useCallback(async function(trigger){
    var active=profiles.filter(function(p){return p.active;});
    if(!active.length) return;
    var totalAdded=0;
    var tombstones=new Set((dismissedIds||[]).map(String));
    for(var i=0;i<active.length;i++){
      var p=active[i];
      var srcs=p.sources||["af"];
      for(var si=0;si<srcs.length;si++){
        try{
          var src=srcs[si];
          var url=src==="af"
            ?"https://jobsearch.api.jobtechdev.se/search?q="+encodeURIComponent(p.query)+"&limit="+p.limit+"&resdet=full"
            :"https://jsearch.p.rapidapi.com/search?query="+encodeURIComponent(p.query)+"&num_pages=1&page=1";
          var headers=src==="af"
            ?(afKey?{"accept":"application/json","api-key":afKey}:{"accept":"application/json"})
            :{"x-rapidapi-key":jsKey,"x-rapidapi-host":"jsearch.p.rapidapi.com"};
          if(src==="jsearch"&&!jsKey) continue;
          var out=await smartFetch(url,{headers:headers});
          if(!out.response.ok) continue;
          var data=await out.response.json();
          var ads=src==="af"?(data.hits||[]):(data.data||[]).slice(0,p.limit);
          var added=0;
          setJobs(function(prev){
            var ex=new Set(prev.map(function(j){return j.id?j.id.toString():""; }));
            var nj=ads.filter(function(a){
              var aid=src==="af"?(a.id?a.id.toString():""):(a.job_id?String(a.job_id):"");
              if(!aid||ex.has(aid)||tombstones.has(aid)) return false;
              return true;
            }).map(function(a){return src==="af"?mapAfJob(a,p.name):mapJsJob(a,p.name);});
            nj=filterByLocation(nj,p.locations||[]);
            added=nj.length;
            return nj.concat(prev);
          });
          totalAdded+=added;
        }catch(e){ console.error("Profile fetch error:",e); }
      }
    }
    addLog((trigger==="manual"?"Manual run":"Scheduled run")+": "+active.length+" profile"+(active.length!==1?"s":"")+", "+totalAdded+" new job"+(totalAdded!==1?"s":"")+" added.",trigger==="manual"?"manual":"info");
  },[profiles,afKey,jsKey,dismissedIds]);

  useEffect(function(){
    if(!schedule.enabled||!schedule.days.length) return;
    var timer=setInterval(function(){
      var now=new Date();
      var day=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][now.getDay()];
      var hm=String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
      if(!schedule.days.includes(day)) return;
      if(hm<schedule.startTime||hm>schedule.stopTime) return;
      runAllProfiles("schedule");
    },schedule.intervalMinutes*60*1000);
    return function(){ clearInterval(timer); };
  },[schedule,runAllProfiles]);

  // ── Dismiss / tombstone ──────────────────────────────────────────────────
  function tombstoneIds(ids){
    setDismissedIds(function(prev){
      var set=new Set(prev.map(String));
      ids.forEach(function(id){ set.add(String(id)); });
      return Array.from(set);
    });
  }

  function dismissJob(jobId){
    var job=jobs.find(function(j){return j.id===jobId;});
    if(!job) return;
    tombstoneIds([jobId]);
    setJobs(function(prev){return prev.filter(function(j){return j.id!==jobId;});});
    if(dismissUndoTimer) clearTimeout(dismissUndoTimer);
    setDismissToast({job:job,jobId:jobId});
    var t=setTimeout(function(){ setDismissToast(null); },6000);
    setDismissUndoTimer(t);
  }

  function undoDismiss(){
    if(!dismissToast) return;
    var job=dismissToast.job;
    setDismissedIds(function(prev){ return prev.filter(function(id){return String(id)!==String(dismissToast.jobId);}); });
    setJobs(function(prev){ return [job].concat(prev); });
    if(dismissUndoTimer) clearTimeout(dismissUndoTimer);
    setDismissToast(null);
  }

  function clearDismissedIds(){
    setDismissedIds([]);
  }

  // ── navigate to jobs ─────────────────────────────────────────────────────
  function navigateToJobs(opts){
    setPendingJobsView(opts||{});
    setActiveTab("jobs");
  }

  function startCoverLetter(jobId){
    setPendingCoverLetterJob(jobId);
    setActiveTab("covers");
  }

  // ── data export / import / reset ──────────────────────────────────────────
  function exportData(excludeKeys){
    var payload={jobs:jobs,profiles:profiles,cv:cv,schedule:schedule,log:log,sort:sort,assistantConv:assistantConv,dismissedIds:dismissedIds};
    if(!excludeKeys){ payload.afKey=afKey; payload.jsKey=jsKey; payload.anthropicKey=anthropicKey; }
    var out={version:2,exportedAt:new Date().toISOString(),data:payload};
    var b=new Blob([JSON.stringify(out,null,2)],{type:"application/json"});
    var a=document.createElement("a");
    a.href=URL.createObjectURL(b);
    a.download="job-tracker-backup-"+new Date().toISOString().slice(0,10)+".json";
    a.click();
  }

  function validateImport(obj){
    if(!obj||typeof obj!=="object") return "File is not valid JSON.";
    if(!obj.data||typeof obj.data!=="object") return "Missing data key — this doesn't look like a Job Tracker backup.";
    return null;
  }

  function importData(obj){
    var d=obj.data||{};
    if(Array.isArray(d.jobs)) setJobs(d.jobs);
    if(Array.isArray(d.profiles)) setProfiles(d.profiles);
    if(d.cv&&typeof d.cv==="object") setCv(d.cv);
    if(typeof d.afKey==="string") setAfKey(d.afKey);
    if(typeof d.jsKey==="string") setJsKey(d.jsKey);
    if(typeof d.anthropicKey==="string") setAnthropicKey(d.anthropicKey);
    if(d.schedule&&typeof d.schedule==="object") setSchedule(d.schedule);
    if(Array.isArray(d.log)) setLog(d.log);
    if(typeof d.sort==="string") setSort(d.sort);
    if(Array.isArray(d.assistantConv)) setAssistantConv(d.assistantConv);
    if(Array.isArray(d.dismissedIds)) setDismissedIds(d.dismissedIds);
  }

  function resetAllData(){
    if(!confirm("Reset ALL data? This will permanently delete all your jobs, profiles, CV, keys and settings from the cloud. This cannot be undone.")) return;
    if(!confirm("Are you absolutely sure? This cannot be undone.")) return;
    var uid=user.uid;
    cloudDelete(uid);
    setJobsRaw([]); setProfilesRaw([]); setCvRaw({text:"",roles:"",industries:"",locations:"",salary:"",workType:"Any",tools:[],skills:[],achievements:[],recipients:[],uploaded:false,fileName:""});
    setAfKeyRaw(""); setJsKeyRaw(""); setAnthropicKeyRaw("");
    setScheduleRaw(DEFAULT_SCHEDULE); setLogRaw([]); setSortRaw("added_desc");
    setAssistantConvRaw([]); setDismissedIdsRaw([]); setSidebarCollapsedRaw(false);
    latestState.current={};
    cloudReadyRef.current=false;
    suppressWriteUntilRef.current=Date.now()+5000;
    setTimeout(function(){ cloudReadyRef.current=true; },5000);
  }

  // ── tab content ───────────────────────────────────────────────────────────
  var MAIL_SAFE_LEN=2000;

  function renderTab(){
    var key=activeTab;
    return <TabErrorBoundary tabKey={key}>
      {key==="dashboard"&&<Dashboard jobs={jobs} schedule={schedule} setActiveTab={setActiveTab} navigateToJobs={navigateToJobs} rescoreAll={rescoreAll} scoringStatus={scoringStatus} onRunAllProfiles={runAllProfiles} profiles={profiles} cv={cv} anthropicKey={anthropicKey} />}
      {key==="jobs"&&<Jobs jobs={jobs} setJobs={setJobs} rescoreAll={rescoreAll} scoringStatus={scoringStatus} scoringError={scoringError} cv={cv} sort={sort} setSort={setSort} dismissJob={dismissJob} tombstoneIds={tombstoneIds} startCoverLetter={startCoverLetter} pendingJobsView={pendingJobsView} setPendingJobsView={setPendingJobsView} />}
      {key==="profiles"&&<SearchProfiles profiles={profiles} setProfiles={setProfiles} setJobs={setJobs} afKey={afKey} setAfKey={setAfKey} jsKey={jsKey} setJsKey={setJsKey} anthropicKey={anthropicKey} setAnthropicKey={setAnthropicKey} pendingProfileRun={pendingProfileRun} setPendingProfileRun={setPendingProfileRun} dismissedIds={dismissedIds} />}
      {key==="assistant"&&<ProfileAssistant cv={cv} profiles={profiles} setProfiles={setProfiles} anthropicKey={anthropicKey} conversation={assistantConv} setConversation={setAssistantConv} setActiveTab={setActiveTab} setPendingProfileRun={setPendingProfileRun} jobs={jobs} />}
      {key==="cv"&&<CVProfile cv={cv} setCv={setCv} />}
      {key==="scheduler"&&<Scheduler schedule={schedule} setSchedule={setSchedule} profiles={profiles} log={log} resetAllData={resetAllData} exportData={exportData} importData={importData} validateImport={validateImport} dismissedIds={dismissedIds} clearDismissedIds={clearDismissedIds} />}
      {key==="covers"&&<CoverLetters jobs={jobs} setJobs={setJobs} cv={cv} anthropicKey={anthropicKey} setActiveTab={setActiveTab} pendingCoverLetterJob={pendingCoverLetterJob} setPendingCoverLetterJob={setPendingCoverLetterJob} />}
      {key==="reports"&&<Reports jobs={jobs} cv={cv} anthropicKey={anthropicKey} />}
    </TabErrorBoundary>;
  }

  var currentTab=TABS.find(function(t){return t.id===activeTab;})||TABS[0];

  if(!cloudReady){
    return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.background}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:16}}>🌿</div>
        <div style={{fontSize:18,fontWeight:700,color:C.textPrimary,marginBottom:8}}>Loading your data…</div>
        <div style={{fontSize:14,color:C.textHint}}>Syncing with the cloud</div>
      </div>
    </div>;
  }

  return <div style={{display:"flex",minHeight:"100vh",background:C.background}}>
    {!isMobile&&<Sidebar activeTab={activeTab} setActiveTab={setActiveTab} collapsed={sidebarCollapsed} setCollapsed={setSidebarCollapsed} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen} user={user} onSignOut={onSignOut} theme={theme} setTheme={setTheme} />}

    <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column",paddingBottom:isMobile?"calc(80px + env(safe-area-inset-bottom, 0px))":0}}>
      {isMobile&&<div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:C.surface,borderBottom:"1px solid "+C.border,position:"sticky",top:0,zIndex:100}}>
        <div style={{width:30,height:30,borderRadius:8,background:C.primary,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>🌿</div>
        <div style={{fontSize:16,fontWeight:700,color:C.textPrimary}}>{currentTab.label}</div>
        {scoringStatus.active&&<div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6,fontSize:12,color:C.textHint}}>
          <span style={{display:"inline-block",width:10,height:10,border:"2px solid "+C.primary,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.7s linear infinite"}} />
          Scoring…
        </div>}
      </div>}

      <main style={{flex:1,padding:isMobile?"16px 12px":"28px 32px",maxWidth:1100,width:"100%",boxSizing:"border-box",margin:"0 auto"}}>
        {!isMobile&&<div style={{marginBottom:24}}>
          <h1 style={{margin:0,fontSize:22,fontWeight:800,color:C.textPrimary}}>{currentTab.label}</h1>
          {currentTab.desc&&<div style={{fontSize:14,color:C.textHint,marginTop:4}}>{currentTab.desc}</div>}
        </div>}
        {renderTab()}
      </main>
    </div>

    {isMobile&&<MobileBottomNav activeTab={activeTab} setActiveTab={setActiveTab} user={user} onSignOut={onSignOut} theme={theme} setTheme={setTheme} />}

    {dismissToast&&<DismissToast job={dismissToast.job} onUndo={undoDismiss} />}
  </div>;
}

// ─── DismissToast ─────────────────────────────────────────────────────────────
function DismissToast({job,onUndo}){
  return <div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",zIndex:999,background:C.textPrimary,color:C.surface,borderRadius:12,padding:"12px 20px",display:"flex",alignItems:"center",gap:16,boxShadow:"0 8px 32px rgba(0,0,0,0.25)",maxWidth:"90vw",fontSize:14}}>
    <span>Dismissed <b>{job.title}</b></span>
    <button onClick={onUndo} style={{background:"none",border:"1.5px solid rgba(255,255,255,0.5)",borderRadius:8,padding:"5px 14px",color:"inherit",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"inherit",whiteSpace:"nowrap"}}>Undo</button>
  </div>;
}

// ─── AuthSplash ───────────────────────────────────────────────────────────────
function AuthSplash(){
  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.background}}>
    <div style={{textAlign:"center"}}>
      <div style={{fontSize:40,marginBottom:16}}>🌿</div>
      <div style={{fontSize:18,fontWeight:700,color:C.textPrimary,marginBottom:8}}>Signing you in…</div>
      <div style={{fontSize:14,color:C.textHint}}>One moment</div>
    </div>
  </div>;
}

// ─── SignInScreen ─────────────────────────────────────────────────────────────
function SignInScreen({onSignIn}){
  var [loading,setLoading]=useState(false);
  var [error,setError]=useState("");

  async function handleSignIn(){
    setLoading(true);setError("");
    try{ await onSignIn(); }
    catch(e){ setError(e.message||"Sign-in failed. Please try again."); setLoading(false); }
  }

  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.background,padding:24}}>
    <div style={{width:"100%",maxWidth:420,textAlign:"center"}}>
      <div style={{width:64,height:64,borderRadius:20,background:C.primary,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto 24px",boxShadow:"0 8px 24px rgba(74,141,103,0.3)"}}>🌿</div>
      <h1 style={{fontSize:26,fontWeight:800,color:C.textPrimary,marginBottom:8}}>Job Tracker</h1>
      <p style={{fontSize:15,color:C.textSecondary,lineHeight:1.6,marginBottom:32}}>Your AI-powered job search assistant. Track applications, match with AI, and generate cover letters — all synced to the cloud.</p>
      <button onClick={handleSignIn} disabled={loading} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:14,padding:"14px 24px",borderRadius:14,border:"2px solid "+C.border,background:C.surface,color:C.textPrimary,fontSize:15,fontWeight:600,cursor:loading?"wait":"pointer",boxShadow:"0 2px 8px rgba(0,0,0,0.06)",fontFamily:"inherit"}}>
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        {loading?"Signing in…":"Sign in with Google"}
      </button>
      {error&&<div style={{marginTop:16,fontSize:13,color:C.error,background:C.errorBg,borderRadius:10,padding:"10px 14px"}}>{error}</div>}
      <p style={{fontSize:12,color:C.textHint,marginTop:24,lineHeight:1.6}}>Your data is stored privately in the cloud, accessible only to you. API keys are encrypted and never shared.</p>
    </div>
  </div>;
}

// ─── App root ─────────────────────────────────────────────────────────────────
function App(){
  var [user,setUser]=useState(undefined);
  var [authChecked,setAuthChecked]=useState(false);

  useEffect(function(){
    function init(){
      var sdk=window.firebaseSdk;
      if(!sdk){ setUser(null); setAuthChecked(true); return; }
      var unsub=sdk.onAuthStateChanged(sdk.auth,function(u){ setUser(u||null); setAuthChecked(true); });
      return unsub;
    }
    if(window.__firebaseReady){ var unsub=init(); return function(){ if(unsub) unsub(); }; }
    function onReady(){ var unsub=init(); if(unsub) window.__fbUnsub=unsub; }
    window.addEventListener("firebase-ready",onReady,{once:true});
    return function(){ window.removeEventListener("firebase-ready",onReady); };
  },[]);

  async function signIn(){
    var sdk=window.firebaseSdk;
    var provider=new sdk.GoogleAuthProvider();
    await sdk.signInWithPopup(sdk.auth,provider);
  }

  async function signOut(){
    var sdk=window.firebaseSdk;
    await sdk.signOut(sdk.auth);
  }

  if(!authChecked) return <AuthSplash />;
  if(!user) return <SignInScreen onSignIn={signIn} />;
  return <AppShell key={user.uid} user={user} onSignOut={signOut} />;
}

// ─── Mount ────────────────────────────────────────────────────────────────────
applyTheme(getSavedTheme());
var root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>

</body>
</html>
