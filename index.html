// ─── InlineListEditor ─────────────────────────────────────────────────────────
function InlineListEditor({items,onChange,fields,addLabel,sortFields,defaultSort}){
  var [editId,setEditId]=useState(null);
  var [draft,setDraft]=useState({});
  var [adding,setAdding]=useState(false);
  var [sort,setSort]=useState(defaultSort||{key:null,dir:"asc"});

  function emptyDraft(){
    var d={};
    fields.forEach(function(f){ d[f.key]=f.type==="number"?0:""; });
    return d;
  }
  function startAdd(){ setDraft(emptyDraft()); setAdding(true); setEditId(null); }
  function startEdit(item){ setDraft(Object.assign({},item)); setEditId(item.id); setAdding(false); }
  function cancel(){ setAdding(false); setEditId(null); setDraft({}); }
  function save(){
    var firstKey=fields[0].key;
    if(!String(draft[firstKey]||"").trim()) return;
    if(adding){
      onChange(items.concat([Object.assign({id:Date.now()},draft)]));
    } else {
      onChange(items.map(function(x){ return x.id===editId?Object.assign({},x,draft):x; }));
    }
    cancel();
  }
  function remove(id){ onChange(items.filter(function(x){ return x.id!==id; })); }
  function setField(key,val){ setDraft(function(d){ return Object.assign({},d,{[key]:val}); }); }
  function toggleSort(key){
    setSort(function(s){
      if(s.key===key) return {key:key,dir:s.dir==="asc"?"desc":"asc"};
      var f=fields.find(function(f){return f.key===key;});
      var defaultDir=(f&&(f.type==="number"||key==="year"))?"desc":"asc";
      return {key:key,dir:defaultDir};
    });
  }

  var displayed=items.slice();
  if(sort.key){
    var sk=sort.key;
    var sd=sort.dir;
    displayed.sort(function(a,b){
      var av=a[sk],bv=b[sk];
      if(sk==="level"){ av=PROF_ORDER[av]||0; bv=PROF_ORDER[bv]||0; return sd==="asc"?av-bv:bv-av; }
      if(typeof av==="number"&&typeof bv==="number"){ return sd==="asc"?av-bv:bv-av; }
      av=String(av||"").toLowerCase(); bv=String(bv||"").toLowerCase();
      if(av<bv) return sd==="asc"?-1:1;
      if(av>bv) return sd==="asc"?1:-1;
      return 0;
    });
  }

  function renderCell(f,val,onChangeFn){
    var baseStyle={fontSize:13,padding:"6px 8px",borderRadius:7,border:"1.5px solid "+C.border,background:C.surface,color:C.textPrimary,fontFamily:"inherit",width:"100%",boxSizing:"border-box"};
    if(f.type==="select"){
      return <select value={val||""} onChange={function(e){onChangeFn(e.target.value);}} style={baseStyle}>
        {(f.options||[]).map(function(o){ return <option key={o}>{o}</option>; })}
      </select>;
    }
    if(f.type==="number"){
      return <input type="number" min={0} max={50} value={val||""} onChange={function(e){onChangeFn(Number(e.target.value));}} style={Object.assign({},baseStyle,{width:60})} />;
    }
    if(f.multiline){
      return <textarea value={val||""} onChange={function(e){onChangeFn(e.target.value);}} placeholder={f.placeholder||""} rows={2} style={Object.assign({},baseStyle,{resize:"vertical",lineHeight:1.4})} />;
    }
    return <input type="text" value={val||""} onChange={function(e){onChangeFn(e.target.value);}} placeholder={f.placeholder||""} style={baseStyle} />;
  }

  var isEditing=adding||editId!==null;
  var isMobile=typeof window!=="undefined"&&window.innerWidth<600;

  var sortControls=sortFields&&sortFields.length>0&&<div style={{display:"flex",gap:6,alignItems:"center",marginBottom:8,flexWrap:"wrap"}}>
    <span style={{fontSize:11,color:C.textHint,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px",marginRight:2}}>Sort:</span>
    {sortFields.map(function(sf){
      var active=sort.key===sf.key;
      var arrow=active?(sort.dir==="asc"?" ↑":" ↓"):"";
      return <button key={sf.key} onClick={function(){toggleSort(sf.key);}} style={{fontSize:12,padding:"3px 10px",borderRadius:6,border:"1.5px solid "+(active?C.primary:C.border),background:active?C.primaryLight:"transparent",color:active?C.primary:C.textSecondary,cursor:"pointer",fontWeight:active?700:400}}>
        {sf.label}{arrow}
      </button>;
    })}
  </div>;

  return <div>
    {items.length>1&&sortControls}
    {displayed.length>0&&<div style={{marginBottom:8}}>
      {displayed.map(function(item){
        if(editId===item.id){
          var stableIdx=items.indexOf(item);
          return <div key={item.id} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"6px 8px",background:C.primaryLight,borderRadius:8,marginBottom:4}}>
            <div style={{fontSize:11,fontWeight:700,color:C.primary,minWidth:22,paddingTop:5,flexShrink:0,userSelect:"none",textAlign:"right"}}>{stableIdx>=0?stableIdx+1:"—"}</div>
            {fields.map(function(f){
              if(isMobile&&f.mobileHide) return null;
              return <div key={f.key} style={{flex:f.flex||1,minWidth:isMobile?0:(f.minWidth||0)}}>
                {renderCell(f,draft[f.key],function(v){ setField(f.key,v); })}
              </div>;
            })}
            <div style={{display:"flex",gap:4,width:56,flexShrink:0,paddingTop:2}}>
              <button onClick={save} title="Save" style={{flex:1,background:C.primary,color:"#fff",border:"none",borderRadius:6,padding:"5px 0",cursor:"pointer",fontSize:13}}>✓</button>
              <button onClick={cancel} title="Cancel" style={{flex:1,background:C.border,color:C.textPrimary,border:"none",borderRadius:6,padding:"5px 0",cursor:"pointer",fontSize:13}}>✗</button>
            </div>
          </div>;
        }
        var stableIdx=items.indexOf(item);
        return <div key={item.id} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"7px 8px",borderRadius:8,marginBottom:3,background:C.surfaceAlt}}>
          <div style={{fontSize:11,fontWeight:700,color:C.textHint,minWidth:22,paddingTop:3,flexShrink:0,userSelect:"none",textAlign:"right"}}>{stableIdx>=0?stableIdx+1:"—"}</div>
          {fields.map(function(f){
            if(isMobile&&f.mobileHide) return null;
            var val=item[f.key];
            var display=f.type==="number"&&val?val+" yr"+(val!==1?"s":""):val;
            return <div key={f.key} style={{flex:f.flex||1,minWidth:isMobile?0:(f.minWidth||0),fontSize:13,color:C.textPrimary,whiteSpace:f.multiline?"pre-wrap":"nowrap",overflow:f.multiline?"visible":"hidden",textOverflow:f.multiline?"unset":"ellipsis",wordBreak:f.multiline?"break-word":"normal",lineHeight:1.45}}>
              {display||<span style={{color:C.textHint}}>—</span>}
            </div>;
          })}
          <div style={{display:"flex",gap:4,width:56,flexShrink:0,paddingTop:2}}>
            <button onClick={function(){ startEdit(item); }} disabled={isEditing} title="Edit" style={{flex:1,background:"none",border:"1px solid "+C.border,borderRadius:6,padding:"4px 0",cursor:isEditing?"not-allowed":"pointer",fontSize:12,color:C.textSecondary}}>✏</button>
            <button onClick={function(){ remove(item.id); }} disabled={isEditing} title="Delete" style={{flex:1,background:"none",border:"1px solid "+C.border,borderRadius:6,padding:"4px 0",cursor:isEditing?"not-allowed":"pointer",fontSize:12,color:C.error}}>🗑</button>
          </div>
        </div>;
      })}
    </div>}
    {adding&&<div style={{display:"flex",gap:8,alignItems:"flex-start",padding:"6px 8px",background:C.primaryLight,borderRadius:8,marginBottom:8}}>
      {fields.map(function(f){
        if(isMobile&&f.mobileHide) return null;
        return <div key={f.key} style={{flex:f.flex||1,minWidth:isMobile?0:(f.minWidth||0)}}>
          {renderCell(f,draft[f.key],function(v){ setField(f.key,v); })}
        </div>;
      })}
      <div style={{display:"flex",gap:4,width:56,flexShrink:0,paddingTop:2}}>
        <button onClick={save} title="Save" style={{flex:1,background:C.primary,color:"#fff",border:"none",borderRadius:6,padding:"5px 0",cursor:"pointer",fontSize:13}}>✓</button>
        <button onClick={cancel} title="Cancel" style={{flex:1,background:C.border,color:C.textPrimary,border:"none",borderRadius:6,padding:"5px 0",cursor:"pointer",fontSize:13}}>✗</button>
      </div>
    </div>}
    {!isEditing&&<button onClick={startAdd} style={{fontSize:13,color:C.primary,background:"none",border:"1.5px dashed "+C.primary,borderRadius:8,padding:"7px 14px",cursor:"pointer",fontWeight:600,width:"100%",marginTop:displayed.length?4:0}}>+ {addLabel||"Add entry"}</button>}
  </div>;
}

// ─── Portrait uploader with Cropper.js ───────────────────────────────────────
function PortraitUploader({portrait,setPortrait}){
  var [cropping,setCropping]=useState(false);
  var [srcUrl,setSrcUrl]=useState(null);
  var cropperRef=useRef(null);
  var imgRef=useRef(null);
  var fileRef=useRef(null);

  function onFile(e){
    var file=e.target.files&&e.target.files[0];
    if(!file) return;
    if(file.size>10*1024*1024){
      alert("Photo is too large (max 10 MB). Please choose a smaller image.");
      e.target.value=""; return;
    }
    var reader=new FileReader();
    reader.onload=function(ev){ setSrcUrl(ev.target.result); setCropping(true); };
    reader.readAsDataURL(file);
    e.target.value="";
  }

  useEffect(function(){
    if(!cropping||!srcUrl||!imgRef.current) return;
    if(!window.Cropper){
      alert("Image cropper failed to load. Check your internet connection and reload the page.");
      setCropping(false); setSrcUrl(null); return;
    }
    if(cropperRef.current){ cropperRef.current.destroy(); cropperRef.current=null; }
    cropperRef.current=new window.Cropper(imgRef.current,{
      aspectRatio:1,viewMode:1,dragMode:"move",autoCropArea:0.9,
      movable:true,zoomable:true,rotatable:false,scalable:false,
      cropBoxResizable:false,cropBoxMovable:false,
      guides:false,center:false,highlight:false,background:false,
    });
    return function(){ if(cropperRef.current){ cropperRef.current.destroy(); cropperRef.current=null; } };
  },[cropping,srcUrl]);

  function applyPortrait(){
    if(!cropperRef.current) return;
    var canvas=cropperRef.current.getCroppedCanvas({width:240,height:240,imageSmoothingQuality:"high"});
    setPortrait(canvas.toDataURL("image/jpeg",0.88));
    setCropping(false); setSrcUrl(null);
  }

  return <div>
    <div style={{display:"flex",alignItems:"center",gap:16}}>
      {portrait
        ?<img src={portrait} style={{width:80,height:80,borderRadius:"50%",objectFit:"cover",border:"2px solid "+C.border,flexShrink:0}} />
        :<div style={{width:80,height:80,borderRadius:"50%",background:C.surfaceAlt,border:"2px dashed "+C.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,flexShrink:0,color:C.textHint}}>👤</div>
      }
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        <div style={{fontSize:13,color:C.textSecondary,lineHeight:1.5}}>
          {portrait?"Your photo is shown as avatar in the app and included in cover letter PDFs.":"Add a photo to personalise your cover letters and app avatar."}
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <Btn onClick={function(){fileRef.current&&fileRef.current.click();}} style={{fontSize:13,padding:"8px 14px"}}>
            {portrait?"Change photo":"Upload photo"}
          </Btn>
          {portrait&&<Btn variant="danger" onClick={function(){setPortrait("");}} style={{fontSize:13,padding:"8px 14px"}}>Remove</Btn>}
        </div>
      </div>
      <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={onFile} />
    </div>
    {cropping&&srcUrl&&<div style={{position:"fixed",inset:0,zIndex:700,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:C.surface,borderRadius:20,padding:24,width:"min(440px,96vw)",boxShadow:"0 8px 40px rgba(0,0,0,0.3)"}}>
        <div style={{fontSize:15,fontWeight:700,color:C.textPrimary,marginBottom:14}}>Adjust photo</div>
        <div style={{width:"100%",height:300,overflow:"hidden",borderRadius:12,background:"#111",marginBottom:16}}>
          <img ref={imgRef} src={srcUrl} style={{maxWidth:"100%",display:"block"}} />
        </div>
        <div style={{fontSize:12,color:C.textHint,marginBottom:16,textAlign:"center"}}>Drag to reposition · Pinch or scroll to zoom</div>
        <div style={{display:"flex",gap:10}}>
          <Btn variant="primary" onClick={applyPortrait} style={{flex:1,fontSize:14,minHeight:46}}>✓ Use this photo</Btn>
          <Btn onClick={function(){setCropping(false);setSrcUrl(null);}} style={{fontSize:14,minHeight:46}}>Cancel</Btn>
        </div>
      </div>
    </div>}
  </div>;
}

// ─── CVProfile ────────────────────────────────────────────────────────────────
function CVProfile({cv,setCv,portrait,setPortrait}){
  var [tab,setTab]=useState(cv.uploaded?"upload":"paste");
  var fileRef=useRef();
  var [uploadState,setUploadState]=useState({status:"idle",msg:""});
  var recipients=cv.recipients||[];
  var [newRec,setNewRec]=useState({name:"",email:""});



  async function handleFile(f){
    if(!f) return;
    setUploadState({status:"loading",msg:"Extracting text from "+f.name+"..."});
    try{
      var text=await extractPdfText(f);
      setCv(function(c){return Object.assign({},c,{text:text,fileName:f.name,uploaded:true,extractedAt:new Date().toISOString()});});
      setUploadState({status:"success",msg:"Extracted "+text.length.toLocaleString()+" characters from "+f.name+"."});
    }catch(e){
      setUploadState({status:"error",msg:e.message||"Failed to read PDF."});
    }
  }

  function addRecipient(){
    var name=newRec.name.trim();
    var email=newRec.email.trim();
    if(!name||!isValidEmail(email)) return;
    var isDefault=recipients.length===0;
    setCv(function(c){
      var list=(c.recipients||[]).concat([{id:Date.now(),name:name,email:email,isDefault:isDefault}]);
      return Object.assign({},c,{recipients:list});
    });
    setNewRec({name:"",email:""});
  }
  function removeRecipient(id){
    setCv(function(c){
      var list=(c.recipients||[]).filter(function(r){return r.id!==id;});
      if(!list.some(function(r){return r.isDefault;})&&list.length>0) list[0].isDefault=true;
      return Object.assign({},c,{recipients:list});
    });
  }
  function setDefaultRecipient(id){
    setCv(function(c){
      var list=(c.recipients||[]).map(function(r){return Object.assign({},r,{isDefault:r.id===id});});
      return Object.assign({},c,{recipients:list});
    });
  }

  var EMPTY_CV={text:"",roles:"",industries:"",locations:"",salary:"",workType:"Any",tools:[],skills:[],achievements:[],recipients:[],uploaded:false,fileName:"",extractedAt:""};

  function clearAllCv(){
    if(!confirm(
      "Clear all CV data?\n\n"+
      "This will permanently delete:\n"+
      "• Your CV text (uploaded or pasted)\n"+
      "• All tools & software entries\n"+
      "• All skills & competencies\n"+
      "• All achievements\n"+
      "• All job preferences (roles, industries, locations, salary)\n"+
      "• All saved email recipients\n\n"+
      "Your jobs, search profiles, and API keys are NOT affected.\n\n"+
      "This cannot be undone."
    )) return;
    if(!confirm("Are you sure? All CV data will be permanently deleted.")) return;
    setCv(EMPTY_CV);
  }

  var hasText=!!(cv.text&&cv.text.trim());
  var cvCharCount=hasText?cv.text.length:0;

  return <div style={{display:"flex",flexDirection:"column",gap:16}}>

    <Card>
      <SectionTitle>Profile portrait</SectionTitle>
      <PortraitUploader portrait={portrait||""} setPortrait={setPortrait} />
    </Card>

    <Card>
      <SectionTitle>Your CV <InfoTip>Text is extracted from your PDF and stored for AI match scoring and cover letter generation. The original PDF file is not retained — only the extracted text is saved. Text-based PDFs work best; scanned image PDFs may not extract correctly.</InfoTip></SectionTitle>

      {/* Controls row: mode tabs + clear button */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
        {["paste","upload"].map(function(t){
          return <button key={t} onClick={function(){setTab(t);}}
            style={{padding:"8px 20px",borderRadius:10,
              border:"2px solid "+(tab===t?C.primary:C.border),
              background:tab===t?C.primaryLight:"transparent",
              color:tab===t?C.primary:C.textSecondary,
              fontSize:13,fontWeight:tab===t?700:500,cursor:"pointer"}}>
            {t==="paste"?"Paste text":"Upload PDF"}
          </button>;
        })}
        {hasText&&<button onClick={clearAllCv}
          style={{marginLeft:"auto",fontSize:12,fontWeight:600,
            padding:"8px 14px",borderRadius:10,
            border:"1.5px solid "+C.error,background:C.errorBg,
            color:C.error,cursor:"pointer",fontFamily:"inherit",
            whiteSpace:"nowrap"}}>
          🗑 Clear CV
        </button>}
      </div>

      {/* Status line — single source of truth for CV state */}
      {hasText&&<div style={{fontSize:12,color:C.textSecondary,marginBottom:14,
        padding:"7px 12px",borderRadius:8,background:C.successBg,
        border:"1px solid "+C.success,lineHeight:1.6}}>
        <span style={{fontWeight:600,color:C.success}}>✓ CV text active</span>
        {" · "}{cvCharCount.toLocaleString()} characters
        {cv.fileName?" · source: "+cv.fileName:" · pasted text"}
        {cv.extractedAt?" · extracted: "+new Date(cv.extractedAt).toLocaleString("sv-SE",{year:"numeric",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}):""}
      </div>}
      {!hasText&&<div style={{fontSize:12,color:C.textHint,marginBottom:14,
        padding:"7px 12px",borderRadius:8,background:C.surfaceAlt,
        border:"1px solid "+C.border}}>
        No CV text yet — paste your CV or upload a PDF to enable AI scoring and cover letters.
      </div>}
      {tab==="paste"
        ?<div>
          <Label hint="Paste the full text of your CV — experience, skills, education. Also shows text extracted from an uploaded PDF so you can review it.">CV content</Label>
          <Txta value={cv.text||""} onChange={function(e){var v=e.target.value;setCv(function(c){return Object.assign({},c,{text:v});});}} placeholder="Paste your CV here..." rows={12} />
        </div>
        :<div>
          <div onClick={function(){if(uploadState.status!=="loading") fileRef.current.click();}} style={{border:"2px dashed "+(uploadState.status==="error"?C.error:C.border),borderRadius:14,padding:"40px 20px",textAlign:"center",cursor:uploadState.status==="loading"?"wait":"pointer",background:C.surfaceAlt,opacity:uploadState.status==="loading"?0.7:1}}>
            <div style={{fontSize:32,marginBottom:10}}>{uploadState.status==="loading"?"⏳":uploadState.status==="success"?"✅":"📄"}</div>
            <div style={{fontSize:15,fontWeight:600,color:C.textPrimary,marginBottom:4}}>
              {uploadState.status==="loading"?"Reading PDF..."

            </div>
            <div style={{fontSize:12,color:C.textHint}}></div>

          </div>
          {uploadState.status==="success"&&<Alert type="success">{uploadState.msg} You can review it in the "Paste text" tab.</Alert>}
          {uploadState.status==="error"&&<Alert type="error">{uploadState.msg}</Alert>}
        </div>}
    </Card>
    <Card>
      <SectionTitle>Job preferences <InfoTip>These fields personalise your cover letters and AI scoring. Target roles and locations are especially important — they tell Claude what you're looking for.</InfoTip></SectionTitle>
      <div className="jt-grid-2" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:14}}>
        <div><Label hint="e.g. Product Designer, UX Lead">Target job titles</Label><Inp value={cv.roles||""} onChange={function(e){var v=e.target.value;setCv(function(c){return Object.assign({},c,{roles:v});});}} placeholder="e.g. Product Designer, UX Lead" /></div>
        <div><Label hint="e.g. Fintech, SaaS, Healthcare">Preferred industries</Label><Inp value={cv.industries||""} onChange={function(e){var v=e.target.value;setCv(function(c){return Object.assign({},c,{industries:v});});}} placeholder="e.g. Fintech, SaaS" /></div>
        <div><Label hint="e.g. Stockholm, Remote, Malmö">Preferred locations</Label><Inp value={cv.locations||""} onChange={function(e){var v=e.target.value;setCv(function(c){return Object.assign({},c,{locations:v});});}} placeholder="e.g. Stockholm, Remote" /></div>
        <div><Label hint="e.g. 60 000 – 90 000 SEK/month">Salary expectation</Label><Inp value={cv.salary||""} onChange={function(e){var v=e.target.value;setCv(function(c){return Object.assign({},c,{salary:v});});}} placeholder="e.g. 70 000 SEK/month" /></div>

      </div>
      <div style={{marginTop:16}}><Btn variant="primary" onClick={function(){alert("Profile saved!");}}>Save profile</Btn></div>
    </Card>
    <Card>
      <SectionTitle>Tools & software <span style={{fontSize:11,fontWeight:400,color:C.textHint,marginLeft:6}}>optional</span> <InfoTip>Tools and software you've used professionally — with years of experience and proficiency level. This feeds AI matching with precise signal. e.g. Figma · 6 yrs · Expert · Spotify, IKEA</InfoTip></SectionTitle>
      <InlineListEditor
        items={cv.tools||[]}
        onChange={function(v){setCv(function(c){return Object.assign({},c,{tools:v});});}}
        addLabel="Add tool"
        defaultSort={{key:"name",dir:"asc"}}
        sortFields={[{key:"name",label:"Name"},{key:"years",label:"Years"},{key:"level",label:"Level"}]}
        fields={[
          {key:"name",label:"Tool / Software",placeholder:"e.g. Figma",flex:2,minWidth:100},
          {key:"years",label:"Years",type:"number",flex:0,minWidth:60},

          {key:"employers",label:"Employer(s)",placeholder:"e.g. Spotify, IKEA",flex:2,minWidth:100,mobileHide:true},

    <Card>

      <InlineListEditor
        items={cv.skills||[]}
        onChange={function(v){setCv(function(c){return Object.assign({},c,{skills:v});});}}
        addLabel="Add skill"
        defaultSort={{key:"name",dir:"asc"}}
        sortFields={[{key:"name",label:"Name"},{key:"years",label:"Years"},{key:"level",label:"Level"}]}
        fields={[
          {key:"name",label:"Skill / Competency",placeholder:"e.g. Design systems",flex:2,minWidth:120},
          {key:"years",label:"Years",type:"number",flex:0,minWidth:60},
          {key:"level",label:"Level",type:"select",options:PROFICIENCY,flex:1,minWidth:90},

    <Card>

      <InlineListEditor
        items={cv.achievements||[]}
        onChange={function(v){setCv(function(c){return Object.assign({},c,{achievements:v});});}}
        addLabel="Add achievement"
        defaultSort={{key:"year",dir:"desc"}}
        sortFields={[{key:"year",label:"Year"},{key:"employer",label:"Employer"}]}

          {key:"description",label:"Achievement",placeholder:"e.g. Reduced onboarding time by 40%",flex:4,minWidth:180,multiline:true},
          {key:"employer",label:"Employer",placeholder:"e.g. Spotify",flex:1,minWidth:80,mobileHide:true},
          {key:"year",label:"Year",placeholder:"2022",flex:0,minWidth:60},

    <Card>
      <SectionTitle>Email recipients <InfoTip>Save email addresses you use often — your own, recruiters, specific contacts. When sending a cover letter or report, pick from this list. The default address is pre-selected.</InfoTip></SectionTitle>
      {recipients.length>0&&<div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
        {recipients.map(function(r){return <div key={r.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:C.surfaceAlt,borderRadius:10}}>

            <div style={{fontSize:12,color:C.textSecondary,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.email}</div>
          </div>
          {!r.isDefault&&<Btn onClick={function(){setDefaultRecipient(r.id);}} style={{fontSize:12,padding:"5px 10px"}}>Make default</Btn>}
          <Btn variant="danger" onClick={function(){removeRecipient(r.id);}} style={{fontSize:12,padding:"5px 10px"}}>Remove</Btn>
        </div>;})}
      </div>}
      {recipients.length===0&&<div style={{fontSize:13,color:C.textHint,fontStyle:"italic",marginBottom:14}}>No recipients saved yet. Add one below.</div>}
      <div className="jt-grid-recipient" style={{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:10,alignItems:"end"}}>

        <div><Label>Email</Label><Inp value={newRec.email} onChange={function(e){var v=e.target.value;setNewRec(function(n){return Object.assign({},n,{email:v});});}} placeholder="name@example.com" type="email" /></div>
        <Btn variant="primary" onClick={addRecipient} disabled={!newRec.name.trim()||!isValidEmail(newRec.email)}>+ Add</Btn>
      </div>
    </Card>
  </div>;
}


// ─── Cover Letters ────────────────────────────────────────────────────────────
// Rev: 2026-06-16 — Template selector (Classic/Modern/Compact), font and colour
//                   pickers; portrait prop passed through to exportLetterPdf.
function CoverLetters({jobs,setJobs,cv,anthropicKey,setActiveTab,pendingCoverLetterJob,setPendingCoverLetterJob,portrait}){
  var [showAllStatuses,setShowAllStatuses]=useState(false);
  var eligibleJobs=jobs.filter(function(j){
    if(j.archived) return false;
    return showAllStatuses?true:j.status==="Reviewing";
  });
  var [selectedJob,setSelectedJob]=useState(eligibleJobs[0]?eligibleJobs[0].id:null);
  useEffect(function(){
    var stillEligible=eligibleJobs.some(function(j){return j.id===selectedJob;});
    if(!stillEligible){ setSelectedJob(eligibleJobs[0]?eligibleJobs[0].id:null); }
  },[eligibleJobs.length,showAllStatuses]);

  useEffect(function(){
    if(!pendingCoverLetterJob) return;
    var target=jobs.find(function(j){return j.id===pendingCoverLetterJob;});
    if(target){
      var inPool=eligibleJobs.some(function(j){return j.id===target.id;});
      if(!inPool) setShowAllStatuses(true);
      setSelectedJob(target.id);
    }
    if(setPendingCoverLetterJob) setPendingCoverLetterJob(null);
  },[pendingCoverLetterJob]);

  var [tone,setTone]=useState("Professional");
  var [language,setLanguage]=useState("auto");
  var [letter,setLetter]=useState("");
  var [error,setError]=useState("");
  var [loading,setLoading]=useState(false);
  var [showEmail,setShowEmail]=useState(false);
  var [saved,setSaved]=useState(false);
  var [tmpl,setTmpl]=useState("classic");
  var [font,setFont]=useState("georgia");
  var [color,setColor]=useState("green");

  function detectJobLanguage(job){
    if(!job) return "English";
    var text=((job.description||"")+" "+(job.title||"")).toLowerCase();
    if(!text.trim()) return "English";
    var svWords=["och","att","för","med","som","det","vi","på","är","av","har","inom","ett","en","till","samt","goda","kunskaper","erfarenhet","arbeta","söker","tjänst","krav","meriterande"];
    var enWords=["and","the","for","with","our","you","we","are","will","your","have","this","that","role","team","experience","skills","join","looking","responsible"];
    var svScore=svWords.reduce(function(n,w){return n+(text.split(new RegExp("\\b"+w+"\\b","g")).length-1);},0);
    var enScore=enWords.reduce(function(n,w){return n+(text.split(new RegExp("\\b"+w+"\\b","g")).length-1);},0);
    return svScore>enScore?"Swedish":"English";
  }

  useEffect(function(){
    var job=jobs.find(function(j){return j.id===selectedJob;});
    setLetter(job&&job.coverLetter?job.coverLetter:"");
    setSaved(false);
    setShowEmail(false);
    setError("");
    setLanguage("auto");
  },[selectedJob]);

  function saveLetter(text){
    if(!setJobs||!selectedJob) return;
    setJobs(function(prev){return prev.map(function(j){
      return j.id===selectedJob?Object.assign({},j,{coverLetter:text||""}):j;
    });});
    setSaved(true);
    setTimeout(function(){setSaved(false);},2000);
  }

  async function generate(){
    var job=eligibleJobs.find(function(j){return j.id===selectedJob;});
    if(!job) return;
    if(!cv.text||cv.text.trim().length<100){
      setError("Please add a substantive CV in the My CV tab first. The letter can only be grounded in what you've actually written.");
      return;
    }
    var resolvedLang=language==="auto"?detectJobLanguage(job):language;
    setLoading(true);setLetter("");setError("");setShowEmail(false);
    try{
      var jobBrief="Title: "+job.title+"\nCompany: "+job.company+"\nLocation: "+(job.location||"Not specified");
      if(job.employmentType) jobBrief+="\nEmployment type: "+job.employmentType;
      if(job.tags&&job.tags.length) jobBrief+="\nTags: "+job.tags.join(", ");
      if(job.description){
        var desc=job.description.slice(0,3000).replace(/\s+/g," ").trim();
        jobBrief+="\n\nJob description:\n"+desc;
      }
      var prompt=
        "You are writing a cover letter for a job applicant. Write it in "+resolvedLang+" with a "+tone.toLowerCase()+" tone.\n\n"+
        "═══ STRICT GROUNDING RULES — FOLLOW EXACTLY ═══\n"+
        "1. The CV below is the ONLY source of truth about the applicant. Do NOT invent, infer, or extrapolate skills, experience, qualifications, achievements, tools, languages, certifications, employers, education, or soft skills that are not explicitly stated in the CV.\n"+
        "2. If the job description lists a requirement that is NOT evidenced in the CV, do NOT claim the applicant has it. Do NOT hint at it, imply it, or use filler phrases suggesting it. Either omit it entirely or frame it honestly as something the applicant is eager to learn.\n"+
        "3. Do NOT use generic stock phrases like \"proven track record\", \"passionate about\", \"results-driven\", \"strong communication skills\", \"team player\", \"proactive self-starter\", \"wealth of experience\", unless those exact qualities are demonstrated by specific content in the CV.\n"+
        "4. When you reference a skill or achievement, it must be traceable to a concrete line or section of the CV. Prefer specific wording from the CV itself.\n"+
        "5. Do NOT fabricate numbers, percentages, metrics, project names, client names, or dates. Only cite numbers that appear in the CV.\n"+
        "6. Keep the letter CONCISE — aim for 200-300 words. A shorter, honest letter is better than a padded, speculative one.\n"+
        "7. If the CV is sparse on something the job needs, it is better to write a shorter letter that highlights what IS a fit, than to pad with generic claims.\n"+
        "8. Start directly with the salutation. No preamble, no meta-commentary, no \"Here is your cover letter\".\n\n"+
        "═══ JOB ═══\n"+jobBrief+"\n\n"+
        "═══ CV & PROFILE (ONLY source of truth about the applicant) ═══\n"+cvSummaryText(cv)+"\n\n"+
        "Write the cover letter now, following every rule above.";
      var text=await callClaude({apiKey:anthropicKey,prompt:prompt,maxTokens:1500});
      setLetter(text);
      if(setJobs&&selectedJob){
        setJobs(function(prev){return prev.map(function(j){
          return j.id===selectedJob?Object.assign({},j,{coverLetter:text}):j;
        });});
      }
    }catch(e){setError(e.message||"Error connecting to Claude. Please try again.");}
    setLoading(false);
  }

  var currentJob=eligibleJobs.find(function(j){return j.id===selectedJob;});
  var emailSubject=currentJob?"Application — "+currentJob.title+" at "+currentJob.company:"Cover letter";
  var reviewingCount=jobs.filter(function(j){return !j.archived&&j.status==="Reviewing";}).length;
  var noJobsAtAll=jobs.filter(function(j){return !j.archived;}).length===0;

  return <div style={{display:"flex",flexDirection:"column",gap:16}}>
    <Card>
      <SectionTitle>Cover letter <InfoTip>Claude writes a personalised letter based on the job and your CV. Only references what's in your CV — no invented skills.</InfoTip></SectionTitle>
      {noJobsAtAll
        ?<Alert type="warning">Add some jobs first — go to My Jobs or Search Profiles to get started.</Alert>
        :eligibleJobs.length===0
          ?<div style={{padding:"20px",background:C.surfaceAlt,borderRadius:12,textAlign:"center"}}>
            <div style={{fontSize:32,marginBottom:10}}>📝</div>
            <div style={{fontSize:15,fontWeight:600,color:C.textPrimary,marginBottom:6}}>No jobs ready</div>
            <div style={{fontSize:14,color:C.textSecondary,marginBottom:16,lineHeight:1.6}}>Move a job to <b>Reviewing</b> status first, or tap below to show all.</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <Btn variant="primary" onClick={function(){if(setActiveTab) setActiveTab("jobs");}} style={{fontSize:15,minHeight:48}}>Go to My Jobs</Btn>
              <Btn onClick={function(){setShowAllStatuses(true);}} style={{fontSize:15,minHeight:48}}>Show all statuses</Btn>
            </div>
          </div>
          :<div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div>
              <Label hint={showAllStatuses?"Showing all non-archived jobs.":"Showing Reviewing jobs."}>Job</Label>
              <Sel className="jt-cover-select" value={selectedJob||""} onChange={function(e){var v=e.target.value;var num=Number(v);setSelectedJob(isNaN(num)||String(num)!==v?v:num);}}>
                {eligibleJobs.map(function(j){return <option key={j.id} value={j.id}>{j.title} – {j.company}{showAllStatuses?" ["+j.status+"]":""}</option>;})}
              </Sel>
            </div>
            <div>
              <Label>Tone</Label>
              <Sel className="jt-cover-select" value={tone} onChange={function(e){setTone(e.target.value);}}>
                {["Professional","Conversational","Enthusiastic","Formal","Creative"].map(function(t){return <option key={t}>{t}</option>;})}
              </Sel>
            </div>
            <div>
              <Label>Letter template</Label>
              <div style={{display:"flex",gap:8,marginTop:4,flexWrap:"wrap"}}>
                {COVER_TEMPLATES.map(function(t){
                  var on=tmpl===t.id;
                  return <button key={t.id} onClick={function(){setTmpl(t.id);}}
                    style={{flex:1,minWidth:90,padding:"10px 12px",borderRadius:10,
                      border:"2px solid "+(on?C.primary:C.border),
                      background:on?C.primaryLight:"transparent",
                      color:on?C.primary:C.textSecondary,
                      cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:on?700:500,
                      textAlign:"center",lineHeight:1.3}}>
                    <div style={{fontWeight:700,marginBottom:2}}>{t.name}</div>
                    <div style={{fontSize:11,opacity:0.8}}>{t.desc}</div>
                  </button>;
                })}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div>
                <Label>Font</Label>
                <Sel className="jt-cover-select" value={font} onChange={function(e){setFont(e.target.value);}}>
                  {COVER_FONTS.map(function(f){return <option key={f.id} value={f.id}>{f.name}</option>;})}
                </Sel>
              </div>
              <div>
                <Label>Colour</Label>
                <Sel className="jt-cover-select" value={color} onChange={function(e){setColor(e.target.value);}}>
                  {COVER_COLORS.map(function(c){return <option key={c.id} value={c.id}>{c.name}</option>;})}
                </Sel>
              </div>
            </div>
            <div>
              <Label hint="Auto-detect reads the job description language.">
                Language
                {language==="auto"&&currentJob&&<span style={{fontSize:12,color:C.textHint,fontWeight:400,marginLeft:6}}>→ {detectJobLanguage(currentJob)}</span>}
              </Label>
              <Sel className="jt-cover-select" value={language} onChange={function(e){setLanguage(e.target.value);}}>
                <option value="auto">Auto-detect</option>
                <option value="English">English</option>
                <option value="Swedish">Swedish</option>
              </Sel>
            </div>
            <label style={{display:"flex",alignItems:"center",gap:10,fontSize:14,color:C.textSecondary,cursor:"pointer",userSelect:"none",minHeight:44}}>
              <input type="checkbox" checked={showAllStatuses} onChange={function(){setShowAllStatuses(function(v){return !v;});}} style={{width:18,height:18,cursor:"pointer",accentColor:C.primary,flexShrink:0}} />
              Show all statuses
              {!showAllStatuses&&reviewingCount>0&&<span style={{color:C.textHint}}>({reviewingCount} reviewing)</span>}
            </label>
            <button onClick={generate} disabled={loading||!selectedJob||!anthropicKey}
              className="jt-mob-btn"
              style={{fontSize:16,fontWeight:700,padding:"14px",borderRadius:14,border:"none",
                background:loading||!selectedJob||!anthropicKey?C.border:C.primary,
                color:loading||!selectedJob||!anthropicKey?C.textHint:"#fff",
                cursor:loading||!selectedJob||!anthropicKey?"not-allowed":"pointer",
                fontFamily:"inherit",width:"100%",minHeight:52,
                display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
              {loading
                ?<React.Fragment><span style={{display:"inline-block",width:18,height:18,border:"2.5px solid rgba(255,255,255,0.4)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 0.7s linear infinite"}} />Writing letter…</React.Fragment>
                :"Generate cover letter ↗"}
            </button>
            <div style={{fontSize:mob()?14:12,color:C.textHint,fontStyle:"italic",lineHeight:1.6}}>Only references skills from your CV. No invented claims.</div>
          </div>
      }
      {!anthropicKey&&<Alert type="warning">Add your Anthropic API key in Search Profiles → API keys.</Alert>}
      {error&&<Alert type="error">{error}</Alert>}
    </Card>

    {letter&&<Card>
      <SectionTitle>Your letter</SectionTitle>
      <Txta className="jt-cover-textarea" value={letter} onChange={function(e){setLetter(e.target.value);setSaved(false);}} rows={mob()?16:14} style={{fontSize:mob()?17:15,lineHeight:1.75}} />
      <div className="jt-cover-actions" style={{display:"flex",flexDirection:"column",gap:10,marginTop:14}}>
        <button onClick={function(){setShowEmail(true);}}
          style={{fontSize:15,fontWeight:700,padding:"13px",borderRadius:12,border:"none",
            background:C.primary,color:"#fff",cursor:"pointer",fontFamily:"inherit",
            width:"100%",minHeight:50,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          ✉ Send via email
        </button>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Btn onClick={function(){exportLetterPdf({letter:letter,cv:cv,job:currentJob,portrait:portrait||"",settings:{template:tmpl,font:font,color:color}});}} style={{fontSize:14,minHeight:46}}>📄 PDF</Btn>
          <Btn onClick={function(){navigator.clipboard.writeText(letter);}} style={{fontSize:14,minHeight:46}}>Copy</Btn>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Btn onClick={function(){saveLetter(letter);}} style={{fontSize:14,minHeight:46}}>{saved?"✓ Saved":"Save"}</Btn>
          <Btn variant="danger" onClick={function(){if(confirm("Remove cover letter?")){{setLetter("");saveLetter("");}};}} style={{fontSize:14,minHeight:46}}>Remove</Btn>
        </div>
      </div>
      {showEmail&&<EmailDialog recipients={cv.recipients||[]} subject={emailSubject} body={letter} onClose={function(){setShowEmail(false);}} />}
    </Card>}
  </div>;
}

// ─── Job summary for system prompt ───────────────────────────────────────────
function jobsSummaryText(jobs){
  if(!jobs||!jobs.length) return "(No jobs in the pipeline yet.)";
  var groups={};
  var order=["New","Reviewing","Applied","Interview","Offer","Rejected","No response","Ad removed","Not relevant"];
  jobs.forEach(function(j){
    var key=j.archived?"Archived":(j.status||"Unknown");
    if(!groups[key]) groups[key]=[];
    groups[key].push(j);
  });
  var lines=[];
  var allKeys=order.concat(Object.keys(groups).filter(function(k){return !order.includes(k);}));
  allKeys.forEach(function(status){
    var group=groups[status];
    if(!group||!group.length) return;
    lines.push("\n── "+status.toUpperCase()+" ("+group.length+") ──");
    group.forEach(function(j){
      var score=j.scored===false?"unscored":((j.score||0)+"%");
      var tags=j.tags&&j.tags.length?" ["+j.tags.slice(0,4).join(", ")+"]":"";
      var emp=j.employmentType?" · "+j.employmentType:"";
      var loc=j.location?" · "+j.location:"";
      var desc=j.description?(" | desc: "+j.description.replace(/\s+/g," ").slice(0,300)):"";
      var rat=j.rationale?" | AI: "+j.rationale:"";
      // Include key dates for pipeline analysis
      var dates=[];
      if(j.date) dates.push("added:"+j.date.slice(0,10));
      if(j.appliedAt) dates.push("applied:"+j.appliedAt.slice(0,10));
      if(j.interviewAt) dates.push("interview:"+j.interviewAt.slice(0,10));
      if(j.offerAt) dates.push("offer:"+j.offerAt.slice(0,10));
      if(j.rejectedAt) dates.push("rejected:"+j.rejectedAt.slice(0,10));
      if(j.noResponseAt) dates.push("no-response:"+j.noResponseAt.slice(0,10));
      var dateStr=dates.length?" | "+dates.join(", "):"";
      var notes=j.notes?" | notes: "+j.notes.slice(0,100):"";
      lines.push("• id:"+j.id+" "+score+" — "+j.title+" @ "+j.company+loc+emp+tags+rat+dateStr+notes+desc);
    });
  });
  return "Total jobs: "+jobs.length+" ("+Object.keys(groups).map(function(k){return k+": "+groups[k].length;}).join(", ")+")\n"+lines.join("\n");
}

// ─── System prompt ────────────────────────────────────────────────────────────
function buildAssistantSystem(cv,profiles,jobs){
  var cvBlock=hasCv(cv)?cvSummaryText(cv):"(No CV loaded yet — ask the user to add their CV in the My CV tab.)";
  var existing=(profiles||[]).length
    ? profiles.map(function(p){
        return "- id:"+p.id+" \""+p.name+"\" · query: "+p.query+" · sources: "+(p.sources||[]).join("+")+
               " · max "+p.limit+" · "+(p.active?"active":"inactive");
      }).join("\n")
    : "(No profiles saved yet.)";
  var pipelineBlock=jobsSummaryText(jobs||[]);

  return [
    "You are Gabbi, an AI assistant embedded in a personal job-tracking app.",
    "Your personality: warm, direct, practically helpful. You use the user's first name if you know it.",
    "",
    "You help with these topics:",
    "  (a) How this app's features work.",
    "  (b) Designing and editing search profiles.",
    "  (c) What the connected APIs (Arbetsförmedlingen, JSearch) can do.",
    "  (d) Analysing the user's job pipeline — patterns, matches, strategic advice.",
    "  (e) Analysing and improving CV sections (tools, skills, achievements, preferences).",
    "  (f) Applying edits to CV and job data when the user asks.",
    "",
    "For anything outside job search and this app, just say so briefly and offer to help with what you can.",
    "",
    "TONE: friendly, concise, practical. One clarifying question at a time max.",
    "",
    "FORMATTING: use markdown formatting to improve readability:",
    "• Use ## for section headings and ### for sub-headings in longer responses.",
    "• Use - bullet lists for unordered items; put each item on its own line.",
    "• Use 1. 2. 3. numbered lists for steps, rankings, or ordered items.",
    "• Use | col | col | markdown tables for comparisons, skill gaps, structured data.",
    "• Use **bold** for key terms and *italic* for emphasis.",
    "• Use single line breaks between list items for breathing room.",
    "• Keep responses concise — use structure to replace length, not add to it.",
    "",
    "═══ WHAT GABBI CAN WRITE ═══",
    "You can make changes to: CV sections, job status/notes, search profiles.",
    "Always describe what you plan to change and ask for confirmation BEFORE emitting action blocks.",
    "Never emit action blocks unless the user has explicitly confirmed.",
    "You may emit multiple action blocks in one reply.",
    "Do NOT use markdown code fences around action blocks.",
    "",
    "═══ ACTION PROTOCOL ═══",
    "",
    "── 1. CV EDITS (tools, skills, achievements) ──",
    "<<<ACTION>>>",
    "{\"type\":\"cv_edit\",\"section\":\"tools\",\"op\":\"add\",\"item\":{\"name\":\"Notion\",\"years\":2,\"level\":\"Intermediate\",\"employers\":\"\"}}",
    "<<</ACTION>>>",
    "Sections: \"tools\", \"skills\", \"achievements\"",
    "Ops: add | edit | delete",
    "Identifying existing entries (for edit/delete): use index (preferred) OR name match.",
    "  index: 1-based number shown in the CV sections and in the numbered list below. Use this whenever the user refers to an item by number.",
    "  name: exact name match for tools/skills (fallback when no index given).",
    "  description: substring match for achievements (fallback when no index given).",
    "Example edit by index: {\"type\":\"cv_edit\",\"section\":\"tools\",\"op\":\"edit\",\"index\":3,\"item\":{\"level\":\"Expert\"}}",
    "Example delete by index: {\"type\":\"cv_edit\",\"section\":\"tools\",\"op\":\"delete\",\"index\":5}",
    "Tool/Skill fields: name (string), years (number), level (Beginner|Intermediate|Advanced|Expert), employers (string)",
    "Achievement fields: description (string), employer (string), year (string)",
    "",
    "── 1b. CV BULK EXTRACTION (use this when extracting from CV text) ──",
    "<<<ACTION>>>",
    "{\"type\":\"cv_bulk_edit\",\"section\":\"tools\",\"op\":\"add\",\"items\":[{\"name\":\"Figma\",\"years\":4,\"level\":\"Advanced\",\"employers\":\"Spotify\"},{\"name\":\"Jira\",\"years\":8,\"level\":\"Expert\",\"employers\":\"Spotify, IKEA\"}]}",
    "<<</ACTION>>>",
    "Use cv_bulk_edit (not cv_edit) whenever you are extracting multiple entries at once.",
    "Fields: same as cv_edit. section: tools | skills | achievements.",
    "op values for cv_bulk_edit:",
    "  add     — adds items not already present (deduplicates). Use for extraction when user wants to keep existing entries.",
    "  replace — replaces the ENTIRE section with the new items list. Use when user wants to update/refresh/overwrite a section.",
    "items: array of ALL entries for that section in one block. One block per section.",
    "NEVER use cv_bulk_edit with fewer than 2 items — use cv_edit for single entries.",
    "IMPORTANT: Before using op:replace, confirm with the user that they want to overwrite existing entries.",
    "",
    "── 2. CV PREFERENCES ──",
    "<<<ACTION>>>",
    "{\"type\":\"cv_pref\",\"field\":\"roles\",\"value\":\"Product Manager, CPO, Product Owner\"}",
    "<<</ACTION>>>",
    "Fields: roles | industries | locations | salary | workType (Any|Remote|Hybrid|On-site)",
    "",
    "── 3. JOB UPDATES ──",
    "<<<ACTION>>>",
    "{\"type\":\"job_update\",\"jobId\":12345,\"op\":\"setStatus\",\"value\":\"Applied\"}",
    "<<</ACTION>>>",
    "Ops:",
    "  setStatus — value must be one of: New, Reviewing, Applied, Interview, Offer, Rejected, No response, Ad removed, Not relevant",
    "  setNotes  — value is a string (replaces existing notes)",
    "  appendNote — value is appended to existing notes with a newline separator",
    "  setDate   — manually set or correct a milestone date. field must be one of: appliedAt, interviewAt, offerAt, rejectedAt, noResponseAt. value must be an ISO date string (YYYY-MM-DD) or null to clear.",
    "jobId must exactly match the id shown in the pipeline list below.",
    "When setting status, the app auto-sets the corresponding date automatically. Use setDate only when the user wants to correct a date that was set wrong.",
    "For job updates: if the user says a company or title name rather than an id, find the matching job in the pipeline and use its id.",
    "",
    "── 4. PROFILE UPDATES ──",
    "<<<ACTION>>>",
    "{\"type\":\"profile_update\",\"profileId\":12345,\"op\":\"setActive\",\"value\":false}",
    "<<</ACTION>>>",
    "Ops:",
    "  setActive — value: true or false",
    "  setQuery  — value: new query string",
    "  setLimit  — value: integer 5–50",
    "  delete    — no value needed (removes the profile)",
    "profileId must exactly match the id shown in the profiles list below.",
    "Do NOT delete profiles unless the user explicitly asks to delete (not just deactivate).",
    "",
    "═══ SEARCH PROFILE SUGGESTIONS ═══",
    "When proposing a NEW profile emit:",
    "<<<PROFILE>>>",
    "{\"name\":\"Short name\",\"query\":\"free-text terms\",\"sources\":[\"af\"],\"limit\":15,\"reasoning\":\"One sentence\"}",
    "<<</PROFILE>>>",
    "",
    "═══ API CAPABILITIES ═══",
    "• Arbetsförmedlingen (af) — free Swedish API, single free-text q param, no AND/OR.",
    "• JSearch (jsearch) — RapidAPI, Indeed/LinkedIn/Glassdoor, needs user's RapidAPI key.",
    "",
    "═══ CV ANALYSIS GUIDANCE ═══",
    "When asked to analyse the CV:",
    "• Identify gaps — skills or tools common in the user's target roles that are missing.",
    "• Spot weak entries — vague descriptions, missing years/level/employers.",
    "• Suggest improvements — better wording, missing achievements, underrepresented strengths.",
    "• Cross-reference with the job pipeline — highlight skills that appear in job descriptions but are absent from the CV.",
    "",
    "═══ CV EXTRACTION — IMPORTANT INSTRUCTIONS ═══",
    "When the user asks you to extract tools, skills, or achievements from their CV text, follow these rules exactly:",
    "",
    "RULE 1 — RESPOND WITH A COMPLETE BATCH, NOT INDIVIDUAL ITEMS.",
    "Never suggest entries one at a time. Always extract ALL entries for a section in a single cv_bulk_edit action block.",
    "The user should not need to ask multiple times to get all their data out.",
    "",
    "RULE 1b — CLARIFY ADD VS REPLACE WHEN UPDATING.",
    "When the user asks to 'update', 'refresh', 'replace', or 'redo' their tools/skills/achievements:",
    "  Ask first: 'Do you want to ADD the new entries to your existing list, or REPLACE the entire section?'",
    "  If ADD: use op:add (deduplicates, keeps existing entries).",

    "",
    "RULE 2 — EXTRACT FROM THE RAW CV TEXT FIRST, THEN COMPARE.",
    "Read the full CV text carefully. Extract every tool, skill, and achievement you can identify.",
    "Then compare against the existing structured sections — only include entries that are NOT already present.",
    "If a section already has entries, you are adding to it, not replacing it.",

    "RULE 3 — DEDUPLICATE.",

    "",
    "RULE 4 — FILL IN ALL FIELDS.",
    "For every entry, populate all fields as accurately as possible from the CV text:",
    "• Tools/Skills: name, years (estimate from CV dates if not explicit), level (Beginner/Intermediate/Advanced/Expert based on context), employers (company names where used)",
    "• Achievements: description (specific, concrete, outcome-focused), employer, year",
    "",
    "RULE 5 — BE COMPLETE, THEN ASK.",
    "Give a brief one-line intro (e.g. 'Here is what I found in your CV:'), then emit all three bulk action blocks (tools, skills, achievements) in one reply.",
    "After the blocks, add a brief note about what you excluded or were uncertain about.",
    "Never ask clarifying questions BEFORE extracting — extract first, clarify after.",
    "",
    "RULE 6 — QUALITY OVER QUANTITY FOR ACHIEVEMENTS.",
    "Achievements should be specific and measurable where possible. Prefer concrete outcomes ('Reduced onboarding time by 40%') over vague statements ('Improved processes').",
    "Extract achievements from the CV narrative even if not explicitly labelled as achievements.",
    "",
    "═══ PIPELINE ANALYSIS GUIDANCE ═══",
    "Use the pipeline to identify patterns, mismatches, response rates, and strategic advice.",
    "Milestone dates available: added, appliedAt, interviewAt, offerAt, rejectedAt, noResponseAt.",
    "Use these dates to calculate and reason about:",
    "  • Time from application to interview (interviewAt - appliedAt) — interview conversion speed",
    "  • Time from application to rejection (rejectedAt - appliedAt) — rejection speed patterns",
    "  • Interview-to-offer conversion rate (jobs reaching Offer / jobs reaching Interview)",
    "  • Response rate (any response / total applied)",
    "  • Silent applications (Applied with no response after 30+ days — noResponseAt not set)",
    "Ground all observations in actual data. Be cautious with <10 jobs.",
    "For silent jobs (Applied 30+ days, no response), proactively suggest marking them as No response.",
    "",
    "═══ USER'S CV & PREFERENCES ═══",
    cvBlock,
    "",
    "═══ USER'S SEARCH PROFILES ═══",
    existing,
    "",
    "═══ USER'S JOB PIPELINE ═══",
    pipelineBlock,
  ].join("\n");
}

// ─── Extract <<<PROFILE>>> blocks ─────────────────────────────────────────────
function extractProfiles(reply){
  var re=/<<<PROFILE>>>([\s\S]*?)<<<\/PROFILE>>>/g;
  var profiles=[];
  var m;
  while((m=re.exec(reply))!==null){
    try{
      var raw=m[1].trim().replace(/^```(?:json)?\s*/i,"").replace(/\s*```\s*$/,"").trim();
      var obj=JSON.parse(raw);
      if(obj&&typeof obj.name==="string"&&typeof obj.query==="string"){
        profiles.push({
          name:obj.name.slice(0,80),
          query:obj.query.slice(0,300),
          sources:Array.isArray(obj.sources)&&obj.sources.length?obj.sources.filter(function(s){return s==="af"||s==="jsearch";}):[  "af"],
          limit:Math.max(1,Math.min(50,parseInt(obj.limit,10)||15)),
          reasoning:typeof obj.reasoning==="string"?obj.reasoning.slice(0,300):"",
        });
      }
    }catch(e){}
  }
  return profiles;
}

// ─── Parse reply into ordered segments ───────────────────────────────────────
function parseReplySegments(reply){
  var profileRe=/<<<PROFILE>>>([\s\S]*?)<<<\/PROFILE>>>/g;
  var actionRe=/<<<ACTION>>>([\s\S]*?)<<<\/ACTION>>>/g;
  var blocks=[];
  var r;
  profileRe.lastIndex=0;
  while((r=profileRe.exec(reply))!==null) blocks.push({index:r.index,end:profileRe.lastIndex,type:"profile",raw:r[1]});
  actionRe.lastIndex=0;
  while((r=actionRe.exec(reply))!==null) blocks.push({index:r.index,end:actionRe.lastIndex,type:"action",raw:r[1]});
  blocks.sort(function(a,b){return a.index-b.index;});

  var segments=[];
  var lastIndex=0;
  blocks.forEach(function(b){
    var before=reply.slice(lastIndex,b.index).trim();
    if(before) segments.push({type:"text",value:before});
    try{
      var raw=b.raw.trim().replace(/^```(?:json)?\s*/i,"").replace(/\s*```\s*$/,"").trim();
      var obj=JSON.parse(raw);
      if(b.type==="profile"&&obj.name&&obj.query){
        segments.push({type:"profile",value:{
          name:obj.name.slice(0,80),query:obj.query.slice(0,300),
          sources:Array.isArray(obj.sources)&&obj.sources.length?obj.sources.filter(function(s){return s==="af"||s==="jsearch";}):[  "af"],
          limit:Math.max(1,Math.min(50,parseInt(obj.limit,10)||15)),
          reasoning:typeof obj.reasoning==="string"?obj.reasoning.slice(0,300):"",
        }});
      } else if(b.type==="action"&&obj.type){
        segments.push({type:"action",value:obj});
      }
    }catch(e){
      segments.push({type:"text",value:"[Could not parse a suggestion — try asking again]"});
    }
    lastIndex=b.end;
  });

  var tail=reply.slice(lastIndex).trim();
  if(tail) segments.push({type:"text",value:tail});
  if(!segments.length) segments.push({type:"text",value:reply.trim()});
  return segments;
}

// ─── Starter prompts ──────────────────────────────────────────────────────────
function getStarterPrompts(cv,jobs){
  var activeJobs=(jobs||[]).filter(function(j){return !j.archived;});
  var scoredCount=activeJobs.filter(function(j){return j.scored!==false&&typeof j.score==="number";}).length;
  var interviewCount=activeJobs.filter(function(j){return j.status==="Interview"||j.status==="Offer";}).length;
  var rejectedCount=activeJobs.filter(function(j){return j.status==="Rejected";}).length;
  var now=Date.now();
  var silentCount=activeJobs.filter(function(j){
    if(j.status!=="Applied") return false;
    var ref=j.appliedAt||j.date;
    return ref&&(now-new Date(ref).getTime())>30*24*60*60*1000;
  }).length;
  var lowestScored=scoredCount>=5?activeJobs.filter(function(j){return j.scored!==false&&typeof j.score==="number";}).sort(function(a,b){return a.score-b.score;})[0]:null;
  var hasStructured=!!(cv&&((cv.tools&&cv.tools.length)||(cv.skills&&cv.skills.length)||(cv.achievements&&cv.achievements.length)));

  if(!hasCv(cv)){
    return [
      "I'd like help building my first search profile.",
      "What kinds of job searches can this app do?",
      "How should I structure my CV to get better match scores?",
      "What can you help me with?",
    ];
  }
  var prompts=[];
  // Context-aware: most urgent/actionable first
  if(silentCount>0) prompts.push("I have "+silentCount+" application"+(silentCount>1?"s":"")+" with no response for 30+ days — what should I do?");
  if(hasCv(cv)&&!hasStructured) prompts.push("Extract my tools, skills and achievements from my CV text.");
  if(hasStructured) prompts.push("Review my CV sections and add anything important that's missing.");
  if(scoredCount>=10) prompts.push("Suggest a new profile based on my highest-scoring jobs.");
  if(lowestScored) prompts.push("Why is my match score low for "+lowestScored.title+" at "+lowestScored.company+"?");
  if(interviewCount>=2) prompts.push("What do my Interview-stage jobs have in common?");
  else if(interviewCount===1) prompts.push("What stands out about the job I reached Interview for?");
  if(rejectedCount>=3) prompts.push("Are there patterns in the jobs I've been rejected from?");
  if(activeJobs.length>0) prompts.push("Update a job status or add a note for me.");
  if(hasStructured) prompts.push("What skills or tools am I missing for my target roles?");
  prompts.push("Help me build a search profile from my CV.");
  return prompts.slice(0,4);
}

// ─── ActionCard ───────────────────────────────────────────────────────────────
function ActionCard({action,onAccept,onReject,accepted,rejected,cv}){
  var a=action;
  var isBulk=a.type==="cv_bulk_edit";
  var allItems=isBulk?(a.items||[]):[];

  // For add op: pre-uncheck items already in the CV section
  var currentSection=isBulk&&cv?(cv[a.section]||[]):[];
  function alreadyExists(item){
    if(a.section==="achievements"){
      var md=(item.description||"").toLowerCase().slice(0,40);
      return currentSection.some(function(x){return x.description&&x.description.toLowerCase().includes(md);});
    }
    return currentSection.some(function(x){return x.name&&x.name.toLowerCase()===(item.name||"").toLowerCase();});
  }

  // Checkbox state — false means unchecked
  var initChecked={};
  allItems.forEach(function(item,i){
    initChecked[i]=a.op!=="add"||!alreadyExists(item);
  });
  var [checked,setChecked]=useState(initChecked);
  var [expanded,setExpanded]=useState(false);
  var m=mob();

  var checkedCount=Object.values(checked).filter(Boolean).length;
  var newCount=allItems.filter(function(it,i){return !alreadyExists(it);}).length;
  var dupeCount=allItems.length-newCount;

  function toggleItem(i){
    setChecked(function(prev){return Object.assign({},prev,{[i]:!prev[i]});});
  }
  function toggleAll(val){
    var next={};
    allItems.forEach(function(_,i){ next[i]=val; });
    setChecked(next);
  }

  function buildFilteredAction(){
    if(!isBulk) return a;
    var selectedItems=allItems.filter(function(_,i){return checked[i];});
    return Object.assign({},a,{items:selectedItems});
  }

  // ── Type labels and colours ──────────────────────────────────────────────
  var typeLabel="";
  var opLabel=isBulk?(a.op==="replace"?"Replace all":checkedCount===allItems.length?"Add all":"Add selected ("+checkedCount+")"):
    a.op==="add"?"Add":a.op==="edit"?"Edit":a.op==="delete"?"Delete":
    a.op==="setStatus"?"Set status":a.op==="setNotes"?"Set notes":
    a.op==="appendNote"?"Add note":a.op==="setDate"?"Set date":a.op==="setActive"?"Toggle":
    a.op==="setQuery"?"Edit query":a.op==="setLimit"?"Edit limit":"Update";
  var opColor=C.success;
  var opBg=C.successBg;

  if(a.type==="cv_edit"){
    typeLabel=a.section==="tools"?"CV Tool":a.section==="skills"?"CV Skill":"CV Achievement";
    opColor=a.op==="delete"?C.error:a.op==="edit"?C.warning:C.success;
    opBg=a.op==="delete"?C.errorBg:a.op==="edit"?C.warningBg:C.successBg;
  } else if(isBulk){
    var secName=a.section==="tools"?"Tools":a.section==="skills"?"Skills":"Achievements";
    typeLabel="CV "+secName;
    opColor=a.op==="replace"?C.warning:C.success;
    opBg=a.op==="replace"?C.warningBg:C.successBg;
  } else if(a.type==="cv_pref"){
    typeLabel="CV Preference";
    opColor=C.info; opBg=C.infoBg;
  } else if(a.type==="job_update"){
    typeLabel="Job";
    opColor=a.op==="setStatus"?C.primary:C.info;
    opBg=a.op==="setStatus"?C.primaryLight:C.infoBg;
  } else if(a.type==="profile_update"){
    typeLabel="Search Profile";
    opColor=a.op==="delete"?C.error:C.warning;
    opBg=a.op==="delete"?C.errorBg:C.warningBg;
  }

  // ── Summary text (for non-bulk or collapsed view) ────────────────────────
  function itemLabel(item){
    if(a.section==="achievements") return (item.description||"").slice(0,80)+(item.employer?" @ "+item.employer:"");
    return (item.name||"")+(item.years?" · "+item.years+" yr":"")+(item.level?" · "+item.level:"");
  }
  var summary="";
  if(isBulk){
    if(a.op==="replace"){
      summary="Replace "+currentSection.length+" existing → "+allItems.length+" new entries";
    } else {
      summary=newCount+" new"+(dupeCount>0?", "+dupeCount+" already in CV (pre-deselected)":"");
    }
  } else if(a.type==="cv_edit"){
    var idxLabel=a.index!=null?"#"+a.index+" ":"";
    var itm=a.item||{};
    if(a.section==="achievements"){
      summary=idxLabel+(itm.description||"").slice(0,120)+(itm.employer?" — "+itm.employer:"")+(itm.year?" ("+itm.year+")":"");
    } else {
      summary=idxLabel+(itm.name||"(by index)")+(itm.years?" · "+itm.years+" yr":"")+(itm.level?" · "+itm.level:"")+(itm.employers?" · "+itm.employers:"");
    }
  } else if(a.type==="cv_pref"){
    summary=(a.field||"")+" → "+(typeof a.value==="string"?a.value.slice(0,100):String(a.value));
  } else if(a.type==="job_update"){
    if(a.op==="setDate") summary="Job #"+a.jobId+" → "+a.field+": "+(a.value||"clear");
    else summary="Job #"+a.jobId+" → "+(typeof a.value==="string"?a.value.slice(0,120):String(a.value||""));
  } else if(a.type==="profile_update"){
    summary="Profile #"+a.profileId+" → "+(a.op==="delete"?"DELETE":typeof a.value!=="undefined"?String(a.value).slice(0,80):"");
  }

  // ── Accepted / rejected states ───────────────────────────────────────────
  if(accepted){
    return <div style={{border:"1.5px solid "+C.success,borderRadius:12,padding:"12px 14px",background:C.successBg,display:"flex",alignItems:"center",gap:10}}>
      <span style={{fontSize:16}}>✓</span>
      <span style={{fontSize:13,color:C.success,fontWeight:600}}>{opLabel} {typeLabel}: {summary.slice(0,80)} — applied</span>
    </div>;
  }
  if(rejected){
    return <div style={{border:"1.5px solid "+C.border,borderRadius:12,padding:"12px 14px",background:C.surfaceAlt,display:"flex",alignItems:"center",gap:10,opacity:0.5}}>
      <span style={{fontSize:13,color:C.textHint}}>Skipped: {opLabel} {typeLabel}</span>
    </div>;
  }

  // ── Main card ─────────────────────────────────────────────────────────────
  return <div style={{border:"2px solid "+opColor,borderRadius:14,background:opBg,overflow:"hidden"}}>

    {/* Header */}
    <div style={{padding:"12px 14px 10px",borderBottom:isBulk?"1px solid "+(a.op==="replace"?C.warning+"44":C.success+"44"):"none"}}>
      <div style={{fontSize:11,fontWeight:700,color:opColor,letterSpacing:"0.5px",marginBottom:6}}>
        {(isBulk?(a.op==="replace"?"REPLACE":"ADD"):a.op.toUpperCase()).toUpperCase()} {typeLabel.toUpperCase()}
      </div>
      <div style={{fontSize:13,color:C.textSecondary,lineHeight:1.5}}>{summary}</div>
    </div>

    {/* Bulk item list — add op */}
    {isBulk&&a.op!=="replace"&&<div>
      {/* Expand/collapse toggle */}
      <button onClick={function(){setExpanded(function(v){return !v;});}}
        style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"8px 14px",border:"none",background:"transparent",
          cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600,
          color:C.textSecondary,borderBottom:"1px solid "+C.success+"33"}}>
        <span>{expanded?"▲ Hide items":"▼ Show all "+allItems.length+" items"}</span>
        {!expanded&&<span style={{fontSize:11,color:C.textHint}}>
          {checkedCount} of {allItems.length} selected
        </span>}
      </button>

      {expanded&&<div style={{maxHeight:320,overflowY:"auto"}}>
        {/* Select all / none controls */}
        <div style={{display:"flex",gap:10,padding:"6px 14px",borderBottom:"1px solid "+C.success+"22",background:C.surface}}>
          <button onClick={function(){toggleAll(true);}}
            style={{fontSize:11,fontWeight:600,color:C.primary,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",padding:"2px 0"}}>
            Select all
          </button>
          <span style={{color:C.border}}>·</span>
          <button onClick={function(){toggleAll(false);}}
            style={{fontSize:11,fontWeight:600,color:C.textHint,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",padding:"2px 0"}}>
            Deselect all
          </button>
          <span style={{marginLeft:"auto",fontSize:11,color:C.textHint}}>{checkedCount} selected</span>
        </div>

        {/* New items */}
        {allItems.filter(function(it){return !alreadyExists(it);}).length>0&&
          <div style={{padding:"6px 14px 2px"}}>
            <div style={{fontSize:10,fontWeight:700,color:C.success,letterSpacing:"0.5px",marginBottom:4}}>NEW</div>
            {allItems.map(function(item,i){
              if(alreadyExists(item)) return null;
              return <label key={i} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"5px 0",cursor:"pointer",userSelect:"none"}}>
                <input type="checkbox" checked={!!checked[i]} onChange={function(){toggleItem(i);}}
                  style={{marginTop:2,flexShrink:0,width:15,height:15,accentColor:C.primary,cursor:"pointer"}} />
                <span style={{fontSize:13,color:checked[i]?C.textPrimary:C.textHint,lineHeight:1.4}}>
                  {itemLabel(item)}
                </span>
              </label>;
            })}
          </div>}

        {/* Already-in-CV items */}
        {dupeCount>0&&
          <div style={{padding:"6px 14px 8px",borderTop:"1px solid "+C.border}}>
            <div style={{fontSize:10,fontWeight:700,color:C.textHint,letterSpacing:"0.5px",marginBottom:4}}>ALREADY IN YOUR CV</div>
            {allItems.map(function(item,i){
              if(!alreadyExists(item)) return null;
              return <label key={i} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"5px 0",cursor:"pointer",userSelect:"none",opacity:0.5}}>
                <input type="checkbox" checked={!!checked[i]} onChange={function(){toggleItem(i);}}
                  style={{marginTop:2,flexShrink:0,width:15,height:15,accentColor:C.primary,cursor:"pointer"}} />
                <span style={{fontSize:13,color:C.textHint,lineHeight:1.4,textDecoration:"line-through"}}>
                  {itemLabel(item)}
                </span>
              </label>;
            })}
          </div>}
      </div>}
    </div>}

    {/* Replace op — show before/after diff */}
    {isBulk&&a.op==="replace"&&<div>
      <button onClick={function(){setExpanded(function(v){return !v;});}}
        style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"8px 14px",border:"none",background:"transparent",
          cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600,
          color:C.textSecondary,borderBottom:"1px solid "+C.warning+"33"}}>
        <span>{expanded?"▲ Hide details":"▼ Show before/after"}</span>
      </button>

      {expanded&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:0}}>
        {/* Current — being removed */}
        <div style={{padding:"8px 14px",borderRight:"1px solid "+C.border,background:C.errorBg+"44"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.error,letterSpacing:"0.5px",marginBottom:6}}>
            CURRENT ({currentSection.length})
          </div>
          <div style={{maxHeight:200,overflowY:"auto"}}>
            {currentSection.map(function(item,i){
              return <div key={i} style={{fontSize:12,color:C.textHint,padding:"3px 0",lineHeight:1.4,textDecoration:"line-through"}}>
                {a.section==="achievements"?(item.description||"").slice(0,60):(item.name||"")}
              </div>;
            })}
          </div>
        </div>
        {/* New — replacing with */}
        <div style={{padding:"8px 14px",background:C.successBg+"44"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.success,letterSpacing:"0.5px",marginBottom:6}}>
            NEW ({allItems.length})
          </div>
          <div style={{maxHeight:200,overflowY:"auto"}}>
            {allItems.map(function(item,i){
              return <div key={i} style={{fontSize:12,color:C.textPrimary,padding:"3px 0",lineHeight:1.4}}>
                {itemLabel(item)}
              </div>;
            })}
          </div>
        </div>
      </div>}
    </div>}

    {/* Action buttons */}
    <div style={{padding:"10px 14px",display:"flex",gap:8,alignItems:"center",
      borderTop:"1px solid "+opColor+"33",background:C.surface}}>
      <Btn variant="primary"
        onClick={function(){onAccept(buildFilteredAction());}}
        disabled={isBulk&&a.op!=="replace"&&checkedCount===0}
        style={{fontSize:13,padding:"7px 16px"}}>
        ✓ {isBulk&&a.op!=="replace"?(checkedCount===allItems.length?"Apply all":"Apply selected ("+checkedCount+")"):"Apply"}
      </Btn>
      <Btn onClick={onReject} style={{fontSize:13,padding:"7px 14px"}}>Skip</Btn>
      {isBulk&&a.op!=="replace"&&<span style={{fontSize:11,color:C.textHint,marginLeft:4}}>
        {checkedCount}/{allItems.length} selected
      </span>}
    </div>

  </div>;
}
